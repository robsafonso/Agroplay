<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orcamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:Arial;padding:14px}
.x{padding:8px;margin:4px 0;background:#222;border-radius:4px;font-size:12px;font-family:monospace;word-break:break-all}
.ok{background:#0a4;color:#fff}
.err{background:#a00;color:#fff}
</style>
</head>
<body>

<h1>DIAGNOSTICO ORCAMENTO</h1>

<div id="p1" class="x">passo 1: HTML carregado (sem JS)</div>
<div id="p2" class="x">passo 2: aguardando script tag...</div>
<div id="p3" class="x">passo 3: aguardando vars...</div>
<div id="p4" class="x">passo 4: aguardando CATS...</div>
<div id="p5" class="x">passo 5: aguardando funcoes...</div>
<div id="p6" class="x">passo 6: aguardando fetch...</div>
<div id="p7" class="x">passo 7: aguardando resposta...</div>
<div id="p8" class="x">passo 8: aguardando parse...</div>

<script>
document.getElementById('p2').innerHTML='passo 2: SCRIPT TAG OK';
document.getElementById('p2').className='x ok';
</script>

<script>
var SB='https://wexwcnezjadoutyzkbcj.supabase.co';
var KY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
document.getElementById('p3').innerHTML='passo 3: VARS OK (KY len='+KY.length+')';
document.getElementById('p3').className='x ok';
</script>

<script>
var CATS=[
['Artista',['Cache','Passagem','Hospedagem']],
['Estrutura Tecnica',['Som','Luz','Palco']],
['Local',['Aluguel','Banheiro','Energia']]
];
document.getElementById('p4').innerHTML='passo 4: CATS OK ('+CATS.length+' cats)';
document.getElementById('p4').className='x ok';
</script>

<script>
function fmt(v){return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function fd(d){if(!d)return'';var x=d.split('-');return x[2]+'/'+x[1]+'/'+x[0];}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('p5').innerHTML='passo 5: FUNCOES OK (fmt(100)='+fmt(100)+')';
document.getElementById('p5').className='x ok';
</script>

<script>
document.getElementById('p6').innerHTML='passo 6: chamando fetch...';
document.getElementById('p6').className='x ok';
fetch(SB+'/rest/v1/eventos?select=id,nome',{
  headers:{apikey:KY,Authorization:'Bearer '+KY}
}).then(function(r){
  document.getElementById('p7').innerHTML='passo 7: resposta status='+r.status;
  document.getElementById('p7').className='x ok';
  return r.json();
}).then(function(d){
  document.getElementById('p8').innerHTML='passo 8: PARSE OK - '+(Array.isArray(d)?d.length+' eventos':'erro')+' :: '+JSON.stringify(d).substring(0,150);
  document.getElementById('p8').className='x ok';
}).catch(function(e){
  document.getElementById('p7').innerHTML='passo 7: ERRO - '+e.message;
  document.getElementById('p7').className='x err';
});
</script>

</body>
</html>
