<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay - Orcamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;padding:16px;max-width:480px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-size:16px;font-weight:900;color:#fff;letter-spacing:2px;cursor:pointer}
.logo span{color:#2aab47}
.back{background:transparent;border:1px solid #1a2a1a;border-radius:8px;padding:6px 12px;color:#eee;font-size:12px;text-decoration:none}
.total-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.tot{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:12px;text-align:center}
.tot-n{font-size:26px;font-weight:900;display:block}
.tot-l{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{background:transparent;border:1px solid #1a2a1a;border-radius:20px;padding:5px 12px;font-size:11px;color:#888;cursor:pointer}
.chip.on{background:#1e7a35;border-color:#1e7a35;color:#fff;font-weight:700}
.ev-card{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:14px;margin-bottom:12px}
.ev-nome{font-size:15px;font-weight:900;color:#fff;margin-bottom:2px}
.ev-det{font-size:11px;color:#555;margin-bottom:12px}
.lote-block{background:#060a06;border:1px solid #1a2a1a;border-radius:10px;padding:12px;margin-bottom:8px}
.lote-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer}
.lote-nome{font-size:13px;font-weight:700;color:#fff}
.lote-badges{display:flex;gap:4px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.lote-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.ls{border-radius:8px;padding:6px;text-align:center}
.ls-n{font-size:16px;font-weight:900;display:block}
.ls-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.btn-ver{width:100%;background:transparent;border:1px solid #2aab47;color:#2aab47;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;text-decoration:none;display:block;text-align:center}
.loading{text-align:center;padding:40px;font-size:14px;color:#555}
.progress-bar{height:4px;background:#1a2a1a;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:#2aab47;border-radius:2px;transition:width .3s}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo" onclick="location.href='home.html'">AGRO<span>PLAY</span></div>
  <a href="home.html" class="back">&larr; Menu</a>
</div>

<div id="total-bar" class="total-bar" style="display:none">
  <div class="tot"><span class="tot-n" id="t-azul" style="color:#0891b2">0</span><div class="tot-l">Nao enviado</div></div>
  <div class="tot"><span class="tot-n" id="t-amar" style="color:#c9973c">0</span><div class="tot-l">Aguardando</div></div>
  <div class="tot"><span class="tot-n" id="t-verde" style="color:#2aab47">0</span><div class="tot-l">Confirmado</div></div>
</div>

<div id="filtros-wrap" class="filtros" style="display:none"></div>
<select id="ev-orc" onchange="selecionarEvOrc()" style="width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px;color:#eee;font-size:13px;margin-bottom:10px;outline:none"><option value="">Carregando eventos...</option></select>
<div id="ev-orc-info" style="margin-bottom:12px;font-size:12px;color:#555"></div>
<div id="conteudo"><div class="loading">Carregando...</div></div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";
var allEvs=[],allCads=[],allLotes=[],filtResp="Todos";

function ap(path){
  return fetch(SB+"/rest/v1/"+path,{headers:{"apikey":KY,"Authorization":"Bearer "+KY}}).then(function(r){return r.json();});
}
function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}

function setFilt(r){
  filtResp=r;
  document.querySelectorAll(".chip").forEach(function(c){c.classList.remove("on");});
  var id="chip-"+r.replace(/\s/g,"_").replace(/[^a-zA-Z0-9_]/g,"");
  var el=document.getElementById(id);
  if(el)el.classList.add("on");
  render();
}

function render(){
  var totalAzul=0,totalAmar=0,totalVerde=0;
  var html="";

  allEvs.forEach(function(ev){
    var evCads=allCads.filter(function(c){return c.evento_id===ev.id;});
    if(!evCads.length)return;

    var dataFmt=fd(ev.data);
    var hoje=new Date();
    var hoje0=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
    var evData=ev.data?new Date(ev.data+"T00:00:00"):null;
    var dias=evData?Math.ceil((evData-hoje0)/(1000*60*60*24)):999;

    // Group by lote
    var lotesNoEv={};
    evCads.forEach(function(c){
      var key=c.lote_nome||"Convite Direto";
      if(!lotesNoEv[key])lotesNoEv[key]={azul:0,amar:0,verde:0,pessoas:[]};
      lotesNoEv[key].pessoas.push(c);
      if(c.bilhete_confirmado)lotesNoEv[key].verde++;
      else if(c.bilhete_enviado)lotesNoEv[key].amar++;
      else lotesNoEv[key].azul++;
    });

    // Filter by responsavel
    if(filtResp!=="Todos"){
      var hasFilt=false;
      Object.keys(lotesNoEv).forEach(function(k){if(k===filtResp)hasFilt=true;});
      if(!hasFilt)return;
    }

    var evAzul=0,evAmar=0,evVerde=0;
    Object.keys(lotesNoEv).forEach(function(k){
      var l=lotesNoEv[k];
      evAzul+=l.azul;evAmar+=l.amar;evVerde+=l.verde;
    });
    totalAzul+=evAzul;totalAmar+=evAmar;totalVerde+=evVerde;

    var total=evAzul+evAmar+evVerde;
    var pct=total>0?Math.round((evVerde/total)*100):0;

    html+="<div class='ev-card'>";
    html+="<div class='ev-nome'>"+ev.nome+"</div>";
    html+="<div class='ev-det'>"+dataFmt+(ev.horario?" as "+ev.horario:"")+(ev.local?" - "+ev.local:"")+(dias<999?" - "+dias+" dia(s)":"")+"</div>";

    // Progress bar
    html+="<div class='progress-bar'><div class='progress-fill' style='width:"+pct+"%'></div></div>";
    html+="<div style='font-size:10px;color:#555;text-align:right;margin-bottom:10px;margin-top:3px'>"+evVerde+"/"+total+" confirmados ("+pct+"%)</div>";

    // Lote blocks
    Object.keys(lotesNoEv).forEach(function(k){
      if(filtResp!=="Todos"&&k!==filtResp)return;
      var l=lotesNoEv[k];
      var ltotal=l.azul+l.amar+l.verde;
      html+="<div class='lote-block'>";
      html+="<div class='lote-header'>";
      html+="<div class='lote-nome'>"+k+"</div>";
      html+="<div class='lote-badges'>";
      if(l.azul)html+="<span class='badge' style='background:rgba(8,145,178,.2);color:#0891b2'>"+l.azul+"</span>";
      if(l.amar)html+="<span class='badge' style='background:rgba(201,151,60,.2);color:#c9973c'>"+l.amar+"</span>";
      if(l.verde)html+="<span class='badge' style='background:rgba(42,171,71,.2);color:#2aab47'>"+l.verde+"</span>";
      html+="</div></div>";
      html+="<div class='lote-stats'>";
      html+="<div class='ls' style='background:rgba(8,145,178,.1);border:1px solid rgba(8,145,178,.2)'><span class='ls-n' style='color:#0891b2'>"+l.azul+"</span><div class='ls-l' style='color:#0891b2'>Nao env.</div></div>";
      html+="<div class='ls' style='background:rgba(201,151,60,.1);border:1px solid rgba(201,151,60,.2)'><span class='ls-n' style='color:#c9973c'>"+l.amar+"</span><div class='ls-l' style='color:#c9973c'>Aguard.</div></div>";
      html+="<div class='ls' style='background:rgba(42,171,71,.1);border:1px solid rgba(42,171,71,.2)'><span class='ls-n' style='color:#2aab47'>"+l.verde+"</span><div class='ls-l' style='color:#2aab47'>Confirm.</div></div>";
      html+="</div>";
      // Mini progress
      var lpct=ltotal>0?Math.round((l.verde/ltotal)*100):0;
      html+="<div class='progress-bar'><div class='progress-fill' style='width:"+lpct+"%'></div></div>";
      html+="<div style='font-size:10px;color:#555;text-align:right;margin-top:3px'>"+l.verde+"/"+ltotal+" ("+lpct+"%)</div>";
      html+="</div>";
    });

    html+="<a href='bilhetes.html?ev="+ev.id+"' class='btn-ver' style='margin-top:8px'>Ver e enviar bilhetes</a>";
    html+="</div>";
  });

  document.getElementById("t-azul").textContent=totalAzul;
  document.getElementById("t-amar").textContent=totalAmar;
  document.getElementById("t-verde").textContent=totalVerde;
  document.getElementById("conteudo").innerHTML=html||"<div class='loading' style='color:#555'>Nenhum resultado.</div>";
}

Promise.all([
  ap("eventos?select=*&order=data.asc"),
  ap("cadastros?select=id,nome,evento_id,bilhete_enviado,bilhete_confirmado,lote_nome&order=nome.asc&limit=500"),
  ap("lotes?select=*&order=criado_em.desc")
]).then(function(res){
  allEvs=res[0]||[];
  allCads=res[1]||[];
  allLotes=res[2]||[];
  // Populate orcamento dropdown
  var orcSel=document.getElementById("ev-orc");
  if(orcSel){orcSel.innerHTML="<option value=''>Selecione um evento...</option>";allEvs.forEach(function(ev){orcSel.innerHTML+="<option value='"+ev.id+"'>"+ev.nome+" ("+fd(ev.data)+")</option>";});}

  // Build responsavel filter from lote names
  var resps={"Todos":true};
  allCads.forEach(function(c){if(c.lote_nome)resps[c.lote_nome]=true;});
  resps["Convite Direto"]=true;
  var respList=Object.keys(resps);

  var fw=document.getElementById("filtros-wrap");
  fw.innerHTML=respList.map(function(r){
    var sid="chip-"+r.replace(/\s/g,"_").replace(/[^a-zA-Z0-9_]/g,"");
    return "<button class='chip"+(r==="Todos"?" on":"")+"' id='"+sid+"' onclick='setFilt(\""+r.replace(/"/g,"&quot;")+"\")'>" +r+"</button>";
  }).join("");
  fw.style.display="flex";
  document.getElementById("total-bar").style.display="grid";
  render();
}).catch(function(){
  document.getElementById("conteudo").innerHTML="<div class='loading'>Erro ao carregar.</div>";
});

// ORCAMENTO ADDON
var evOrcAtual=null;
var itensOrc=[];
var CATS={"Artista":["Cache do artista","Passagem aerea artista","Passagem aerea banda","Hospedagem artista","Hospedagem banda","Translado aeroporto hotel","Translado hotel show","Alimentacao camarim"],"Estrutura Tecnica":["Sistema de som PA","Iluminacao","Gerador","Palco montagem desmontagem","Backline instrumentos","Telao LED"],"Local":["Aluguel do espaco","Banheiro quimico","Seguranca","Limpeza","Estacionamento","Energia eletrica"],"Equipe":["Garcom","Bartender","Producao local","Portaria credenciamento","Fotografo","Videomaker"],"Bebidas":["Agua mineral cx 24un","Cerveja cx 24un","Chope barril","Whisky garrafa","Vodca garrafa","Gin garrafa","Agua de coco cx","Refrigerante cx","Licor garrafa","Energetico cx","Gelo saco 5kg","Copo descartavel pct"],"Comunicacao":["Flyers impressao","Midia social trafego pago","Ingressos impressos"]};
function fmt(v){return"R$ "+parseFloat(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});}
function selecionarEvOrc(){
  var evId=document.getElementById("ev-orc").value;
  document.getElementById("conteudo").innerHTML="";
  document.getElementById("ev-orc-info").innerHTML="";
  if(!evId)return;
  evOrcAtual=null;
  for(var i=0;i<allEvs.length;i++){if(allEvs[i].id==evId){evOrcAtual=allEvs[i];break;}}
  if(!evOrcAtual)return;
  document.getElementById("ev-orc-info").innerHTML="<div style='font-size:14px;font-weight:700;color:#fff'>"+evOrcAtual.nome+"</div><div style='font-size:11px;color:#555'>"+fd(evOrcAtual.data)+(evOrcAtual.horario?" as "+evOrcAtual.horario:"")+(evOrcAtual.local?" - "+evOrcAtual.local:"")+"</div>";
  carregarItensOrc();
}
function carregarItensOrc(){
  ap("orcamentos?evento_id=eq."+evOrcAtual.id+"&order=categoria.asc,item.asc").then(function(d){
    itensOrc=Array.isArray(d)?d:[];
    renderOrc();
  });
}
function renderOrc(){
  var tot=0;var pc={};
  itensOrc.forEach(function(it){var v=parseFloat(it.valor_total)||0;tot+=v;if(!pc[it.categoria])pc[it.categoria]=0;pc[it.categoria]+=v;});
  var html="<div style='background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:14px;margin-bottom:12px'><div style='font-size:11px;color:#555;margin-bottom:4px'>TOTAL ESTIMADO</div><div style='font-size:24px;font-weight:900;color:#2aab47'>"+fmt(tot)+"</div>";
  if(Object.keys(pc).length){html+="<div style='border-top:1px solid #1a2a1a;margin-top:10px;padding-top:10px;display:flex;flex-wrap:wrap;gap:6px'>";Object.keys(pc).forEach(function(c){html+="<div style='font-size:10px;background:#060a06;border:1px solid #1a2a1a;border-radius:6px;padding:3px 8px;color:#888'>"+c+": <b style='color:#eee'>"+fmt(pc[c])+"</b></div>";});html+="</div>";}
  html+="</div>";
  html+="<div style='display:flex;gap:8px;margin-bottom:16px'><button onclick='abrirModalOrc(null)' style='flex:1;background:#1e7a35;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#fff;cursor:pointer'>+ Adicionar item</button><button onclick='carregarItensOrc()' style='background:transparent;border:1px solid #1a2a1a;border-radius:10px;padding:12px;font-size:20px;color:#eee;cursor:pointer'>&#8635;</button></div>";
  Object.keys(CATS).forEach(function(cat){
    var ci=itensOrc.filter(function(it){return it.categoria===cat;});
    if(!ci.length)return;
    var ct=ci.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
    var cid="c_"+cat.replace(/[^a-z0-9]/gi,"");
    html+="<div style='margin-bottom:8px'>";
    html+="<div onclick='togOrc(\\'+cid+'\\')' style='background:#090e09;border:1px solid #1a2a1a;border-radius:12px 12px 0 0;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between'>";
    html+="<span style='font-size:13px;font-weight:700;color:#eee'>"+cat+"</span><span style='font-size:13px;font-weight:700;color:#2aab47'>"+fmt(ct)+"</span></div>";
    html+="<div id='"+cid+"' style='display:none;background:#060a06;border:1px solid #1a2a1a;border-top:none;border-radius:0 0 12px 12px'>";
    ci.forEach(function(it){
      html+="<div style='padding:10px 14px;border-bottom:1px solid #0a0f0a;display:flex;justify-content:space-between;align-items:center'>";
      html+="<div style='flex:1'><div style='font-size:13px;color:#eee'>"+it.item+"</div><div style='font-size:10px;color:#555'>"+it.quantidade+"x "+fmt(it.valor_unitario)+(it.observacao?" - "+it.observacao:"")+"</div></div>";
      html+="<div style='display:flex;align-items:center;gap:6px'><span style='font-size:13px;font-weight:700;color:#fff'>"+fmt(it.valor_total)+"</span>";
      html+="<button onclick='abrirModalOrc("+it.id+")' style='background:transparent;border:1px solid #555;color:#888;border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer'>Ed</button>";
      html+="<button onclick='deletarItemOrc("+it.id+")' style='background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer'>X</button>";
      html+="</div></div>";
    });
    html+="</div></div>";
  });
  if(itensOrc.length)html+="<button onclick='gerarPDFOrc()' style='width:100%;background:#0891b2;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px'>Gerar PDF</button>";
  document.getElementById("conteudo").innerHTML=html;
}

function abrirModalOrc(id){
  var item=null;if(id!==null){for(var i=0;i<itensOrc.length;i++){if(itensOrc[i].id===id){item=itensOrc[i];break;}}}
  var cs=document.getElementById("m-orc-cat");if(!cs)return;
  cs.innerHTML="";Object.keys(CATS).forEach(function(c){cs.innerHTML+="<option>"+c+"</option>";});
  if(item){document.getElementById("m-orc-id").value=item.id;cs.value=item.categoria;atualizarSelectOrc(item.categoria);document.getElementById("m-orc-item").value=item.item;document.getElementById("m-orc-qtd").value=item.quantidade;document.getElementById("m-orc-val").value=item.valor_unitario;document.getElementById("m-orc-obs").value=item.observacao||"";document.getElementById("m-orc-title").textContent="Editar item";}
  else{document.getElementById("m-orc-id").value="";atualizarSelectOrc(Object.keys(CATS)[0]);document.getElementById("m-orc-item").value="";document.getElementById("m-orc-qtd").value="1";document.getElementById("m-orc-val").value="";document.getElementById("m-orc-obs").value="";document.getElementById("m-orc-title").textContent="Adicionar item";}
  document.getElementById("modal-orc").style.display="flex";
}
function atualizarSelectOrc(cat){var s=document.getElementById("m-orc-item");s.innerHTML="";(CATS[cat]||[]).forEach(function(i){s.innerHTML+="<option>"+i+"</option>";});s.innerHTML+="<option>Outro</option>";}
function deletarItemOrc(id){if(!confirm("Excluir?"))return;fetch(SB+"/rest/v1/orcamentos?id=eq."+id,{method:"DELETE",headers:{"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json","Prefer":"return=minimal"}}).then(function(){carregarItensOrc();});}
function salvarItemOrc(){
  var id=document.getElementById("m-orc-id").value;
  var cat=document.getElementById("m-orc-cat").value;
  var item=document.getElementById("m-orc-item").value;
  var qtd=parseFloat(document.getElementById("m-orc-qtd").value)||1;
  var val=parseFloat(document.getElementById("m-orc-val").value)||0;
  var obs=document.getElementById("m-orc-obs").value;
  if(!item){alert("Preencha o item!");return;}
  var btn=document.getElementById("m-orc-save");btn.textContent="Salvando...";btn.disabled=true;
  var body=JSON.stringify({evento_id:evOrcAtual.id,categoria:cat,item:item,quantidade:qtd,valor_unitario:val,valor_total:qtd*val,observacao:obs});
  var path=SB+"/rest/v1/"+(id?"orcamentos?id=eq."+id:"orcamentos");
  var meth=id?"PATCH":"POST";
  fetch(path,{method:meth,headers:{"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json","Prefer":"return=minimal"},body:body}).then(function(){document.getElementById("modal-orc").style.display="none";btn.textContent="Salvar";btn.disabled=false;carregarItensOrc();}).catch(function(){alert("Erro!");btn.textContent="Salvar";btn.disabled=false;});
}
function gerarPDFOrc(){
  if(!evOrcAtual||!itensOrc.length)return;
  var tot=itensOrc.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
  var cats={};itensOrc.forEach(function(it){if(!cats[it.categoria])cats[it.categoria]=[];cats[it.categoria].push(it);});
  var win=window.open("","_blank");
  var h="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Orcamento</title><style>body{font-family:Arial;max-width:600px;margin:0 auto;padding:20px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}th{background:#f5f5f5;font-size:11px}@media print{button{display:none}}</style></head><body>";

h+=”<h1>AGROPLAY</h1><h3>”+evOrcAtual.nome+”</h3><p>”+fd(evOrcAtual.data)+(evOrcAtual.horario?” as “+evOrcAtual.horario:””)+”</p>”;
h+=”<div style='background:#f0fff0;padding:12px;margin:16px 0;display:flex;justify-content:space-between'><b>TOTAL ESTIMADO</b><b style='font-size:20px;color:#1e7a35'>”+fmt(tot)+”</b></div>”;
Object.keys(cats).forEach(function(cat){var ct=cats[cat].reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);h+=”<h4 style='background:#eee;padding:8px;margin:12px 0 0'>”+cat+” - “+fmt(ct)+”</h4><table><tr><th>Item</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr>”;cats[cat].forEach(function(it){h+=”<tr><td>”+it.item+”</td><td>”+it.quantidade+”</td><td>”+fmt(it.valor_unitario)+”</td><td><b>”+fmt(it.valor_total)+”</b></td></tr>”;});h+=”</table>”;});
h+=”<br><button onclick='window.print()' style='width:100%;background:#1e7a35;color:#fff;border:none;padding:12px;font-size:14px;cursor:pointer'>Imprimir / Salvar PDF</button></body></html>”;
win.document.write(h);win.document.close();
}
// Populate ev-orc select when allEvs loads
var _origRender=typeof render===‘function’?render:null;

</script>

<div id="modal-orc" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;align-items:flex-end;justify-content:center">
<div style="background:#0d150d;border:1px solid #1a2a1a;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span id="m-orc-title" style="font-size:16px;font-weight:900;color:#fff">Adicionar item</span><button onclick="document.getElementById('modal-orc').style.display='none'" style="background:transparent;border:none;color:#555;font-size:22px;cursor:pointer">x</button></div>
<input type="hidden" id="m-orc-id">
<label style="display:block;font-size:10px;color:#2aab47;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Categoria</label>
<select id="m-orc-cat" onchange="atualizarSelectOrc(this.value)" style="width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:8px;padding:10px;color:#eee;font-size:13px;outline:none;margin-bottom:8px"></select>
<label style="display:block;font-size:10px;color:#2aab47;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Item</label>
<select id="m-orc-item" style="width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:8px;padding:10px;color:#eee;font-size:13px;outline:none;margin-bottom:8px"></select>
<label style="display:block;font-size:10px;color:#2aab47;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Quantidade</label>
<input type="number" id="m-orc-qtd" value="1" step="0.5" style="width:100%;background:#030503;border:1px solid #1a2a1a;border-radius:8px;padding:10px;color:#eee;font-size:13px;outline:none;margin-bottom:8px">
<label style="display:block;font-size:10px;color:#2aab47;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Valor unitario R$</label>
<input type="number" id="m-orc-val" placeholder="0.00" step="0.01" style="width:100%;background:#030503;border:1px solid #1a2a1a;border-radius:8px;padding:10px;color:#eee;font-size:13px;outline:none;margin-bottom:8px">
<label style="display:block;font-size:10px;color:#2aab47;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Observacao</label>
<input type="text" id="m-orc-obs" placeholder="Ex: inclui retorno" style="width:100%;background:#030503;border:1px solid #1a2a1a;border-radius:8px;padding:10px;color:#eee;font-size:13px;outline:none;margin-bottom:8px">
<button id="m-orc-save" onclick="salvarItemOrc()" style="width:100%;background:#2aab47;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;color:#fff;cursor:pointer">Salvar</button>
</div></div>
</body>
</html>
