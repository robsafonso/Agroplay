<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay - Orcamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;padding:16px;max-width:480px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{cursor:pointer;display:flex;align-items:center;border:1px solid #1a2a1a;border-radius:10px;overflow:hidden}
.lt{background:#0d150d;padding:7px 12px;font-size:16px;font-weight:900;color:#fff}
.lt span{color:#2aab47}
.lv{background:#c9973c;padding:7px 10px;font-size:11px;font-weight:700;color:#fff}
.back{background:transparent;border:1px solid #1a2a1a;border-radius:8px;padding:6px 12px;color:#eee;font-size:12px;text-decoration:none}
select{width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px;color:#eee;font-size:13px;margin-bottom:10px}
input,textarea{width:100%;background:#030503;border:1px solid #1a2a1a;border-radius:8px;padding:10px 12px;color:#eee;font-size:13px;margin-bottom:8px}
label{display:block;font-size:10px;color:#2aab47;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.loading{text-align:center;padding:40px;color:#555}
/* Modal */
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:9999;justify-content:center;align-items:flex-end}
.modal-box{background:#0d150d;border:1px solid #1a2a1a;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:900;color:#fff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo" onclick="location.href='home.html'">
    <div class="lt">AGRO<span>PLAY</span></div>
    <div class="lv">Orcamento</div>
  </div>
  <a href="home.html" class="back">&larr; Menu</a>
</div>

<select id="ev-sel" onchange="selecionarEvento()">
  <option value="">Selecione um evento...</option>
</select>

<div id="ev-info" style="margin-bottom:12px"></div>
<div id="conteudo"></div>

<!-- Modal adicionar/editar item -->

<div id="modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="m-title">Adicionar item</span>
      <button onclick="document.getElementById('modal').style.display='none'" style="background:transparent;border:none;color:#555;font-size:20px;cursor:pointer">X</button>
    </div>
    <input type="hidden" id="m-id">
    <label>Categoria</label>
    <select id="m-cat" onchange="atualizarItensSelect(this.value)" style="margin-bottom:8px"></select>
    <label>Item</label>
    <select id="m-item" style="margin-bottom:8px"></select>
    <label>Quantidade</label>
    <input type="number" id="m-qtd" value="1" min="1" step="0.5">
    <label>Valor unitario (R$)</label>
    <input type="number" id="m-val" placeholder="0.00" step="0.01">
    <label>Observacao (opcional)</label>
    <input type="text" id="m-obs" placeholder="Ex: incluir passagem de retorno">
    <button id="m-save" onclick="salvarItem()" style="width:100%;background:#2aab47;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:4px">Salvar</button>
  </div>
</div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";
var evAtual=null;
var itens=[];

var CATEGORIAS={
  "Artista":["Cache do artista","Passagem aerea (artista)","Passagem aerea (banda)","Hospedagem artista","Hospedagem banda","Translado aeroporto/hotel","Translado hotel/show","Alimentacao camarim"],
  "Estrutura Tecnica":["Sistema de som (PA)","Iluminacao","Gerador","Palco (montagem/desmontagem)","Backline (instrumentos)","Telao/LED","Intercomunicadores"],
  "Local":["Aluguel do espaco","Banheiro quimico","Seguranca","Limpeza","Estacionamento","Energia eletrica"],
  "Equipe":["Garcom","Bartender","Producao local","Portaria/credenciamento","Fotografo","Videomaker","MC/Apresentador"],
  "Bebidas":["Agua mineral (cx 24un)","Cerveja (cx 24un)","Refrigerante (cx)","Drinks/coqueteis (litro)","Gelo (saco 5kg)","Copo descartavel (pct)"],
  "Comunicacao":["Flyers/impressao","Midia social/trafego pago","Assessoria de imprensa","Ingressos impressos"]
};

function ap(path,o){
  if(!o){return fetch(SB+"/rest/v1/"+path,{headers:{"apikey":KY,"Authorization":"Bearer "+KY}}).then(function(r){return r.json();});}
  var h={"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json"};
  if(o.pref)h["Prefer"]=o.pref;
  return fetch(SB+"/rest/v1/"+path,{method:o.m||"GET",headers:h,body:o.b}).then(function(r){return r.text();}).then(function(t){return t?JSON.parse(t):null;});
}
function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}
function fmt(v){return "R$ "+parseFloat(v||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function tog(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==="none"?"block":"none";}

function loadEventos(){
  ap("eventos?select=id,nome,data&order=data.asc").then(function(evs){
    var sel=document.getElementById("ev-sel");
    sel.innerHTML="<option value=''>Selecione um evento</option>";
    (evs||[]).forEach(function(ev){
      sel.innerHTML+="<option value='"+ev.id+"'>"+ev.nome+" ("+fd(ev.data)+")</option>";
    });
  });
}

function selecionarEvento(){
  var evId=document.getElementById("ev-sel").value;
  if(!evId){document.getElementById("conteudo").innerHTML="";return;}
  ap("eventos?id=eq."+evId+"&select=*").then(function(d){
    evAtual=d&&d[0];
    if(!evAtual)return;
    document.getElementById("ev-info").innerHTML="<div style='font-size:14px;font-weight:700;color:#fff'>"+evAtual.nome+"</div><div style='font-size:11px;color:#555'>"+fd(evAtual.data)+(evAtual.horario?" as "+evAtual.horario:"")+(evAtual.local?" - "+evAtual.local:"")+"</div>";
    loadItens(evId);
  });
}

function loadItens(evId){
  ap("orcamentos?evento_id=eq."+evId+"&order=categoria.asc,item.asc").then(function(d){
    itens=d||[];
    renderOrcamento();
  });
}

function renderOrcamento(){
  if(!evAtual){return;}
  var totalEst=0;
  var html="";

  // Summary bar
  var totalPorCat={};
  itens.forEach(function(it){
    totalEst+=parseFloat(it.valor_total||0);
    if(!totalPorCat[it.categoria])totalPorCat[it.categoria]=0;
    totalPorCat[it.categoria]+=parseFloat(it.valor_total||0);
  });

  html+="<div style='background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:14px;margin-bottom:16px'>";
  html+="<div style='display:flex;justify-content:space-between;align-items:center'>";
  html+="<div style='font-size:12px;color:#555'>TOTAL ESTIMADO</div>";
  html+="<div style='font-size:22px;font-weight:900;color:#2aab47'>"+fmt(totalEst)+"</div></div>";
  if(itens.length){
    html+="<div style='height:1px;background:#1a2a1a;margin:10px 0'></div>";
    html+="<div style='display:flex;flex-wrap:wrap;gap:6px'>";
    Object.keys(totalPorCat).forEach(function(cat){
      html+="<div style='font-size:10px;background:#060a06;border:1px solid #1a2a1a;border-radius:6px;padding:4px 8px;color:#888'>"+cat+": <b style='color:#eee'>"+fmt(totalPorCat[cat])+"</b></div>";
    });
    html+="</div>";
  }
  html+="</div>";

  // Add item button
  html+="<button onclick='abrirModal()' style='width:100%;background:#1e7a35;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:16px'>+ Adicionar item</button>";

  // Items by category
  var cats=Object.keys(CATEGORIAS);
  // Add any categories from DB not in list
  itens.forEach(function(it){if(cats.indexOf(it.categoria)<0)cats.push(it.categoria);});

  cats.forEach(function(cat){
    var catItens=itens.filter(function(it){return it.categoria===cat;});
    if(!catItens.length)return;
    var catTotal=catItens.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
    var catId="cat_"+cat.replace(/\s/g,"_");

    html+="<div style='margin-bottom:10px'>";
    html+="<div onclick='tog(\""+catId+"\")' style='background:#090e09;border:1px solid #1a2a1a;border-radius:12px 12px 0 0;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center'>";
    html+="<span style='font-size:13px;font-weight:700;color:#eee'>"+cat+"</span>";
    html+="<span style='font-size:13px;font-weight:700;color:#2aab47'>"+fmt(catTotal)+" &#9660;</span></div>";
    html+="<div id='"+catId+"' style='background:#060a06;border:1px solid #1a2a1a;border-top:none;border-radius:0 0 12px 12px'>";

    catItens.forEach(function(it){
      html+="<div style='padding:10px 14px;border-bottom:1px solid #0a0f0a;display:flex;justify-content:space-between;align-items:center'>";
      html+="<div style='flex:1'>";
      html+="<div style='font-size:13px;color:#eee'>"+it.item+"</div>";
      html+="<div style='font-size:10px;color:#555;margin-top:2px'>"+it.quantidade+"x "+fmt(it.valor_unitario)+(it.observacao?"  -  "+it.observacao:"")+"</div>";
      html+="</div>";
      html+="<div style='display:flex;align-items:center;gap:8px'>";
      html+="<span style='font-size:13px;font-weight:700;color:#fff'>"+fmt(it.valor_total)+"</span>";
      html+="<button onclick='editarItem("+it.id+")' style='background:transparent;border:1px solid #555;color:#888;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer'>Edit</button>";
      html+="<button onclick='deletarItem("+it.id+")' style='background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer'>X</button>";
      html+="</div></div>";
    });
    html+="</div></div>";
  });

  document.getElementById("conteudo").innerHTML=html;
}

function abrirModal(item){
  var m=document.getElementById("modal");
  var cats=Object.keys(CATEGORIAS);
  var catSel=document.getElementById("m-cat");
  catSel.innerHTML=cats.map(function(c){return "<option value='"+c+"'>"+c+"</option>";}).join("");
  if(item){
    document.getElementById("m-id").value=item.id;
    catSel.value=item.categoria;
    atualizarItensSelect(item.categoria);
    document.getElementById("m-item").value=item.item;
    document.getElementById("m-qtd").value=item.quantidade;
    document.getElementById("m-val").value=item.valor_unitario;
    document.getElementById("m-obs").value=item.observacao||"";
    document.getElementById("m-title").textContent="Editar item";
  } else {
    document.getElementById("m-id").value="";
    document.getElementById("m-item").value="";
    document.getElementById("m-qtd").value="1";
    document.getElementById("m-val").value="";
    document.getElementById("m-obs").value="";
    document.getElementById("m-title").textContent="Adicionar item";
    atualizarItensSelect(cats[0]);
  }
  m.style.display="flex";
}

function atualizarItensSelect(cat){
  var items=CATEGORIAS[cat]||[];
  var sel=document.getElementById("m-item");
  var oldVal=sel.value;
  sel.innerHTML=items.map(function(i){return "<option value='"+i+"'>"+i+"</option>";}).join("")+"<option value='outro'>Outro (digitar)</option>";
  if(oldVal&&items.indexOf(oldVal)>=0)sel.value=oldVal;
}

function editarItem(id){
  var it=itens.filter(function(i){return i.id===id;})[0];
  if(it)abrirModal(it);
}

function deletarItem(id){
  if(!confirm("Excluir este item?"))return;
  ap("orcamentos?id=eq."+id,{m:"DELETE",pref:"return=minimal"}).then(function(){
    itens=itens.filter(function(i){return i.id!==id;});
    renderOrcamento();
  });
}

function salvarItem(){
  var id=document.getElementById("m-id").value;
  var cat=document.getElementById("m-cat").value;
  var itemVal=document.getElementById("m-item").value;
  var qtd=parseFloat(document.getElementById("m-qtd").value)||1;
  var val=parseFloat(document.getElementById("m-val").value)||0;
  var obs=document.getElementById("m-obs").value;
  var total=qtd*val;

  if(!itemVal){alert("Preencha o item!");return;}

  var body=JSON.stringify({evento_id:evAtual.id,categoria:cat,item:itemVal,quantidade:qtd,valor_unitario:val,valor_total:total,observacao:obs});
  var btn=document.getElementById("m-save");
  btn.textContent="Salvando...";btn.disabled=true;

  if(id){
    ap("orcamentos?id=eq."+id,{m:"PATCH",pref:"return=minimal",b:body}).then(function(){
      document.getElementById("modal").style.display="none";
      loadItens(evAtual.id);
      btn.textContent="Salvar";btn.disabled=false;
    });
  } else {
    ap("orcamentos",{m:"POST",pref:"return=minimal",b:body}).then(function(){
      document.getElementById("modal").style.display="none";
      loadItens(evAtual.id);
      btn.textContent="Salvar";btn.disabled=false;
    });
  }
}

loadEventos();

</script>

</body>
</html>
