<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agroplay - Orcamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060a06;color:#eee;font-family:-apple-system,Arial,sans-serif;padding:14px;max-width:480px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #2aab47}
.logo{cursor:pointer;display:flex;border:1px solid #1a2a1a;border-radius:10px;overflow:hidden}
.lt{background:#0d150d;padding:7px 12px;font-size:16px;font-weight:900;color:#fff}
.lt span{color:#2aab47}
.lv{background:#c9973c;padding:7px 10px;font-size:11px;font-weight:700;color:#000}
.btn-sair{background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
h1{font-size:20px;color:#fff;margin-bottom:3px}
.sub{font-size:12px;color:#888;margin-bottom:14px}
select,input{width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px;color:#eee;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
select:focus,input:focus{border-color:#2aab47}
.lbl{font-size:11px;color:#2aab47;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.box-evento{background:#0a1f12;border:1px solid #1e7a35;border-radius:12px;padding:14px;margin:14px 0}
.box-evento b{color:#2aab47;display:block;font-size:15px;margin-bottom:4px}
.box-evento span{color:#999;font-size:12px}
.tot-card{background:#0a2818;border:2px solid #2aab47;border-radius:14px;padding:18px;margin-bottom:16px;text-align:center}
.tot-lbl{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:6px}
.tot-val{font-size:32px;font-weight:900;color:#2aab47}
.cat-card{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;margin-bottom:12px;overflow:hidden}
.cat-head{background:#0d150d;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.cat-nome{font-size:14px;font-weight:700;color:#eee}
.cat-tot{font-size:13px;font-weight:700;color:#2aab47}
.it{padding:10px 14px;border-bottom:1px solid #0a0f0a;display:flex;justify-content:space-between;align-items:center;gap:8px}
.it:last-child{border-bottom:none}
.it-info{flex:1;min-width:0}
.it-nome{font-size:13px;color:#eee;margin-bottom:2px}
.it-det{font-size:10px;color:#666}
.it-val{font-size:13px;font-weight:700;color:#2aab47;white-space:nowrap}
.it-del{background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.add-area{padding:10px 12px;border-top:1px solid #1a2a1a;background:#070b07}
.add-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.add-row select,.add-row input{margin-bottom:0;background:#030503;padding:9px;font-size:12px}
.add-row select{flex:1;min-width:120px}
.add-row .qtd{flex:0 0 60px}
.add-row .vlr{flex:0 0 90px}
.add-btn{background:#1e7a35;border:none;border-radius:8px;padding:9px 14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.outro-input{margin-top:6px;display:none}
.btn-pdf{width:100%;background:#0891b2;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin:14px 0 20px}
.empty{text-align:center;padding:20px 14px;color:#555;font-size:12px}
.btn-entrar{width:100%;background:#1e7a35;border:none;border-radius:10px;padding:14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
#debug{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 10px;margin:10px 0;font-size:10px;color:#888;font-family:monospace;word-break:break-all;max-height:120px;overflow:auto}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo" onclick="location.href='home.html'">
    <div class="lt">AGRO<span>PLAY</span></div>
    <div class="lv">v32</div>
  </div>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<h1>Orcamento</h1>
<div class="sub">Custos de producao do evento</div>

<div style="background:#c9973c;color:#000;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:10px;text-align:center">VERSAO 10</div>

<div id="debug">DEBUG</div>

<div id="login" style="display:none">
  <label class="lbl">Login Admin</label>
  <input type="text" id="admU" placeholder="Usuario">
  <input type="password" id="admP" placeholder="Senha">
  <button class="btn-entrar" onclick="logar()">Entrar</button>
  <div id="lmsg" style="color:#c0392b;font-size:12px;margin-top:8px;text-align:center"></div>
</div>

<div id="painel" style="display:none">
  <label class="lbl">Selecione o evento</label>
  <select id="esel" onchange="selEv()">
    <option value="">Carregando...</option>
  </select>
  <div id="einfo"></div>
  <div id="conteudo"></div>
</div>

<script src="orcamento.js"></script>

</body>
</html>
