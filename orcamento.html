<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay v32 - Orçamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060a06;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:14px;max-width:480px;margin:0 auto;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #2aab47}
.logo{cursor:pointer;display:flex;align-items:center;border:1px solid #1a2a1a;border-radius:10px;overflow:hidden}
.lt{background:#0d150d;padding:7px 12px;font-size:16px;font-weight:900;color:#fff}
.lt span{color:#2aab47}
.lv{background:#c9973c;padding:7px 10px;font-size:11px;font-weight:700;color:#000}
.btn-sair{background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:700}
.title-area{margin-bottom:14px}
.title-area h1{font-size:20px;color:#fff;font-weight:700;margin-bottom:3px}
.title-area p{font-size:12px;color:#888}
select,input{width:100%;background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px;color:#eee;font-size:13px;outline:none;font-family:inherit}
select:focus,input:focus{border-color:#2aab47}
.lbl{font-size:11px;color:#2aab47;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.ev-info{background:#0a1f12;border:1px solid #1e7a35;border-radius:12px;padding:14px;margin:14px 0;font-size:13px}
.ev-info b{color:#2aab47;display:block;font-size:15px;margin-bottom:4px}
.ev-info span{color:#999;font-size:12px}
.tot-card{background:linear-gradient(135deg,#0a1f12,#0a2818);border:2px solid #2aab47;border-radius:14px;padding:18px;margin-bottom:16px;text-align:center}
.tot-card .lbl-tot{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.tot-card .val-tot{font-size:32px;font-weight:900;color:#2aab47}
.cat-card{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;margin-bottom:12px;overflow:hidden}
.cat-head{background:#0d150d;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.cat-head .cat-nome{font-size:14px;font-weight:700;color:#eee;display:flex;align-items:center;gap:8px}
.cat-head .cat-emoji{font-size:18px}
.cat-head .cat-tot{font-size:13px;font-weight:700;color:#2aab47}
.cat-body{padding:0}
.it-row{padding:10px 14px;border-bottom:1px solid #0a0f0a;display:flex;justify-content:space-between;align-items:center;gap:8px}
.it-row:last-child{border-bottom:none}
.it-info{flex:1;min-width:0}
.it-nome{font-size:13px;color:#eee;margin-bottom:2px;word-break:break-word}
.it-det{font-size:10px;color:#666}
.it-val{font-size:13px;font-weight:700;color:#2aab47;white-space:nowrap}
.it-del{background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.add-area{padding:10px 12px;border-top:1px solid #1a2a1a;background:#070b07}
.add-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.add-row select{flex:1;min-width:120px;background:#030503;padding:9px;font-size:12px}
.add-row input{background:#030503;padding:9px;font-size:12px}
.add-row .qtd{flex:0 0 60px}
.add-row .vlr{flex:0 0 90px}
.add-row .add-btn{background:#1e7a35;border:none;border-radius:8px;padding:9px 14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;flex:0 0 auto}
.add-row .add-btn:disabled{opacity:0.5}
.outro-input{background:#030503;font-size:12px;padding:9px;display:none;width:100%;margin-top:6px}
.add-cat{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;gap:8px}
.add-cat input{flex:1;background:#030503;padding:10px;font-size:13px}
.add-cat .add-cat-btn{background:#0891b2;border:none;border-radius:8px;padding:10px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-pdf{width:100%;background:#0891b2;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:20px}
.btn-pdf:hover{background:#0aa6cc}
.empty{text-align:center;padding:30px 14px;color:#555;font-size:13px}
@media(max-width:380px){
  .add-row .qtd{flex:0 0 50px}
  .add-row .vlr{flex:0 0 75px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo" onclick="location.href='home.html'">
    <div class="lt">AGRO<span>PLAY</span></div>
    <div class="lv">v32</div>
  </div>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="title-area">
  <h1>💰 Orçamento</h1>
  <p>Custos de produção do evento</p>
</div>

<div id="login-area" style="display:none">
  <label class="lbl">Login Admin</label>
  <input type="text" id="admUser" placeholder="Usuário" style="margin-bottom:10px">
  <input type="password" id="admPass" placeholder="Senha" style="margin-bottom:10px">
  <button onclick="logar()" style="width:100%;background:#1e7a35;border:none;border-radius:10px;padding:14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">Entrar</button>
  <div id="loginMsg" style="color:#c0392b;font-size:12px;margin-top:8px;text-align:center"></div>
</div>

<div id="painel" style="display:none">
  <label class="lbl">Selecione o evento</label>
  <select id="ev-sel" onchange="selecionarEvento()"><option value="">Carregando...</option></select>
  <div id="ev-info"></div>
  <div id="conteudo"></div>
</div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";

var evAtual=null;
var itens=[];

// 9 categorias com emojis e itens pré-definidos
var CATS={
  "Artista":{
    emoji:"🎤",
    itens:["Cachê do artista","Passagem aérea artista","Passagem aérea banda","Hospedagem artista","Hospedagem banda","Translado aeroporto/hotel","Translado hotel/show","Alimentação camarim","Camareira","Hospitality rider"]
  },
  "Estrutura Técnica":{
    emoji:"🎚️",
    itens:["Sistema de som PA","Sistema monitor","Iluminação","Gerador","Palco montagem/desmontagem","Backline instrumentos","Telão LED","Praticáveis","Casas de força","Cabos extra"]
  },
  "Local":{
    emoji:"📍",
    itens:["Aluguel do espaço","Banheiro químico","Banheiro PCD","Energia elétrica","Limpeza pré-evento","Limpeza pós-evento","Estacionamento","Alvará bombeiros","Alvará prefeitura"]
  },
  "Segurança":{
    emoji:"👮",
    itens:["Segurança patrimonial","Segurança ostensiva","Brigadista","Ambulância","Médico plantonista","Bombeiro civil"]
  },
  "Equipe/Staff":{
    emoji:"👥",
    itens:["Produção local","Portaria/credenciamento","Garçom","Bartender","Copeiro","Fotógrafo","Videomaker","Operador de som","Iluminador","Roadie","Limpeza durante evento"]
  },
  "Bebidas":{
    emoji:"🥃",
    itens:["Whisky garrafa","Vodca garrafa","Gin garrafa","Licor garrafa","Energético cx","Cerveja cx 24un","Chope barril","Refrigerante cx","Água mineral cx 24un","Água de coco cx","Suco cx","Gelo saco 5kg","Copo descartável pct","Canudo pct"]
  },
  "Alimentação":{
    emoji:"🍽️",
    itens:["Buffet convidados","Jantar staff","Café da manhã equipe","Lanche fotógrafo","Frutas camarim","Marmita segurança"]
  },
  "Divulgação":{
    emoji:"📣",
    itens:["Tráfego pago Meta","Tráfego pago Google","Flyers impressão","Banner outdoor","Influenciador","Gráfica geral","Material identidade visual"]
  },
  "Administração":{
    emoji:"💰",
    itens:["ECAD","IRRF","Contador","Seguro evento","Transporte produção","Combustível","Material escritório","Taxa cartão"]
  }
};

// ---------- Init / Login ----------
function init(){
  var logado=sessionStorage.getItem('ag_admin')==='1';
  if(logado){
    document.getElementById('login-area').style.display='none';
    document.getElementById('painel').style.display='block';
    carregarEventos();
  }else{
    document.getElementById('login-area').style.display='block';
    document.getElementById('painel').style.display='none';
  }
}

function logar(){
  var u=document.getElementById('admUser').value.trim();
  var p=document.getElementById('admPass').value.trim();
  var msg=document.getElementById('loginMsg');
  if(!u||!p){msg.textContent='Preencha usuário e senha';return;}
  fetch(SB+"/rest/v1/admins?usuario=eq."+encodeURIComponent(u)+"&senha=eq."+encodeURIComponent(p)+"&select=id",{
    headers:{"apikey":KY,"Authorization":"Bearer "+KY}
  }).then(function(r){return r.json();}).then(function(d){
    if(Array.isArray(d)&&d.length>0){
      sessionStorage.setItem('ag_admin','1');
      init();
    }else{
      msg.textContent='Usuário ou senha inválidos';
    }
  }).catch(function(){msg.textContent='Erro de conexão';});
}

function sair(){
  sessionStorage.removeItem('ag_admin');
  location.reload();
}

// ---------- Helpers ----------
function fmt(v){return "R$ "+parseFloat(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}
function q(id){return document.getElementById(id);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function get(path){return fetch(SB+"/rest/v1/"+path,{headers:{"apikey":KY,"Authorization":"Bearer "+KY}}).then(function(r){return r.json();});}
function post(path,meth,body){return fetch(SB+"/rest/v1/"+path,{method:meth,headers:{"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(body)}).then(function(r){return r.text();});}

// ---------- Eventos ----------
function carregarEventos(){
  get("eventos?select=id,nome,data,horario,local,atracao1,atracao2&order=data.asc").then(function(evs){
    var sel=q("ev-sel");
    if(!Array.isArray(evs)){
      sel.innerHTML="<option value=''>Erro: "+JSON.stringify(evs).substring(0,80)+"</option>";
      return;
    }
    sel.innerHTML="<option value=''>Selecione um evento...</option>";
    if(evs.length===0){
      sel.innerHTML="<option value=''>Nenhum evento cadastrado</option>";
      return;
    }
    evs.forEach(function(ev){
      sel.innerHTML+="<option value='"+ev.id+"'>"+esc(ev.nome)+" ("+fd(ev.data)+")</option>";
    });
    window._evs=evs;
  }).catch(function(e){q("ev-sel").innerHTML="<option value=''>Erro de conexão</option>";});
}

function selecionarEvento(){
  var evId=q("ev-sel").value;
  q("ev-info").innerHTML="";
  q("conteudo").innerHTML="";
  if(!evId){evAtual=null;return;}
  var evs=window._evs||[];
  for(var i=0;i<evs.length;i++){if(evs[i].id==evId){evAtual=evs[i];break;}}
  if(!evAtual)return;
  q("ev-info").innerHTML="<div class='ev-info'><b>"+esc(evAtual.nome)+"</b><span>📅 "+fd(evAtual.data)+(evAtual.horario?" às "+evAtual.horario.substring(0,5):"")+(evAtual.local?" · 📍 "+esc(evAtual.local):"")+"</span></div>";
  carregarItens();
}

function carregarItens(){
  if(!evAtual)return;
  q("conteudo").innerHTML="<div class='empty'>Carregando...</div>";
  get("orcamentos?evento_id=eq."+evAtual.id+"&order=categoria.asc,item.asc").then(function(d){
    itens=Array.isArray(d)?d:[];
    renderizar();
  }).catch(function(){
    q("conteudo").innerHTML="<div class='empty' style='color:#c0392b'>Erro ao carregar.</div>";
  });
}

// ---------- Render ----------
function getCats(){
  // Lista todas as categorias (pré-definidas + as que aparecem nos itens)
  var cats=Object.keys(CATS).slice();
  itens.forEach(function(it){if(cats.indexOf(it.categoria)<0)cats.push(it.categoria);});
  return cats;
}

function renderizar(){
  var tot=itens.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
  var h="";
  
  // Card total geral
  h+="<div class='tot-card'>";
  h+="<div class='lbl-tot'>TOTAL ESTIMADO</div>";
  h+="<div class='val-tot' id='tot-geral'>"+fmt(tot)+"</div>";
  h+="</div>";

  // Cards por categoria
  getCats().forEach(function(cat){
    var ci=itens.filter(function(it){return it.categoria===cat;});
    var ct=ci.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
    var cid="c"+cat.replace(/[^a-z0-9]/gi,"");
    var emoji=(CATS[cat]&&CATS[cat].emoji)||"📦";
    
    h+="<div class='cat-card'>";
    h+="<div class='cat-head'>";
    h+="<div class='cat-nome'><span class='cat-emoji'>"+emoji+"</span>"+esc(cat)+"</div>";
    h+="<div class='cat-tot' id='ctot_"+cid+"'>"+fmt(ct)+"</div>";
    h+="</div>";
    
    h+="<div class='cat-body' id='bloco_"+cid+"'>";
    if(ci.length===0){
      h+="<div class='empty' style='padding:14px;font-size:11px'>Nenhum item ainda</div>";
    }else{
      ci.forEach(function(it){
        h+=renderItem(it);
      });
    }
    h+="</div>";
    
    // Área pra adicionar item
    var opts=(CATS[cat]&&CATS[cat].itens)||[];
    h+="<div class='add-area'>";
    h+="<div class='add-row'>";
    h+="<select id='si_"+cid+"' onchange='toggleOutro(\""+cid+"\")'>";
    opts.forEach(function(i){h+="<option>"+esc(i)+"</option>";});
    h+="<option value='_outro_'>+ Outro item...</option>";
    h+="</select>";
    h+="<input type='number' id='sq_"+cid+"' value='1' step='0.5' min='0' placeholder='Qtd' class='qtd'>";
    h+="<input type='number' id='sv_"+cid+"' placeholder='R$' step='0.01' min='0' class='vlr'>";
    h+="<button class='add-btn' id='sb_"+cid+"' onclick='addItem(\""+cat+"\",\""+cid+"\")'>+</button>";
    h+="</div>";
    h+="<input type='text' id='sn_"+cid+"' placeholder='Nome do item personalizado' class='outro-input'>";
    h+="</div>";
    h+="</div>";
  });
  
  // Adicionar nova categoria
  h+="<div class='add-cat'>";
  h+="<input type='text' id='nova-cat' placeholder='Nova categoria...'>";
  h+="<button class='add-cat-btn' onclick='addCat()'>+ Categoria</button>";
  h+="</div>";
  
  // Botão PDF
  h+="<button class='btn-pdf' onclick='gerarPDF()'>📄 Gerar PDF do Orçamento</button>";
  
  q("conteudo").innerHTML=h;
}

function renderItem(it){
  var h="<div class='it-row'>";
  h+="<div class='it-info'>";
  h+="<div class='it-nome'>"+esc(it.item)+"</div>";
  h+="<div class='it-det'>"+it.quantidade+"× "+fmt(it.valor_unitario)+"</div>";
  h+="</div>";
  h+="<div class='it-val'>"+fmt(it.valor_total)+"</div>";
  h+="<button class='it-del' onclick='delItem(\""+it.id+"\")'>×</button>";
  h+="</div>";
  return h;
}

function toggleOutro(cid){
  var sel=q("si_"+cid);
  var inp=q("sn_"+cid);
  if(sel&&inp){
    inp.style.display=sel.value=='_outro_'?'block':'none';
    if(sel.value=='_outro_')inp.focus();
  }
}

// ---------- CRUD ----------
function addItem(cat,cid){
  if(!evAtual)return;
  var sel=q("si_"+cid);
  var nomInp=q("sn_"+cid);
  var item=(sel&&sel.value=='_outro_')?(nomInp?nomInp.value.trim():''):(sel?sel.value:'');
  var qtd=parseFloat(q("sq_"+cid)?q("sq_"+cid).value:1)||1;
  var val=parseFloat(q("sv_"+cid)?q("sv_"+cid).value:0)||0;
  
  if(!item){alert("Preencha o nome do item!");return;}
  if(!val||val<=0){alert("Digite o valor unitário!");return;}
  
  var btn=q("sb_"+cid);
  if(btn){btn.textContent="...";btn.disabled=true;}
  
  var body={
    evento_id:evAtual.id,
    categoria:cat,
    item:item,
    quantidade:qtd,
    valor_unitario:val,
    valor_total:qtd*val
  };
  
  fetch(SB+"/rest/v1/orcamentos",{
    method:"POST",
    headers:{"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json","Prefer":"return=representation"},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    if(Array.isArray(d)&&d[0]){
      itens.push(d[0]);
    }
    if(q("sv_"+cid))q("sv_"+cid).value="";
    if(q("sq_"+cid))q("sq_"+cid).value="1";
    if(nomInp){nomInp.value="";nomInp.style.display="none";}
    if(sel)sel.selectedIndex=0;
    atualizarCat(cat,cid);
    atualizarTotGeral();
    if(btn){btn.textContent="+";btn.disabled=false;}
  }).catch(function(){
    alert("Erro ao adicionar!");
    if(btn){btn.textContent="+";btn.disabled=false;}
  });
}

function atualizarCat(cat,cid){
  var ci=itens.filter(function(it){return it.categoria===cat;});
  var ct=ci.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
  var bloco=q("bloco_"+cid);
  if(!bloco)return;
  if(ci.length===0){
    bloco.innerHTML="<div class='empty' style='padding:14px;font-size:11px'>Nenhum item ainda</div>";
  }else{
    var h="";
    ci.forEach(function(it){h+=renderItem(it);});
    bloco.innerHTML=h;
  }
  var totEl=q("ctot_"+cid);
  if(totEl)totEl.textContent=fmt(ct);
}

function atualizarTotGeral(){
  var tot=itens.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
  var el=q("tot-geral");
  if(el)el.textContent=fmt(tot);
}

function addCat(){
  var inp=q("nova-cat");
  if(!inp)return;
  var nome=inp.value.trim();
  if(!nome){alert("Digite o nome da categoria!");return;}
  if(CATS[nome]){alert("Categoria já existe!");return;}
  CATS[nome]={emoji:"📦",itens:[]};
  inp.value="";
  renderizar();
}

function delItem(id){
  if(!confirm("Excluir este item?"))return;
  var it=null;
  for(var i=0;i<itens.length;i++){if(itens[i].id===id){it=itens[i];break;}}
  if(!it)return;
  
  fetch(SB+"/rest/v1/orcamentos?id=eq."+id,{
    method:"DELETE",
    headers:{"apikey":KY,"Authorization":"Bearer "+KY}
  }).then(function(){
    itens=itens.filter(function(x){return x.id!==id;});
    var cid="c"+it.categoria.replace(/[^a-z0-9]/gi,"");
    atualizarCat(it.categoria,cid);
    atualizarTotGeral();
  }).catch(function(){alert("Erro ao excluir!");});
}

// ---------- PDF ----------
function gerarPDF(){
  if(!evAtual||!itens.length){alert("Adicione itens ao orçamento primeiro!");return;}
  var tot=itens.reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
  var cats={};
  itens.forEach(function(it){
    if(!cats[it.categoria])cats[it.categoria]=[];
    cats[it.categoria].push(it);
  });
  
  var win=window.open("","_blank");
  var h="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Orçamento - "+esc(evAtual.nome)+"</title>";
  h+="<style>";
  h+="*{box-sizing:border-box;margin:0;padding:0}";
  h+="body{font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:24px;color:#222}";
  h+="h1{color:#1e7a35;font-size:28px;margin-bottom:4px}";
  h+="h2{color:#666;font-size:16px;font-weight:normal;margin-bottom:24px;border-bottom:2px solid #1e7a35;padding-bottom:8px}";
  h+=".totbox{background:#f0fff0;border:2px solid #1e7a35;border-radius:10px;padding:16px;margin:20px 0;display:flex;justify-content:space-between;align-items:center}";
  h+=".totbox b{font-size:14px;color:#666}";
  h+=".totbox .v{font-size:24px;color:#1e7a35;font-weight:900}";
  h+="h3{background:#1e7a35;color:#fff;padding:10px 14px;margin-top:20px;border-radius:6px;font-size:14px;display:flex;justify-content:space-between}";
  h+="table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}";
  h+="th{background:#f5f5f5;padding:8px;border-bottom:2px solid #ddd;text-align:left;font-size:11px;text-transform:uppercase;color:#555}";
  h+="td{padding:8px;border-bottom:1px solid #eee}";
  h+="td:last-child,th:last-child{text-align:right;font-weight:700;color:#1e7a35}";
  h+=".rodape{margin-top:30px;padding-top:14px;border-top:1px solid #ccc;font-size:10px;color:#888;text-align:center}";
  h+="@media print{button{display:none!important}body{padding:14px}}";
  h+=".btn{width:100%;background:#1e7a35;color:#fff;border:none;padding:14px;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px;margin-top:24px}";
  h+="</style></head><body>";

h+=”<h1>AGROPLAY MUSIC</h1>”;
h+=”<h2>Orçamento · “+esc(evAtual.nome)+(evAtual.data?” · “+fd(evAtual.data):””)+”</h2>”;
h+=”<div class='totbox'><b>TOTAL ESTIMADO</b><div class='v'>”+fmt(tot)+”</div></div>”;

// Ordenar categorias na mesma ordem do CATS
var ordemCats=Object.keys(CATS);
Object.keys(cats).forEach(function(c){if(ordemCats.indexOf(c)<0)ordemCats.push(c);});

ordemCats.forEach(function(cat){
if(!cats[cat]||cats[cat].length===0)return;
var ct=cats[cat].reduce(function(s,it){return s+parseFloat(it.valor_total||0);},0);
var emoji=(CATS[cat]&&CATS[cat].emoji)||””;
h+=”<h3><span>”+emoji+” “+esc(cat)+”</span><span>”+fmt(ct)+”</span></h3>”;
h+=”<table><tr><th>Item</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr>”;
cats[cat].forEach(function(it){
h+=”<tr><td>”+esc(it.item)+”</td><td>”+it.quantidade+”</td><td>”+fmt(it.valor_unitario)+”</td><td>”+fmt(it.valor_total)+”</td></tr>”;
});
h+=”</table>”;
});

h+=”<div class='rodape'>Agroplay Music · Londrina/PR · Documento gerado em “+new Date().toLocaleDateString(“pt-BR”)+”</div>”;
h+=”<button class='btn' onclick='window.print()'>📄 Imprimir / Salvar PDF</button>”;
h+=”</body></html>”;

win.document.write(h);
win.document.close();
}

// Init
init();
</script>

</body>
</html>
