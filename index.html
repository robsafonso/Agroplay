<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: Arial, sans-serif;
background: #060a06;
color: #eee;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.card {
width: 100%;
max-width: 380px;
background: #090e09;
border: 1px solid #1a2a1a;
border-radius: 16px;
padding: 36px 26px;
}

.logo {
display: flex;
align-items: center;
justify-content: center;
gap: 0;
margin-bottom: 28px;
}

.logo .a {
background: #0d150d;
padding: 10px 16px;
font-size: 22px;
font-weight: 900;
color: #fff;
letter-spacing: 2px;
border-radius: 10px 0 0 10px;
}

.logo .a span { color: #2aab47; }

.logo .v {
background: #c9973c;
padding: 10px 12px;
font-size: 14px;
font-weight: 700;
color: #fff;
letter-spacing: 1px;
border-radius: 0 10px 10px 0;
}

h1 {
font-size: 16px;
font-weight: 700;
text-align: center;
margin-bottom: 4px;
color: #fff;
}

.subtitle {
text-align: center;
color: #555;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 24px;
}

.field { margin-bottom: 12px; }

label {
display: block;
font-size: 10px;
color: #2aab47;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 5px;
}

input {
width: 100%;
padding: 11px 13px;
background: #030503;
border: 1px solid #1a2a1a;
border-radius: 8px;
color: #eee;
font-size: 14px;
outline: none;
}

input:focus { border-color: #2aab47; }

button {
width: 100%;
padding: 13px;
background: #1e7a35;
color: #fff;
border: none;
border-radius: 8px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
margin-top: 6px;
}

button:hover { background: #2aab47; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.erro {
color: #e74c3c;
font-size: 12px;
text-align: center;
margin-top: 12px;
min-height: 16px;
}

.rodape {
text-align: center;
margin-top: 18px;
font-size: 10px;
color: #333;
}
/* === DESIGN SYSTEM v1.1 — botoes/badges/status padronizados === */
.bti { background: #0891b2; color: #fff; border: none; border-radius: 8px; padding: 9px 13px; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.bti:hover, .bti:active { background: #14a8c9; }
.btc { background: transparent; color: #888; border: 1px solid #333; border-radius: 8px; padding: 9px 13px; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btc:hover, .btc:active { background: rgba(255,255,255,0.05); color: #ccc; }
.st-cinza { background: #333; color: #888; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; letter-spacing: 0.5px; }
.st-azul  { background: #0891b2; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; letter-spacing: 0.5px; }
.st-amar  { background: #c9973c; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; letter-spacing: 0.5px; }
.st-verde { background: #1e7a35; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; letter-spacing: 0.5px; }
.st-verm  { background: #c0392b; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; letter-spacing: 0.5px; }
.resumo-status { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.resumo-status .rs-item { flex: 1; min-width: 60px; text-align: center; border-radius: 8px; padding: 8px 6px; border: 1px solid; }
.resumo-status .rs-item .num { font-size: 18px; font-weight: 900; line-height: 1; margin-bottom: 4px; display: block; }
.resumo-status .rs-item .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.rs-cinza { background: #0d150d; border-color: #333; } .rs-cinza .num, .rs-cinza .lbl { color: #888; }
.rs-azul { background: #0a1f24; border-color: #0891b2; } .rs-azul .num, .rs-azul .lbl { color: #0891b2; }
.rs-amar { background: #2a1f0a; border-color: #c9973c; } .rs-amar .num, .rs-amar .lbl { color: #c9973c; }
.rs-verde { background: #0a2818; border-color: #1e7a35; } .rs-verde .num, .rs-verde .lbl { color: #2aab47; }
.rs-verm { background: #2a0a0a; border-color: #c0392b; } .rs-verm .num, .rs-verm .lbl { color: #c0392b; }
.ai { background: rgba(8, 145, 178, 0.15); border: 1px solid #0891b2; color: #14a8c9; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
.ay { background: rgba(201, 151, 60, 0.15); border: 1px solid #c9973c; color: #c9973c; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top-color: #2aab47; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
/* === FIM DESIGN SYSTEM === */
</style>

</head>
<body>

<div class="card">
  <div class="logo">
    <div class="a">AGRO<span>PLAY</span></div>
    <div class="v">v1.0</div>
  </div>

  <h1>Painel do Administrador</h1>
  <p class="subtitle">Entre com seu acesso</p>

  <div class="field">
    <label>Usuário</label>
    <input type="text" id="usuario" autocomplete="username" autocapitalize="none">
  </div>

  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password">
  </div>

<button id="btn">Entrar</button>

  <div class="erro" id="erro"></div>

  <div class="rodape">Agroplay Music · Londrina PR</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SB_URL = 'https://wexwcnezjadoutyzkbcj.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  const inputUsuario = document.getElementById('usuario');
  const inputSenha = document.getElementById('senha');
  const btn = document.getElementById('btn');
  const erro = document.getElementById('erro');

  async function entrar() {
    erro.textContent = '';

    const usuario = inputUsuario.value.trim();
    const senha = inputSenha.value.trim();

    if (!usuario || !senha) {
      erro.textContent = 'Preencha usuário e senha';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const { data, error } = await sb
      .from('admins')
      .select('id, nome, nivel, ativo')
      .eq('nome', usuario)
      .eq('senha', senha)
      .maybeSingle();

    btn.disabled = false;
    btn.textContent = 'Entrar';

    if (error) {
      erro.textContent = 'Erro ao conectar';
      return;
    }

    if (!data) {
      erro.textContent = 'Usuário ou senha inválidos';
      return;
    }

    if (!data.ativo) {
      erro.textContent = 'Usuário desativado';
      return;
    }

    sessionStorage.setItem('ag_admin', JSON.stringify({
      id: data.id,
      nome: data.nome,
      nivel: data.nivel
    }));

    window.location.href = 'home.html';
  }

  btn.addEventListener('click', entrar);

  inputSenha.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') entrar();
  });

  inputUsuario.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') inputSenha.focus();
  });
</script>

</body>
</html>
