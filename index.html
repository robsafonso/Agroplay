<script>

// ✅ FUNÇÃO TAB CORRIGIDA
function tab(t){
  ["c","e","k","l","lt","h"].forEach(function(x){
    document.getElementById("s"+x).classList.add("gone");
    document.getElementById("t"+x).classList.remove("on");
  });

  document.getElementById("s"+t).classList.remove("gone");
  document.getElementById("t"+t).classList.add("on");
}

// ✅ EXEMPLO DE CLICK CORRIGIDO
document.getElementById("tc").onclick = function(){ tab("c"); };
document.getElementById("te").onclick = function(){ tab("e"); };
document.getElementById("tk").onclick = function(){ tab("k"); };
document.getElementById("tl").onclick = function(){ tab("l"); };
document.getElementById("tlt").onclick = function(){ tab("lt"); };
document.getElementById("tth").onclick = function(){ tab("h"); };
