<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #060a06;
    color: #eee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: #090e09;
    border: 1px solid #1a2a1a;
    border-radius: 16px;
    padding: 36px 26px;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 28px;
  }

  .logo .a {
    background: #0d150d;
    padding: 10px 16px;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    border-radius: 10px 0 0 10px;
  }

  .logo .a span { color: #2aab47; }

  .logo .v {
    background: #c9973c;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    border-radius: 0 10px 10px 0;
  }

  h1 {
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
    color: #fff;
  }

  .subtitle {
    text-align: center;
    color: #555;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .field { margin-bottom: 12px; }

  label {
    display: block;
    font-size: 10px;
    color: #2aab47;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  input {
    width: 100%;
    padding: 11px 13px;
    background: #030503;
    border: 1px solid #1a2a1a;
    border-radius: 8px;
    color: #eee;
    font-size: 14px;
    outline: none;
  }

  input:focus { border-color: #2aab47; }

  button {
    width: 100%;
    padding: 13px;
    background: #1e7a35;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }

  button:hover { background: #2aab47; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .erro {
    color: #e74c3c;
    font-size: 12px;
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
  }

  .rodape {
    text-align: center;
    margin-top: 18px;
    font-size: 10px;
    color: #333;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="a">AGRO<span>PLAY</span></div>
    <div class="v">v32</div>
  </div>

  <h1>Painel do Administrador</h1>
  <p class="subtitle">Entre com seu acesso</p>

  <div class="field">
    <label>Usuário</label>
    <input type="text" id="usuario" autocomplete="username" autocapitalize="none">
  </div>

  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password">
  </div>

  <button id="btn">Entrar</button>

  <div class="erro" id="erro"></div>

  <div class="rodape">Agroplay Music · Londrina PR</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://wexwcnezjadoutyzkbcj.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  const inputUsuario = document.getElementById('usuario');
  const inputSenha = document.getElementById('senha');
  const btn = document.getElementById('btn');
  const erro = document.getElementById('erro');

  async function entrar() {
    erro.textContent = '';

    const usuario = inputUsuario.value.trim();
    const senha = inputSenha.value.trim();

    if (!usuario || !senha) {
      erro.textContent = 'Preencha usuário e senha';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const { data, error } = await sb
      .from('admins')
      .select('id, nome, nivel, ativo')
      .eq('nome', usuario)
      .eq('senha', senha)
      .maybeSingle();

    btn.disabled = false;
    btn.textContent = 'Entrar';

    if (error) {
      erro.textContent = 'Erro ao conectar';
      return;
    }

    if (!data) {
      erro.textContent = 'Usuário ou senha inválidos';
      return;
    }

    if (!data.ativo) {
      erro.textContent = 'Usuário desativado';
      return;
    }

    sessionStorage.setItem('ag_admin', JSON.stringify({
      id: data.id,
      nome: data.nome,
      nivel: data.nivel
    }));

    window.location.href = 'home.html';
  }

  btn.addEventListener('click', entrar);

  inputSenha.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') entrar();
  });

  inputUsuario.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') inputSenha.focus();
  });
</script>

</body>
</html>
