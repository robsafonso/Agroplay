*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#eee;font-family:Arial,sans-serif;font-size:14px;padding:16px}

.tab.on{border-color:#3ab54a;color:#3ab54a;background:rgba(58,181,74,.1)}
.hide{display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px;text-align:left;background:#0d0d0d;color:#444;font-size:9px;text-transform:uppercase;border-bottom:1px solid #222}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{background:transparent;border:1px solid #333;border-radius:20px;padding:4px 10px;color:#555;cursor:pointer;font-size:11px}
.chip.on{border-color:#3ab54a;color:#3ab54a}
.nlink{color:#fff;font-weight:700;cursor:pointer;text-decoration:underline;text-decoration-color:#3ab54a}
.msg{font-size:12px;color:#aaa;line-height:1.7;background:#080808;border-radius:8px;padding:10px;margin-bottom:10px;white-space:pre-wrap;word-break:break-word}
.cod{font-family:monospace;font-size:24px;font-weight:900;color:#fff;letter-spacing:4px;margin:8px 0 12px}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.ovc{align-items:center!important;justify-content:center!important}
.mod{background:#111;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto}
.prow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.prow span:first-child{color:#555;font-size:11px;text-transform:uppercase}
.prow span:last-child{color:#fff;font-weight:600;text-align:right;max-width:60%}
.empty{text-align:center;padding:28px;color:#555}
.err{background:#1a0000;border:1px solid #c0392b;color:#e74c3c;padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px}
.ok{background:#001a00;border:1px solid #3ab54a;color:#3ab54a;padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px}
input,select,textarea{background:#0d0d0d;border:1px solid #333;border-radius:8px;padding:9px 12px;color:#eee;font-size:13px;outline:none;width:100%;margin-bottom:8px}
textarea{height:70px;resize:none}
.fl label{display:block;font-size:10px;color:#3ab54a;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.fl{margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ev-card{background:#111;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:10px}
.ev-nome{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.ev-info{font-size:11px;color:#666;line-height:1.7;margin-bottom:10px}
.pessoa-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
.pessoa-check{width:18px;height:18px;cursor:pointer}
.pessoa-nome{flex:1;font-size:13px;color:#eee}
.pessoa-badge{font-size:10px}
</style>
</head>

<script>
var SB = "https://wexwcnezjadoutyzkbcj.supabase.co";
var KY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";
var LC = "https://robsafonso.github.io/Agroplay/cadastro.html";
var LCV = "https://robsafonso.github.io/Agroplay/convite.html";
var SETS = ["Artista","Influenciador","Diretoria","Colaborador"];
var COR = {Artista:"#7c3aed",Influenciador:"#0891b2",Diretoria:"#b45309",Colaborador:"#2d8a3e"};
var cads=[],cods=[],evs=[],sel=[],fset="Todos",fcod="t",lista=null,convs=[],pa=null,evAtual=null,convFiltro="Todos",convSel=[];

function g(id){ return document.getElementById(id); }
function show(id){ g(id).classList.remove("hide"); }
function hide(id){ g(id).classList.add("hide"); }
function fd(d){ if(!d) return ""; var x=d.split("-"); return x[2]+"/"+x[1]+"/"+x[0]; }

function api(p,o){
  o=o||{};
  var h={"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json"};
  if(o.pref) h["Prefer"]=o.pref;
  return fetch(SB+"/rest/v1/"+p,{method:o.m||"GET",headers:h,body:o.b})
    .then(function(r){return r.text();})
    .then(function(t){return t?JSON.parse(t):null;});
}

// Botões principais
g("btnrel").onclick = load;
g("btngerar").onclick = gerarLst;
g("btnexpcod").onclick = expCods;
g("btnxls").onclick = expExcel;
g("btncsv").onclick = expCSV;
g("btnfp").onclick = function(){ g("ov-p").classList.remove("on"); pa=null; };
g("btndel").onclick = delP;
g("busca").oninput = rend;
g("btncpy").onclick = copiarDados;
g("btnfechafoto").onclick = function(){ g("ov-foto").classList.remove("on"); };
g("btnnovoev").onclick = function(){ g("ov-ev").classList.add("on"); };
g("btnfecharev").onclick = function(){ g("ov-ev").classList.remove("on"); g("ev-alert").innerHTML=""; };
g("btnsalvarev").onclick = salvarEv;
g("btnfecharconv").onclick = function(){ g("ov-conv").classList.remove("on"); hide("conv-result"); show("conv-selecao"); };
g("btncopconv").onclick = function(){ copiar2(g("conv-msg").textContent, g("btncopconv"), "Copiar mensagem"); };
g("btnoutroconv").onclick = function(){ hide("conv-result"); show("conv-selecao"); };
g("btnseltodos").onclick = function(){ convSel=cads.filter(function(c){return convFiltro==="Todos"||c.setor===convFiltro;}).map(function(c){return c.id;}); renderConvPessoas(); };
g("btndeseltodos").onclick = function(){ convSel=[]; renderConvPessoas(); };
g("btngerarconvs").onclick = gerarConvIndividual;
g("cc-t").onclick = function(){ fCod("t",this); };
g("cc-d").onclick = function(){ fCod("d",this); };
g("cc-u").onclick = function(){ fCod("u",this); };
g("t-cad").onclick = function(){ tab("cad"); };
g("t-ev").onclick = function(){ tab("ev"); };
g("t-cod").onclick = function(){ tab("cod"); };
g("t-lst").onclick = function(){ tab("lst"); };

function load(){
  g("tbl").innerHTML = '<div class="empty">Carregando...</div>';
  api("cadastros?select=*&order=criado_em.desc").then(function(d){cads=d||[];rStats();rChips();rend();}).catch(function(){cads=[];rStats();rChips();rend();});
  api("codigos?select=*&order=id.asc").then(function(d){cods=d||[];rStats();rCods();}).catch(function(){cods=[];});
  api("eventos?select=*&order=data.asc").then(function(d){evs=d||[];rStats();rEvs();}).catch(function(){evs=[];});
}

function rStats(){
  var d=cods.filter(function(c){return !c.usado;}).length;
  g("stats").innerHTML=
    "<div class='stat'><strong>"+cads.length+"</strong><span>Cadastros</span></div>"+
    "<div class='stat'><strong>"+evs.length+"</strong><span>Eventos</span></div>"+
    "<div class='stat'><strong>"+d+"</strong><span>Codigos</span></div>";
}

function rChips(){
  g("chips").innerHTML=["Todos"].concat(SETS).map(function(s){
    return "<button class='chip"+(fset===s?" on":"")+"' onclick='setF(\""+s+"\")'>" +s+"</button>";
  }).join("");
}

function setF(s){ fset=s; rChips(); rend(); }

function rend(){
  var b=g("busca").value.toLowerCase();
  var f=cads.filter(function(c){
    return (fset==="Todos"||c.setor===fset)&&(!b||c.nome.toLowerCase().indexOf(b)>=0||c.email.toLowerCase().indexOf(b)>=0);
  });
  var gb=g("gbar");
  if(sel.length>0){gb.style.display="flex";g("selct").textContent=sel.length+" selecionado(s)";}
  else gb.style.display="none";
  if(!f.length){g("tbl").innerHTML='<div class="empty">Nenhum cadastro</div>';return;}
  var all=f.every(function(c){return sel.indexOf(c.id)>=0;});
  var h='<div class="tbl"><table><thead><tr><th><input type="checkbox"'+(all?" checked":"")+" id='cball'/></th><th>Nome</th><th>Setor</th><th>Tel</th></tr></thead><tbody>";
  f.forEach(function(c){
    var cor=COR[c.setor]||"#555";
    h+="<tr><td><input type='checkbox'"+(sel.indexOf(c.id)>=0?" checked":"")+" onchange='togS("+c.id+",this.checked)'/></td>"+
      "<td><span class='nlink' onclick='verP("+c.id+")'>"+c.nome+"</span></td>"+
      "<td><span class='badge' style='background:"+cor+"'>"+c.setor+"</span></td>"+
      "<td style='color:#777'>"+c.telefone+"</td></tr>";
  });
  h+="</tbody></table></div>";
  g("tbl").innerHTML=h;
  var cb=g("cball");
  if(cb) cb.onchange=function(){togAll(f.map(function(c){return c.id;}),this.checked);};
}

function togS(id,v){if(v){if(sel.indexOf(id)<0)sel.push(id);}else{sel=sel.filter(function(x){return x!==id;});}rend();}
function togAll(ids,v){if(v)ids.forEach(function(id){if(sel.indexOf(id)<0)sel.push(id);});else sel=sel.filter(function(x){return ids.indexOf(x)<0;});rend();}

function verP(id){
  var c=cads.find(function(x){return x.id===id;});
  if(!c)return; pa=c;
  var cor=COR[c.setor]||"#555";
  var fotoHtml="";
  if(c.foto_url){
    fotoHtml="<img src='"+c.foto_url+"' onclick='abrirFoto("+c.id+")' style='width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #3ab54a;margin:0 auto 10px;display:block;cursor:pointer'/>";
  } else {
    fotoHtml="<div style='width:80px;height:80px;background:"+cor+";border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px;color:#fff;font-weight:700'>"+c.nome.charAt(0).toUpperCase()+"</div>";
  }
  var h="<div style='text-align:center;margin-bottom:16px'>"+fotoHtml+
    "<div style='font-size:17px;font-weight:700;color:#fff'>"+c.nome+"</div>"+
    "<span class='badge' style='background:"+cor+";margin-top:6px;display:inline-block'>"+c.setor+"</span></div>";
  var rows=[["CPF",c.cpf],["RG",c.rg],["Email",c.email],["Telefone",c.telefone],["Nascimento",fd(c.nascimento)]];if(c.empresa)rows.push(["Empresa",c.empresa]);if(c.cargo)rows.push(["Cargo",c.cargo]);if(c.status)rows.push(["Status",c.status]);rows.forEach(function(r){
    h+="<div class='prow'><span>"+r[0]+"</span><span>"+r[1]+"</span></div>";
  });
  g("pcont").innerHTML=h;
  if(c.evento_id){g("status-btns").style.display="block";}
  else{g("status-btns").style.display="none";}
  g("ov-p").classList.add("on");
}

function abrirFoto(id){
  var c=cads.find(function(x){return x.id===id;});
  if(!c||!c.foto_url)return;
  g("foto-grande").src=c.foto_url;
  g("ov-foto").classList.add("on");
}

g("btnAprovar").onclick=function(){
  if(!pa)return;
  api("cadastros?id=eq."+pa.id,{m:"PATCH",pref:"return=minimal",b:JSON.stringify({status:"aprovado"})}).then(function(){
    pa.status="aprovado";
    var si=g("pcont").querySelector(".prow:last-child span:last-child");
    if(si)si.textContent="aprovado";
    g("btnAprovar").textContent="✓ Aprovado!";
    setTimeout(function(){g("btnAprovar").textContent="✓ Aprovar";},2000);
    rend();
  });
};

g("btnReprovar").onclick=function(){
  if(!pa)return;
  api("cadastros?id=eq."+pa.id,{m:"PATCH",pref:"return=minimal",b:JSON.stringify({status:"reprovado"})}).then(function(){
    pa.status="reprovado";
    var msg="Ola "+pa.nome+",

Informamos que sua solicitacao de participacao no evento nao foi confirmada neste momento.

Para mais informacoes, entre em contato com o escritorio Agroplay.

Agroplay Music - Londrina PR";
    copiar2(msg,g("btnReprovar"),"✕ Reprovar");
    rend();
  });
};

function copiarDados(){
  if(!pa)return;
  var txt="Nome: "+pa.nome+"\nCPF: "+pa.cpf+"\nRG: "+pa.rg+"\nEmail: "+pa.email+"\nTelefone: "+pa.telefone+"\nNascimento: "+fd(pa.nascimento)+"\nSetor: "+pa.setor;
  copiar2(txt,g("btncpy"),"Copiar dados");
}

function delP(){
  if(!pa)return;
  if(!confirm("Excluir este cadastro?"))return;
  api("cadastros?id=eq."+pa.id,{m:"DELETE",pref:"return=minimal"}).then(function(){
    cads=cads.filter(function(c){return c.id!==pa.id;});
    sel=sel.filter(function(x){return x!==pa.id;});
    g("ov-p").classList.remove("on"); pa=null; rStats(); rend();
  });
}

// EVENTOS
function rEvs(){
  var el=g("ev-lista");
  if(!evs.length){el.innerHTML='<div class="empty">Nenhum evento ainda.<br/>Crie o primeiro!</div>';return;}
  el.innerHTML=evs.map(function(ev){
    var d=ev.data?ev.data.split("-"):["","",""];
    return "<div class='ev-card'>"+
      "<div class='ev-nome'>"+ev.nome+"</div>"+
      "<div class='ev-info'>"+
        (ev.data?"📅 "+d[2]+"/"+d[1]+"/"+d[0]+"<br/>":"")+ 
        (ev.local?"📍 "+(ev.maps_url?"<a href='"+ev.maps_url+"' target='_blank' style='color:#3ab54a'>"+ev.local+"</a>":ev.local)+"<br/>":"")+
        (ev.atracao1?"🎤 "+ev.atracao1+(ev.atracao2?" + "+ev.atracao2:"")+"<br/>":"")+
        (ev.descricao?"📝 "+ev.descricao+"<br/>":"")+
        (ev.foto_url?"<img src='"+ev.foto_url+"' style='width:100%;border-radius:8px;margin-top:8px'/>":"")+"</div>"+
      "<div style='display:flex;gap:6px;flex-wrap:wrap'>"+
        "<button class='btn' onclick='abrirConvites("+ev.id+")' style='flex:1;font-size:12px;padding:9px'>📨 Enviar Convites</button>"+
        "<button class='btn-o' onclick='listarEvento("+ev.id+")' style='font-size:12px;padding:9px'>📋 Lista</button>"+
        "<button class='btn-b' onclick='editarEv("+ev.id+")' style='font-size:11px;padding:8px'>✏️</button>"+"<button class='btn-r' onclick='delEv("+ev.id+")' style='font-size:11px;padding:8px'>✕</button>"+
      "</div></div>";
  }).join("");
}

function salvarEv(){
  var nome=g("ev-nome").value.trim();
  if(!nome){g("ev-alert").innerHTML='<div class="err">Nome obrigatorio</div>';return;}
  var btn=g("btnsalvarev");btn.textContent="Salvando...";btn.disabled=true;
  api("eventos",{m:"POST",b:JSON.stringify({
    nome:nome,
    data:g("ev-data").value||null,
    local:g("ev-local").value.trim(),
    atracao1:g("ev-atr1").value.trim(),
    atracao2:g("ev-atr2").value.trim(),
    descricao:g("ev-desc").value.trim(),
    foto_url:g("ev-foto").value.trim(),
    maps_url:g("ev-maps").value.trim(),
    insta_atr1:g("ev-insta1").value.trim(),
    insta_atr2:g("ev-insta2").value.trim()
  })}).then(function(){
    g("ov-ev").classList.remove("on");
    ["ev-nome","ev-data","ev-local","ev-atr1","ev-atr2","ev-desc","ev-foto","ev-maps","ev-insta1","ev-insta2"].forEach(function(id){g(id).value="";});
    load();
  }).catch(function(){
    g("ev-alert").innerHTML='<div class="err">Erro ao salvar</div>';
  }).finally(function(){btn.textContent="Salvar evento";btn.disabled=false;});
}

function editarEv(id){
  var ev=evs.find(function(e){return e.id===id;});
  if(!ev)return;
  g("ev-nome").value=ev.nome||"";
  g("ev-data").value=ev.data||"";
  g("ev-local").value=ev.local||"";
  g("ev-atr1").value=ev.atracao1||"";
  g("ev-atr2").value=ev.atracao2||"";
  g("ev-desc").value=ev.descricao||"";
  g("ev-foto").value=ev.foto_url||"";
  g("ev-maps").value=ev.maps_url||"";
  g("ev-insta1").value=ev.insta_atr1||"";
  g("ev-insta2").value=ev.insta_atr2||"";
  g("btnsalvarev").onclick=function(){atualizarEv(id);};
  g("ov-ev").classList.add("on");
}

function atualizarEv(id){
  var nome=g("ev-nome").value.trim();
  if(!nome){g("ev-alert").innerHTML='<div class="err">Nome obrigatorio</div>';return;}
  var btn=g("btnsalvarev");btn.textContent="Salvando...";btn.disabled=true;
  api("eventos?id=eq."+id,{m:"PATCH",pref:"return=minimal",b:JSON.stringify({
    nome:nome,
    data:g("ev-data").value||null,
    local:g("ev-local").value.trim(),
    atracao1:g("ev-atr1").value.trim(),
    atracao2:g("ev-atr2").value.trim(),
    descricao:g("ev-desc").value.trim(),
    foto_url:g("ev-foto").value.trim(),
    maps_url:g("ev-maps").value.trim(),
    insta_atr1:g("ev-insta1").value.trim(),
    insta_atr2:g("ev-insta2").value.trim()
  })}).then(function(){
    g("ov-ev").classList.remove("on");
    g("btnsalvarev").onclick=salvarEv;
    load();
  }).catch(function(){
    g("ev-alert").innerHTML='<div class="err">Erro ao atualizar</div>';
  }).finally(function(){btn.textContent="Salvar evento";btn.disabled=false;});
}

function delEv(id){
  if(!confirm("Excluir evento?"))return;
  api("eventos?id=eq."+id,{m:"DELETE",pref:"return=minimal"}).then(function(){
    evs=evs.filter(function(e){return e.id!==id;});
    rEvs();rStats();
  });
}

// CONVITES
function abrirConvites(evId){
  evAtual=evs.find(function(e){return e.id===evId;});
  if(!evAtual)return;
  convSel=[];
  convFiltro="Todos";
  hide("conv-result");
  show("conv-selecao");
  g("conv-ev-nome").textContent="Evento: "+evAtual.nome;
  g("conv-alert").innerHTML="";
  document.querySelectorAll("#conv-chips .chip").forEach(function(b){b.classList.remove("on");});
  document.querySelector("#conv-chips .chip").classList.add("on");
  renderConvPessoas();
  g("ov-conv").classList.add("on");
}

function filtrarConv(f,btn){
  convFiltro=f;
  document.querySelectorAll("#conv-chips .chip").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  renderConvPessoas();
}

function renderConvPessoas(){
  var f=cads.filter(function(c){return convFiltro==="Todos"||c.setor===convFiltro;});
  if(!f.length){g("conv-pessoas").innerHTML='<div class="empty">Nenhuma pessoa neste filtro</div>';return;}
  var h="";
  f.forEach(function(c){
    var cor=COR[c.setor]||"#555";
    var checked=convSel.indexOf(c.id)>=0;
    h+="<div class='pessoa-item'>"+
      "<input type='checkbox' class='pessoa-check' "+(checked?"checked":"")+" onchange='togConv("+c.id+",this.checked)'/>"+
      "<div class='pessoa-nome'>"+c.nome+"</div>"+
      "<span class='badge pessoa-badge' style='background:"+cor+"'>"+c.setor+"</span>"+
      "</div>";
  });
  g("conv-pessoas").innerHTML=h;
}

function togConv(id,v){
  if(v){if(convSel.indexOf(id)<0)convSel.push(id);}
  else{convSel=convSel.filter(function(x){return x!==id;});}
}

async function gerarConvIndividual(){
  if(convSel.length===0){g("conv-alert").innerHTML='<div class="err">Selecione pelo menos 1 pessoa</div>';return;}
  var btn=g("btngerarconvs");
  btn.textContent="Gerando...";btn.disabled=true;
  g("conv-alert").innerHTML="";
  try{
    var r=await fetch(SB+"/rest/v1/codigos?usado=eq.false&order=id.asc&limit=1",{headers:{"apikey":KY,"Authorization":"Bearer "+KY}});
    var d=await r.json();
    if(!d||!d.length){g("conv-alert").innerHTML='<div class="err">Nenhum codigo disponivel!</div>';return;}
    var cod=d[0].codigo;
    var pessoa=cads.find(function(c){return c.id===convSel[0];});
    var ev=evAtual;
    var df=ev.data?ev.data.split("-"):["","",""];
    var dataFmt=ev.data?df[2]+"/"+df[1]+"/"+df[0]:"";
    var msg="AGROPLAY - Convite VIP\n\nOla "+pessoa.nome+"!\n\nVoce esta convidado(a) para:\n\n"+ev.nome+
      (dataFmt?"\nData: "+dataFmt:"")+
      (ev.local?"\nLocal: "+ev.local:"")+
      (ev.atracao1?"\nAtracoes: "+ev.atracao1+(ev.atracao2?" + "+ev.atracao2:""):"")+
      "\n\nAcesse o link e use seu codigo exclusivo:\n"+LCV+"?ev="+ev.id+
      "\n\nSeu codigo: "+cod+
      "\n\nCodigo intransferivel e de uso unico.\n\nAgroplay - Londrina PR";
    g("conv-cod").textContent=cod;
    g("conv-msg").textContent=msg;
    hide("conv-selecao");
    show("conv-result");
    convSel=convSel.slice(1);
  }catch(e){
    g("conv-alert").innerHTML='<div class="err">Erro ao gerar convite</div>';
  }finally{
    btn.textContent="Gerar convite individual";btn.disabled=false;
  }
}

function listarEvento(evId){
  var ev=evs.find(function(e){return e.id===evId;});
  if(!ev)return;
  var p=cads.filter(function(c){return c.evento_id===evId;});
  lista={n:ev.nome,p:p,dt:new Date().toLocaleString("pt-BR")};
  tab("lst");rLst();
}

function fCod(f,btn){
  fcod=f;
  ["cc-t","cc-d","cc-u"].forEach(function(id){g(id).classList.remove("on");});
  btn.classList.add("on");rCods();
}

function rCods(){
  var f=cods.filter(function(c){return fcod==="d"?!c.usado:fcod==="u"?c.usado:true;});
  if(!f.length){g("codlst").innerHTML='<div class="empty">Nenhum</div>';return;}
  g("codlst").innerHTML="<div style='display:grid;grid-template-columns:repeat(2,1fr);gap:5px'>"+f.map(function(c){
    return "<div style='background:#0d0d0d;border:1px solid #222;border-radius:7px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center'><span style='font-family:monospace;font-size:12px;font-weight:700;color:"+(c.usado?"#444":"#fff")+"'>"+c.codigo+"</span><span class='badge' style='background:"+(c.usado?"#555":"#2d8a3e")+"'>"+(c.usado?"Usado":"Livre")+"</span></div>";
  }).join("")+"</div>";
}

function expCods(){dl("Codigo,Status\n"+cods.map(function(c){return c.codigo+","+(c.usado?"Usado":"Disponivel");}).join("\n"),"text/csv","Codigos.csv");}

function gerarLst(){
  var p=cads.filter(function(c){return sel.indexOf(c.id)>=0;});
  var n=g("evnm").value||"Evento";
  lista={n:n,p:p,dt:new Date().toLocaleString("pt-BR")};
  tab("lst");rLst();
}

function rLst(){
  if(!lista){g("lstcont").innerHTML='<div class="empty">Selecione cadastros e clique em Gerar Lista.</div>';return;}
  var h="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px'>"+
    "<div><div style='font-size:15px;color:#fff;font-weight:700'>"+lista.n+"</div>"+
    "<div style='font-size:11px;color:#555;margin-top:2px'>"+lista.dt+" - "+lista.p.length+" pessoa(s)</div></div>"+
    "<div style='display:flex;gap:6px'><button class='btn-o' onclick='expXlsLst()'>Excel</button><button class='btn-o' onclick='expCsvLst()'>CSV</button></div></div>";
  h+='<div class="tbl"><table><thead><tr><th>#</th><th>Nome</th><th>CPF</th><th>RG</th><th>Email</th><th>Tel</th><th>Nasc.</th><th>Setor</th></tr></thead><tbody>';
  lista.p.forEach(function(p,i){
    h+="<tr><td style='color:#444'>"+(i+1)+"</td><td style='color:#fff'>"+p.nome+"</td>"+
      "<td style='color:#777'>"+p.cpf+"</td><td style='color:#777'>"+p.rg+"</td>"+
      "<td style='color:#777'>"+p.email+"</td><td style='color:#777'>"+p.telefone+"</td>"+
      "<td style='color:#777'>"+fd(p.nascimento)+"</td>"+
      "<td><span class='badge' style='background:"+(COR[p.setor]||"#555")+"'>"+p.setor+"</span></td></tr>";
  });
  h+="</tbody></table></div>";
  g("lstcont").innerHTML=h;
}

function mkR(arr){return arr.map(function(c){return[c.nome,c.cpf,c.rg,c.email,c.telefone,fd(c.nascimento),c.setor];});}
function expExcel(){mkXls(mkR(cads),"Cadastros");}
function expXlsLst(){if(lista)mkXls(mkR(lista.p),"Lista_"+lista.n);}
function expCSV(){dl("Nome,CPF,RG,Email,Telefone,Nascimento,Setor\n"+mkR(cads).map(function(r){return r.map(function(v){return'"'+v+'"';}).join(",");}).join("\n"),"text/csv","Cadastros.csv");}
function expCsvLst(){if(lista)dl("Nome,CPF,RG,Email,Telefone,Nascimento,Setor\n"+mkR(lista.p).map(function(r){return r.map(function(v){return'"'+v+'"';}).join(",");}).join("\n"),"text/csv","Lista.csv");}

function mkXls(rows,name){
  var hdr="<Row><Cell><Data ss:Type='String'>Nome</Data></Cell><Cell><Data ss:Type='String'>CPF</Data></Cell><Cell><Data ss:Type='String'>RG</Data></Cell><Cell><Data ss:Type='String'>Email</Data></Cell><Cell><Data ss:Type='String'>Telefone</Data></Cell><Cell><Data ss:Type='String'>Nascimento</Data></Cell><Cell><Data ss:Type='String'>Setor</Data></Cell></Row>";
  var body=rows.map(function(r){return "<Row>"+r.map(function(v){return"<Cell><Data ss:Type='String'>"+String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;")+"</Data></Cell>";}).join("")+"</Row>";}).join("");
  dl("<?xml version='1.0'?><Workbook xmlns='urn:schemas-microsoft-com:office:spreadsheet' xmlns:ss='urn:schemas-microsoft-com:office:spreadsheet'><Worksheet ss:Name='Dados'><Table>"+hdr+body+"</Table></Worksheet></Workbook>","application/vnd.ms-excel",name+".xls");
}

function copiar2(txt,btn,label){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){btn.textContent="Copiado!";setTimeout(function(){btn.textContent=label;},2000);});}
  else{var t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);btn.textContent="Copiado!";setTimeout(function(){btn.textContent=label;},2000);}
}

function dl(c,t,n){var b=new Blob([c],{type:t});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download=n;a.click();}

function tab(t){
  ["cad","ev","cod","lst"].forEach(function(x){g("s-"+x).classList.add("hide");g("t-"+x).classList.remove("on");});
  show("s-"+t);g("t-"+t).classList.add("on");
  if(t==="lst")rLst();
  if(t==="cod")rCods();
  if(t==="ev")rEvs();
}

load();
</script>
