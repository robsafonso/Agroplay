<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay Gerente</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;font-size:14px;padding:16px}
.btn{background:#1e7a35;color:#fff;border:none;border-radius:8px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;margin:4px;display:inline-block}
.bto{background:transparent;color:#2aab47;border:1px solid #2aab47;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;margin:4px}
.btr{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;margin:4px}
.bty{background:#c9973c;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;margin:4px}
.card{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:16px;margin-bottom:12px}
.hdr{background:#060a06;border-bottom:2px solid #1e7a35;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin:-16px -16px 16px}
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px 8px;text-align:center;flex:1}
.stat strong{font-size:22px;color:#2aab47;display:block}
.stat small{font-size:9px;color:#555;text-transform:uppercase}
.tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto}
.tab{background:transparent;border:1px solid #333;border-radius:8px;padding:7px 12px;color:#555;cursor:pointer;font-size:11px;white-space:nowrap}
.tab.on{border-color:#2aab47;color:#2aab47;background:rgba(42,171,71,.1)}
.gone{display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px;text-align:left;background:#060a06;color:#444;font-size:9px;text-transform:uppercase;border-bottom:1px solid #1a2a1a}
td{padding:8px;border-bottom:1px solid #111;color:#bbb}
.tbl{overflow-x:auto;border:1px solid #1a2a1a;border-radius:10px;margin-top:8px}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;color:#fff;font-weight:700}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{background:transparent;border:1px solid #333;border-radius:20px;padding:4px 10px;color:#555;cursor:pointer;font-size:11px}
.chip.on{border-color:#2aab47;color:#2aab47}
.nlink{color:#fff;font-weight:700;cursor:pointer;text-decoration:underline;text-decoration-color:#2aab47}
.msgt{font-size:12px;color:#aaa;line-height:1.7;background:#030503;border-radius:8px;padding:10px;margin-bottom:10px;white-space:pre-wrap;word-break:break-word}
.codt{font-family:monospace;font-size:24px;font-weight:900;color:#fff;letter-spacing:4px;margin:8px 0 12px}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.ovc{align-items:center!important;justify-content:center!important}
.mod{background:#090e09;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.prow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #111;font-size:13px}
.prow span:first-child{color:#555;font-size:11px;text-transform:uppercase}
.prow span:last-child{color:#fff;font-weight:600;text-align:right;max-width:60%}
.empty{text-align:center;padding:28px;color:#555}
.ea{background:#1a0000;border:1px solid #c0392b;color:#e74c3c;padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px}
input,textarea{background:#030503;border:1px solid #1a2a1a;border-radius:8px;padding:9px 12px;color:#eee;font-size:13px;outline:none;width:100%;margin-bottom:8px}
textarea{height:70px;resize:none}
.fl label{display:block;font-size:10px;color:#2aab47;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.fl{margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pb{background:#b8860b;color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.ab{background:#1e7a35;color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.rb{background:#c0392b;color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <div style="font-size:18px;font-weight:900;color:#fff">AGRO<span style="color:#2aab47">PLAY</span></div>
  <button class="bto" id="r">Atualizar</button>
</div>
<div class="stats" id="sts"></div>
<div class="tabs">
  <button class="tab on" id="tc">Cadastros</button>
  <button class="tab" id="te">Eventos</button>
  <button class="tab" id="tk">Codigos</button>
  <button class="tab" id="tl">Lista</button>
</div>
<div id="sc">
  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
    <input id="bsc" placeholder="Buscar..." style="flex:1;min-width:140px;margin:0">
    <button class="bto" id="bxls">Excel</button>
    <button class="bto" id="bcsv">CSV</button>
  </div>
  <div class="chips" id="chips"></div>
  <div id="gbar" style="display:none;background:rgba(42,171,71,.06);border:1px solid rgba(42,171,71,.2);border-radius:10px;padding:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap;gap:8px">
    <span style="color:#2aab47;font-size:12px;font-weight:700" id="sct"></span>
    <input id="evnm" placeholder="Nome do evento..." style="flex:1;margin:0">
    <button class="btn" style="padding:9px 12px;font-size:12px;margin:0" id="bgl">Gerar Lista</button>
  </div>
  <div id="tbl"></div>
</div>
<div id="se" class="gone">
  <button class="btn" id="bnev" style="width:100%;margin-bottom:14px">+ Criar novo evento</button>
  <div id="evlst"><div class="empty">Nenhum evento</div></div>
</div>
<div id="sk" class="gone">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="color:#888;font-size:12px">Codigos</span>
    <button class="bto" id="bexk">Exportar</button>
  </div>
  <div class="chips" id="cctabs">
    <button class="chip on" id="ckt">Todos</button>
    <button class="chip" id="ckd">Disponiveis</button>
    <button class="chip" id="cku">Usados</button>
  </div>
  <div id="klst"></div>
</div>
<div id="sl" class="gone"><div id="llst"></div></div>
<div class="ov" id="ovp">
  <div class="mod">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#fff">Dados</div>
      <button class="bto" id="bfp">Fechar</button>
    </div>
    <div id="pcont"></div>
    <div id="aprovd" style="display:none;margin-top:12px">
      <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Aprovacao</div>
      <div style="display:flex;gap:8px">
        <button class="btn" id="bapv" style="flex:1;font-size:12px;padding:10px">Aprovar</button>
        <button class="btr" id="brpv" style="flex:1;font-size:12px;padding:10px">Reprovar</button>
      </div>
    </div>
    <button class="bto" id="bcpy" style="width:100%;margin-top:12px">Copiar dados</button>
    <button class="btr" id="bdel" style="width:100%;margin-top:8px">Excluir</button>
  </div>
</div>
<div class="ov ovc" id="ovfoto">
  <div style="max-width:90vw;max-height:90vh;text-align:center">
    <img id="fgrd" style="max-width:90vw;max-height:80vh;border-radius:12px;display:block;margin:0 auto"/>
    <button class="bto" style="margin-top:12px" id="bffoto">Fechar</button>
  </div>
</div>
<div class="ov" id="ovev">
  <div class="mod">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#fff" id="evtit">Novo Evento</div>
      <button class="bto" id="bfev">X</button>
    </div>
    <div id="evalert"></div>
    <div class="fl"><label>Nome</label><input id="evn" placeholder="Nome do evento"></div>
    <div class="g2">
      <div class="fl"><label>Data</label><input id="evd" type="date"></div>
      <div class="fl"><label>Local</label><input id="evl" placeholder="Ex: Parque Ney Braga"></div>
    </div>
    <div class="fl"><label>Link Maps</label><input id="evm" placeholder="https://maps.google.com/..."></div>
    <div class="fl"><label>Atracao 1</label><input id="eva1" placeholder="Ex: Ana Castela"></div>
    <div class="fl"><label>Instagram Atracao 1</label><input id="evi1" placeholder="https://instagram.com/..."></div>
    <div class="fl"><label>Atracao 2</label><input id="eva2" placeholder="Ex: CountryBeat"></div>
    <div class="fl"><label>Instagram Atracao 2</label><input id="evi2" placeholder="https://instagram.com/..."></div>
    <div class="fl"><label>Foto convite (URL)</label><input id="evf" placeholder="https://...imagem.jpg"></div>
    <div class="fl"><label>Descricao</label><textarea id="evdesc" placeholder="Detalhes..."></textarea></div>
    <button class="btn" id="bsev" style="width:100%">Salvar</button>
    <button class="bto" id="bcaev" style="width:100%;margin-top:8px;text-align:center">Cancelar</button>
  </div>
</div>
<div class="ov" id="ovconv">
  <div class="mod">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:16px;font-weight:700;color:#fff">Enviar Convites</div>
      <button class="bto" id="bfconv">X</button>
    </div>
    <div id="cevinfo" style="font-size:12px;color:#2aab47;margin-bottom:14px"></div>
    <div id="calert"></div>
    <div id="cres" class="gone card">
      <div style="font-size:10px;color:#2aab47;text-transform:uppercase;margin-bottom:4px">Codigo</div>
      <div class="codt" id="ccod"></div>
      <div style="font-size:10px;color:#2aab47;text-transform:uppercase;margin-bottom:6px">Mensagem</div>
      <div class="msgt" id="cmsg"></div>
      <button class="btn" id="bcopc">Copiar mensagem</button>
      <button class="bto" id="boutro" style="width:100%;margin-top:8px">Gerar outro</button>
    </div>
    <div id="csel">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn" id="btntipoe" onclick="setTipo('externo')" style="flex:1;font-size:12px">Externo</button>
        <button class="bto" id="btntipoi" onclick="setTipo('interno')" style="flex:1;font-size:12px">Interno</button>
      </div>
      <div id="csel-ext">
        <div style="font-size:12px;color:#888;margin-bottom:8px">Convite para pessoa <b style="color:#2aab47">NOVA</b> — link generico</div>
        <div style="background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="font-size:11px;color:#555;margin-bottom:6px">O link gerado pode ser enviado para qualquer pessoa.</div>
          <div style="font-family:monospace;font-size:11px;color:#2aab47;word-break:break-all" id="linkext"></div>
        </div>
        <button class="btn" id="bgconv" style="width:100%;font-size:12px">Gerar link externo</button>
        <button class="btn-o" id="bcopext" style="width:100%;margin-top:8px;display:none">Copiar link + mensagem</button>
      </div>
      <div id="csel-int" style="display:none">
        <div style="font-size:12px;color:#888;margin-bottom:10px">Convite para pessoa <b style="color:#0891b2">JA CADASTRADA</b></div>
        <div class="chips" id="cchips">
          <button class="chip on" onclick="fconv('Todos',this)">Todos</button>
          <button class="chip" onclick="fconv('Artista',this)">Artistas</button>
          <button class="chip" onclick="fconv('Influenciador',this)">Influenc.</button>
          <button class="chip" onclick="fconv('Diretoria',this)">Diretoria</button>
          <button class="chip" onclick="fconv('Colaborador',this)">Colab.</button>
        </div>
        <div id="cpess"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="bto" id="bsall">Todos</button>
          <button class="bto" id="bsnone">Nenhum</button>
        </div>
        <button class="btn" id="bgconvi" style="width:100%;margin-top:12px;background:#0891b2">Gerar convite interno</button>
      </div>
    </div>
  </div>
</div>
<script src="gerente.js"></script>
</body>
</html>
