<button class="btn" onclick="gerarCodigo()">Gerar Código</button>

<div id="codigo" style="margin-top:20px;font-size:28px;font-weight:bold;"></div>

<script>

const SB = "https://wexwcnezjadoutyzkbcj.supabase.co";
const KY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";

async function gerarCodigo(){
  try{
    const res = await fetch(SB + "/rest/v1/rpc/pegar_codigo", {
      method:"POST",
      headers:{
        "apikey":KY,
        "Authorization":"Bearer " + KY,
        "Content-Type":"application/json"
      }
    });

    const data = await res.json();

    document.getElementById("codigo").innerText = data || "SEM_CODIGO";

  }catch(e){
    alert("Erro ao gerar código");
    console.error(e);
  }
}

</script>
