<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Gerente</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

body {
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
background: #0a0a0a;
color: #fafafa;
min-height: 100vh;
padding-bottom: 40px;
}

header {
background: #161616;
border-bottom: 1px solid #262626;
padding: 14px 16px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 10;
}

.header-left {
display: flex;
align-items: center;
gap: 12px;
}

.btn-voltar {
background: transparent;
border: 1px solid #404040;
color: #fafafa;
width: 32px;
height: 32px;
border-radius: 6px;
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}

.header-logo {
height: 24px;
filter: invert(1);
}

.header-titulo {
font-size: 14px;
font-weight: 600;
}

.header-user {
font-size: 12px;
color: #a3a3a3;
}

.abas {
background: #161616;
border-bottom: 1px solid #262626;
display: flex;
overflow-x: auto;
position: sticky;
top: 60px;
z-index: 9;
}

.abas::-webkit-scrollbar {
display: none;
}

.aba {
background: transparent;
border: none;
color: #a3a3a3;
padding: 14px 18px;
font-size: 13px;
font-weight: 500;
cursor: pointer;
white-space: nowrap;
border-bottom: 2px solid transparent;
transition: color 0.15s, border-color 0.15s;
}

.aba.ativa {
color: #f5c518;
border-bottom-color: #f5c518;
}

main {
max-width: 800px;
margin: 0 auto;
padding: 20px 16px;
}

.conteudo-aba {
display: none;
}

.conteudo-aba.ativa {
display: block;
}

.topo-aba {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 16px;
gap: 10px;
}

.topo-aba h2 {
font-size: 18px;
font-weight: 600;
}

.btn-primario {
background: #f5c518;
color: #0a0a0a;
border: none;
padding: 10px 16px;
border-radius: 8px;
font-size: 13px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}

.btn-primario:hover {
opacity: 0.9;
}

.btn-primario:disabled {
opacity: 0.4;
cursor: not-allowed;
}

.btn-secundario {
background: transparent;
color: #fafafa;
border: 1px solid #404040;
padding: 8px 14px;
border-radius: 8px;
font-size: 12px;
cursor: pointer;
}

.btn-secundario:hover {
border-color: #f5c518;
}

.btn-perigo {
background: transparent;
color: #ef4444;
border: 1px solid #4a1f1f;
padding: 8px 14px;
border-radius: 8px;
font-size: 12px;
cursor: pointer;
}

.btn-perigo:hover {
background: #2a0f0f;
}

.vazio {
text-align: center;
padding: 48px 16px;
color: #525252;
font-size: 14px;
}

.lista {
display: flex;
flex-direction: column;
gap: 10px;
}

.item {
background: #161616;
border: 1px solid #262626;
border-radius: 10px;
padding: 16px;
}

.item-titulo {
font-size: 15px;
font-weight: 600;
margin-bottom: 4px;
}

.item-info {
font-size: 12px;
color: #a3a3a3;
margin-bottom: 10px;
}

.item-info span {
margin-right: 12px;
}

.item-acoes {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0, 0, 0, 0.7);
display: none;
align-items: center;
justify-content: center;
z-index: 100;
padding: 16px;
}

.modal-overlay.aberto {
display: flex;
}

.modal {
background: #161616;
border: 1px solid #262626;
border-radius: 14px;
width: 100%;
max-width: 500px;
max-height: 90vh;
overflow-y: auto;
padding: 24px 20px;
}

.modal h3 {
font-size: 17px;
margin-bottom: 18px;
}

.campo {
margin-bottom: 12px;
}

.campo label {
display: block;
font-size: 12px;
color: #a3a3a3;
margin-bottom: 5px;
}

.campo input,
.campo textarea,
.campo select {
width: 100%;
padding: 10px 12px;
background: #0a0a0a;
border: 1px solid #262626;
border-radius: 7px;
color: #fafafa;
font-size: 14px;
font-family: inherit;
outline: none;
}

.campo input:focus,
.campo textarea:focus,
.campo select:focus {
border-color: #f5c518;
}

.campo textarea {
resize: vertical;
min-height: 70px;
}

.linha2 {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.modal-botoes {
display: flex;
gap: 10px;
margin-top: 16px;
justify-content: flex-end;
}

.construcao {
text-align: center;
padding: 60px 20px;
color: #525252;
}

.construcao .icone {
font-size: 40px;
margin-bottom: 12px;
}

.construcao p {
font-size: 14px;
}

.erro-msg {
color: #ef4444;
font-size: 12px;
margin-top: 10px;
text-align: center;
min-height: 16px;
}

.badge {
display: inline-block;
padding: 2px 8px;
border-radius: 4px;
font-size: 10px;
font-weight: 600;
text-transform: uppercase;
margin-left: 6px;
}

.badge-externo {
background: #1f2937;
color: #93c5fd;
}

.badge-interno {
background: #1f2e1f;
color: #86efac;
}

.seletor-evento {
margin-bottom: 16px;
}

.seletor-evento label {
display: block;
font-size: 12px;
color: #a3a3a3;
margin-bottom: 6px;
}

.seletor-evento select {
width: 100%;
padding: 12px 14px;
background: #161616;
border: 1px solid #262626;
border-radius: 8px;
color: #fafafa;
font-size: 14px;
outline: none;
}

.seletor-evento select:focus {
border-color: #f5c518;
}

.lote-detalhe {
background: #0a0a0a;
border: 1px solid #262626;
border-radius: 6px;
padding: 8px 10px;
margin-bottom: 8px;
font-size: 12px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 8px;
}

.lote-detalhe .rotulo {
color: #a3a3a3;
}

.lote-detalhe .valor {
color: #fafafa;
font-family: ui-monospace, monospace;
word-break: break-all;
flex: 1;
text-align: right;
}

.btn-copiar {
background: transparent;
border: 1px solid #404040;
color: #fafafa;
padding: 4px 8px;
border-radius: 4px;
font-size: 11px;
cursor: pointer;
flex-shrink: 0;
}

.btn-copiar:hover {
border-color: #f5c518;
color: #f5c518;
}

.btn-copiar.copiado {
border-color: #22c55e;
color: #22c55e;
}

.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%);
background: #161616;
border: 1px solid #f5c518;
color: #f5c518;
padding: 10px 18px;
border-radius: 8px;
font-size: 13px;
z-index: 200;
opacity: 0;
transition: opacity 0.2s;
}

.toast.aberto {
opacity: 1;
}
</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const URL_API = 'https://wexwcnezjadoutyzkbcj.supabase.co';
  const KEY_API = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';

  const sb = supabase.createClient(URL_API, KEY_API);

  const adminId = localStorage.getItem('admin_id');
  const adminNome = localStorage.getItem('admin_nome');

  if (!adminId) {
    window.location.href = 'index.html';
  }

  document.getElementById('nomeUsuario').textContent = adminNome || '';

  const abas = document.querySelectorAll('.aba');
  const conteudos = document.querySelectorAll('.conteudo-aba');

  abas.forEach(function (btn) {
    btn.addEventListener('click', function () {
      const alvo = btn.dataset.aba;
      abas.forEach(function (a) { a.classList.remove('ativa'); });
      conteudos.forEach(function (c) { c.classList.remove('ativa'); });
      btn.classList.add('ativa');
      document.getElementById('aba-' + alvo).classList.add('ativa');
      if (alvo === 'lotes') carregarSeletorEventos();
    });
  });

  function escaparHtml(txt) {
    if (!txt) return '';
    return String(txt)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  function formatarData(dataIso) {
    if (!dataIso) return '';
    const partes = dataIso.split('-');
    return partes[2] + '/' + partes[1] + '/' + partes[0];
  }

  function gerarSenha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for (let i = 0; i < 6; i++) {
      s += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return s;
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('aberto');
    setTimeout(function () { t.classList.remove('aberto'); }, 2000);
  }

  async function copiar(texto, botao) {
    try {
      await navigator.clipboard.writeText(texto);
      if (botao) {
        const original = botao.textContent;
        botao.textContent = '✓';
        botao.classList.add('copiado');
        setTimeout(function () {
          botao.textContent = original;
          botao.classList.remove('copiado');
        }, 1500);
      }
      mostrarToast('Copiado!');
    } catch (e) {
      mostrarToast('Erro ao copiar');
    }
  }

  // ============================================
  // EVENTOS
  // ============================================
  const listaEventos = document.getElementById('listaEventos');
  const modalEvento = document.getElementById('modalEvento');
  const erroEvento = document.getElementById('erroEvento');
  let eventoEditandoId = null;

  async function carregarEventos() {
    listaEventos.innerHTML = '<div class="vazio">Carregando...</div>';

    const { data, error } = await sb
      .from('eventos')
      .select('*')
      .order('data', { ascending: false });

    if (error) {
      listaEventos.innerHTML = '<div class="vazio">Erro ao carregar</div>';
      return;
    }

    if (!data || data.length === 0) {
      listaEventos.innerHTML = '<div class="vazio">Nenhum evento ainda. Toque em + Novo para começar.</div>';
      return;
    }

    listaEventos.innerHTML = '';

    data.forEach(function (ev) {
      const div = document.createElement('div');
      div.className = 'item';

      const tipoBadge = ev.tipo === 'interno'
        ? '<span class="badge badge-interno">Interno</span>'
        : '<span class="badge badge-externo">Externo</span>';

      const dataFmt = formatarData(ev.data);
      const horario = ev.horario ? ev.horario.substring(0, 5) : '';

      div.innerHTML =
        '<div class="item-titulo">' + escaparHtml(ev.nome) + tipoBadge + '</div>' +
        '<div class="item-info">' +
          (dataFmt ? '<span>📅 ' + dataFmt + '</span>' : '') +
          (horario ? '<span>🕐 ' + horario + '</span>' : '') +
          (ev.local ? '<span>📍 ' + escaparHtml(ev.local) + '</span>' : '') +
        '</div>' +
        '<div class="item-acoes">' +
          '<button class="btn-secundario" data-acao="editar" data-id="' + ev.id + '">Editar</button>' +
          '<button class="btn-perigo" data-acao="apagar" data-id="' + ev.id + '">Apagar</button>' +
        '</div>';

      listaEventos.appendChild(div);
    });

    listaEventos.querySelectorAll('button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const id = btn.dataset.id;
        const acao = btn.dataset.acao;
        if (acao === 'editar') abrirModalEditarEvento(id);
        if (acao === 'apagar') apagarEvento(id);
      });
    });
  }

  function abrirModalNovoEvento() {
    eventoEditandoId = null;
    document.getElementById('modalEventoTitulo').textContent = 'Novo evento';
    document.getElementById('evNome').value = '';
    document.getElementById('evData').value = '';
    document.getElementById('evTipo').value = 'externo';
    document.getElementById('evHorario').value = '';
    document.getElementById('evHorarioFim').value = '';
    document.getElementById('evLocal').value = '';
    document.getElementById('evMaps').value = '';
    document.getElementById('evAtr1').value = '';
    document.getElementById('evInsta1').value = '';
    document.getElementById('evAtr2').value = '';
    document.getElementById('evInsta2').value = '';
    document.getElementById('evCapacidade').value = '';
    document.getElementById('evFoto').value = '';
    document.getElementById('evDescricao').value = '';
    erroEvento.textContent = '';
    modalEvento.classList.add('aberto');
  }

  async function abrirModalEditarEvento(id) {
    eventoEditandoId = id;

    const { data, error } = await sb
      .from('eventos')
      .select('*')
      .eq('id', id)
      .maybeSingle();

    if (error || !data) {
      alert('Erro ao carregar evento');
      return;
    }

    document.getElementById('modalEventoTitulo').textContent = 'Editar evento';
    document.getElementById('evNome').value = data.nome || '';
    document.getElementById('evData').value = data.data || '';
    document.getElementById('evTipo').value = data.tipo || 'externo';
    document.getElementById('evHorario').value = data.horario ? data.horario.substring(0, 5) : '';
    document.getElementById('evHorarioFim').value = data.horario_fim ? data.horario_fim.substring(0, 5) : '';
    document.getElementById('evLocal').value = data.local || '';
    document.getElementById('evMaps').value = data.maps_url || '';
    document.getElementById('evAtr1').value = data.atracao1 || '';
    document.getElementById('evInsta1').value = data.insta_atr1 || '';
    document.getElementById('evAtr2').value = data.atracao2 || '';
    document.getElementById('evInsta2').value = data.insta_atr2 || '';
    document.getElementById('evCapacidade').value = data.capacidade || '';
    document.getElementById('evFoto').value = data.foto_url || '';
    document.getElementById('evDescricao').value = data.descricao || '';
    erroEvento.textContent = '';
    modalEvento.classList.add('aberto');
  }

  async function salvarEvento() {
    erroEvento.textContent = '';

    const nome = document.getElementById('evNome').value.trim();

    if (!nome) {
      erroEvento.textContent = 'O nome é obrigatório';
      return;
    }

    const dados = {
      nome: nome,
      data: document.getElementById('evData').value || null,
      tipo: document.getElementById('evTipo').value,
      horario: document.getElementById('evHorario').value || null,
      horario_fim: document.getElementById('evHorarioFim').value || null,
      local: document.getElementById('evLocal').value.trim() || null,
      maps_url: document.getElementById('evMaps').value.trim() || null,
      atracao1: document.getElementById('evAtr1').value.trim() || null,
      insta_atr1: document.getElementById('evInsta1').value.trim() || null,
      atracao2: document.getElementById('evAtr2').value.trim() || null,
      insta_atr2: document.getElementById('evInsta2').value.trim() || null,
      capacidade: parseInt(document.getElementById('evCapacidade').value) || 0,
      foto_url: document.getElementById('evFoto').value.trim() || null,
      descricao: document.getElementById('evDescricao').value.trim() || null
    };

    let resposta;

    if (eventoEditandoId) {
      resposta = await sb.from('eventos').update(dados).eq('id', eventoEditandoId);
    } else {
      resposta = await sb.from('eventos').insert(dados);
    }

    if (resposta.error) {
      erroEvento.textContent = 'Erro ao salvar: ' + resposta.error.message;
      return;
    }

    modalEvento.classList.remove('aberto');
    carregarEventos();
  }

  async function apagarEvento(id) {
    const ok = confirm('Apagar este evento?\n\nLotes, códigos e orçamento vinculados também serão apagados.\nCadastros das pessoas serão mantidos.');
    if (!ok) return;

    const { error } = await sb.from('eventos').delete().eq('id', id);

    if (error) {
      alert('Erro ao apagar: ' + error.message);
      return;
    }

    carregarEventos();
  }

  document.getElementById('btnNovoEvento').addEventListener('click', abrirModalNovoEvento);
  document.getElementById('btnSalvarEvento').addEventListener('click', salvarEvento);
  document.getElementById('btnCancelarEvento').addEventListener('click', function () {
    modalEvento.classList.remove('aberto');
  });
  modalEvento.addEventListener('click', function (e) {
    if (e.target === modalEvento) modalEvento.classList.remove('aberto');
  });

  // ============================================
  // LOTES
  // ============================================
  const seletorEventoLotes = document.getElementById('seletorEventoLotes');
  const listaLotes = document.getElementById('listaLotes');
  const btnNovoLote = document.getElementById('btnNovoLote');
  const modalLote = document.getElementById('modalLote');
  const erroLote = document.getElementById('erroLote');
  let loteEditandoId = null;
  let eventoSelecionadoLotes = null;

  async function carregarSeletorEventos() {
    const { data, error } = await sb
      .from('eventos')
      .select('id, nome, data')
      .order('data', { ascending: false });

    if (error) return;

    const valorAtual = seletorEventoLotes.value;
    seletorEventoLotes.innerHTML = '<option value="">Selecione um evento...</option>';

    if (data) {
      data.forEach(function (ev) {
        const opt = document.createElement('option');
        opt.value = ev.id;
        opt.textContent = ev.nome + (ev.data ? ' — ' + formatarData(ev.data) : '');
        seletorEventoLotes.appendChild(opt);
      });
    }

    if (valorAtual) {
      seletorEventoLotes.value = valorAtual;
    }
  }

  seletorEventoLotes.addEventListener('change', function () {
    eventoSelecionadoLotes = seletorEventoLotes.value || null;
    btnNovoLote.disabled = !eventoSelecionadoLotes;
    if (eventoSelecionadoLotes) {
      carregarLotes();
    } else {
      listaLotes.innerHTML = '<div class="vazio">Selecione um evento para ver os lotes.</div>';
    }
  });

  async function carregarLotes() {
    if (!eventoSelecionadoLotes) return;

    listaLotes.innerHTML = '<div class="vazio">Carregando...</div>';

    const { data, error } = await sb
      .from('lotes')
      .select('*')
      .eq('evento_id', eventoSelecionadoLotes)
      .order('criado_em', { ascending: false });

    if (error) {
      listaLotes.innerHTML = '<div class="vazio">Erro ao carregar</div>';
      return;
    }

    if (!data || data.length === 0) {
      listaLotes.innerHTML = '<div class="vazio">Nenhum lote ainda. Toque em + Novo para criar.</div>';
      return;
    }

    listaLotes.innerHTML = '';

    data.forEach(function (lo) {
      const div = document.createElement('div');
      div.className = 'item';

      const linkAcesso = window.location.origin + window.location.pathname.replace('gerente.html', '') + 'cadastro.html?lote=' + lo.id + '&senha=' + (lo.senha || '');

      div.innerHTML =
        '<div class="item-titulo">' + escaparHtml(lo.nome) + '</div>' +
        '<div class="item-info">' +
          '<span>👤 ' + escaparHtml(lo.responsavel) + '</span>' +
          '<span>🎟️ ' + (lo.quantidade || 0) + ' vagas</span>' +
        '</div>' +
        '<div class="lote-detalhe">' +
          '<span class="rotulo">Senha:</span>' +
          '<span class="valor">' + escaparHtml(lo.senha || '—') + '</span>' +
          '<button class="btn-copiar" data-copiar="' + escaparHtml(lo.senha || '') + '">Copiar</button>' +
        '</div>' +
        '<div class="lote-detalhe">' +
          '<span class="rotulo">Link:</span>' +
          '<span class="valor">' + escaparHtml(linkAcesso) + '</span>' +
          '<button class="btn-copiar" data-copiar="' + escaparHtml(linkAcesso) + '">Copiar</button>' +
        '</div>' +
        '<div class="item-acoes">' +
          '<button class="btn-secundario" data-acao="editar" data-id="' + lo.id + '">Editar</button>' +
          '<button class="btn-perigo" data-acao="apagar" data-id="' + lo.id + '">Apagar</button>' +
        '</div>';

      listaLotes.appendChild(div);
    });

    listaLotes.querySelectorAll('.btn-copiar').forEach(function (btn) {
      btn.addEventListener('click', function () {
        copiar(btn.dataset.copiar, btn);
      });
    });

    listaLotes.querySelectorAll('.item-acoes button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const id = btn.dataset.id;
        const acao = btn.dataset.acao;
        if (acao === 'editar') abrirModalEditarLote(id);
        if (acao === 'apagar') apagarLote(id);
      });
    });
  }

  function abrirModalNovoLote() {
    loteEditandoId = null;
    document.getElementById('modalLoteTitulo').textContent = 'Novo lote';
    document.getElementById('loNome').value = '';
    document.getElementById('loResponsavel').value = '';
    document.getElementById('loQuantidade').value = '50';
    document.getElementById('loSenha').value = gerarSenha();
    erroLote.textContent = '';
    modalLote.classList.add('aberto');
  }

  async function abrirModalEditarLote(id) {
    loteEditandoId = id;

    const { data, error } = await sb
      .from('lotes')
      .select('*')
      .eq('id', id)
      .maybeSingle();

    if (error || !data) {
      alert('Erro ao carregar lote');
      return;
    }

    document.getElementById('modalLoteTitulo').textContent = 'Editar lote';
    document.getElementById('loNome').value = data.nome || '';
    document.getElementById('loResponsavel').value = data.responsavel || '';
    document.getElementById('loQuantidade').value = data.quantidade || 50;
    document.getElementById('loSenha').value = data.senha || '';
    erroLote.textContent = '';
    modalLote.classList.add('aberto');
  }

  async function salvarLote() {
    erroLote.textContent = '';

    const nome = document.getElementById('loNome').value.trim();
    const responsavel = document.getElementById('loResponsavel').value.trim();

    if (!nome) {
      erroLote.textContent = 'O nome é obrigatório';
      return;
    }

    if (!responsavel) {
      erroLote.textContent = 'O responsável é obrigatório';
      return;
    }

    const dados = {
      nome: nome,
      responsavel: responsavel,
      quantidade: parseInt(document.getElementById('loQuantidade').value) || 50,
      senha: document.getElementById('loSenha').value.trim() || gerarSenha(),
      evento_id: eventoSelecionadoLotes
    };

    let resposta;

    if (loteEditandoId) {
      delete dados.evento_id;
      resposta = await sb.from('lotes').update(dados).eq('id', loteEditandoId);
    } else {
      resposta = await sb.from('lotes').insert(dados);
    }

    if (resposta.error) {
      erroLote.textContent = 'Erro ao salvar: ' + resposta.error.message;
      return;
    }

    modalLote.classList.remove('aberto');
    carregarLotes();
  }

  async function apagarLote(id) {
    const ok = confirm('Apagar este lote?\n\nOs códigos vinculados a ele também serão apagados.\nCadastros das pessoas serão mantidos.');
    if (!ok) return;

    const { error } = await sb.from('lotes').delete().eq('id', id);

    if (error) {
      alert('Erro ao apagar: ' + error.message);
      return;
    }

    carregarLotes();
  }

  btnNovoLote.addEventListener('click', abrirModalNovoLote);
  document.getElementById('btnSalvarLote').addEventListener('click', salvarLote);
  document.getElementById('btnCancelarLote').addEventListener('click', function () {
    modalLote.classList.remove('aberto');
  });
  modalLote.addEventListener('click', function (e) {
    if (e.target === modalLote) modalLote.classList.remove('aberto');
  });

  carregarEventos();
</script>

</body>
</html>
