<!DOCTYPE html>

<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="background:#060a06;color:#eee;padding:30px;font-family:Arial;text-align:center">
<div id="msg" style="font-size:20px;margin-bottom:30px;color:#555">JS nao rodou</div>
<button id="btn" style="background:#1e7a35;color:#fff;border:none;border-radius:8px;padding:16px 32px;font-size:18px;font-weight:700">Tocar aqui</button>
<script>
document.getElementById("msg").textContent = "JS rodou!";
document.getElementById("msg").style.color = "#2aab47";
document.getElementById("btn").onclick = function(){
  document.getElementById("msg").textContent = "Botao funcionou!";
};
</script>
</body>
</html>
