<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay - Bilhete</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bilhete{background:#090e09;border:1px solid #1a2a1a;border-radius:20px;max-width:380px;width:100%;overflow:hidden;box-shadow:0 0 40px rgba(42,171,71,.1)}
.bilhete-header{background:linear-gradient(180deg,#0a1a0a,#060a06);padding:24px 20px 20px;text-align:center;border-bottom:1px dashed #1a2a1a;position:relative}
.bilhete-header::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1px;background:repeating-linear-gradient(90deg,#1a2a1a 0,#1a2a1a 8px,transparent 8px,transparent 16px)}
.logo{font-size:22px;font-weight:900;color:#fff;letter-spacing:3px}
.logo span{color:#2aab47}
.logo-sub{font-size:9px;color:#2aab47;letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.ev-foto{width:100%;height:160px;object-fit:cover;display:block}
.ev-foto-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#0a1a0a,#1a2a1a);display:flex;align-items:center;justify-content:center;font-size:48px}
.bilhete-body{padding:20px}
.ev-nome{font-size:20px;font-weight:900;color:#fff;margin-bottom:8px;text-align:center}
.ev-info{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.ev-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#888}
.ev-row span{font-size:14px;flex-shrink:0}
.ev-row a{color:#2aab47;text-decoration:none}
.divider{border:none;border-top:1px dashed #1a2a1a;margin:16px 0}
.pessoa-nome{font-size:16px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px}
.pessoa-emp{font-size:11px;color:#555;text-align:center;margin-bottom:16px}
.qr-wrap{display:flex;justify-content:center;margin-bottom:12px}
#qrcode{background:#fff;padding:10px;border-radius:10px;display:inline-block}
.cod{text-align:center;font-family:monospace;font-size:22px;font-weight:900;color:#2aab47;letter-spacing:6px;margin-bottom:4px}
.cod-label{text-align:center;font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.bilhete-footer{background:#060a06;border-top:1px dashed #1a2a1a;padding:14px 20px;text-align:center}
.footer-text{font-size:10px;color:#333;letter-spacing:1px}
.loading{text-align:center;padding:60px 20px;font-size:14px;color:#555}
.erro{text-align:center;padding:60px 20px;font-size:14px;color:#c0392b}
</style>
</head>
<body>
<div class="bilhete" id="bilhete">
  <div class="loading" id="loading">&#9834; Carregando bilhete...</div>
</div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";

var params=new URLSearchParams(window.location.search);
var CAD_ID=params.get("cad");
var EV_ID=params.get("ev");

function ap(path){
  return fetch(SB+"/rest/v1/"+path,{headers:{"apikey":KY,"Authorization":"Bearer "+KY}}).then(function(r){return r.json();});
}

function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}

function render(cad, ev, cod){
  var b=document.getElementById("bilhete");
  var df=ev.data?ev.data.split("-"):["","",""];
  var dataFmt=ev.data?df[2]+"/"+df[1]+"/"+df[0]:"";
  var mapsLink=ev.maps_url?"<a href='"+ev.maps_url+"' target='_blank'>Ver no mapa</a>":"";

  var html="";
  html+="<div class='bilhete-header'>";
  html+="<div class='logo'>AGRO<span>PLAY</span></div>";
  html+="<div class='logo-sub'>Music &reg;</div>";
  html+="</div>";

  if(ev.foto_url){
    html+="<img class='ev-foto' src='"+ev.foto_url+"' onerror='this.style.display=\"none\"'>";
  } else {
    html+="<div class='ev-foto-placeholder'>&#127925;</div>";
  }

  html+="<div class='bilhete-body'>";
  html+="<div class='ev-nome'>"+ev.nome+"</div>";
  html+="<div class='ev-info'>";
  if(dataFmt){
    html+="<div class='ev-row'><span>&#128197;</span><div>"+dataFmt+(ev.horario?" &bull; "+ev.horario:"")+"</div></div>";
  }
  if(ev.local){
    html+="<div class='ev-row'><span>&#128205;</span><div>"+ev.local+(mapsLink?" &bull; "+mapsLink:"")+"</div></div>";
  }
  if(ev.atracao1){
    html+="<div class='ev-row'><span>&#127925;</span><div>"+ev.atracao1+(ev.atracao2?" &bull; "+ev.atracao2:"")+"</div></div>";
  }
  html+="</div>";

  html+="<hr class='divider'>";
  html+="<div class='pessoa-nome'>"+cad.nome+"</div>";
  if(cad.empresa||cad.cargo){
    html+="<div class='pessoa-emp'>"+(cad.empresa||"")+(cad.cargo?" &bull; "+cad.cargo:"")+"</div>";
  }

  html+="<div class='qr-wrap'><div id='qrcode'></div></div>";
  html+="<div class='cod'>"+(cod||"CAD"+cad.id)+"</div>";
  html+="<div class='cod-label'>Codigo de acesso</div>";
  html+="</div>";

  html+="<div class='bilhete-footer'>";
  html+="<div class='footer-text'>Bilhete intransferivel &bull; Agroplay Music &bull; Londrina PR</div>";
  html+="</div>";

  b.innerHTML=html;

  // Generate QR
  var qrText=cod||("CAD"+cad.id);
  new QRCode(document.getElementById("qrcode"),{
    text:qrText,
    width:160,height:160,
    colorDark:"#000000",colorLight:"#ffffff"
  });
}

if(!CAD_ID||!EV_ID){
  document.getElementById("loading").innerHTML="<div class='erro'>Link invalido.</div>";
} else {
  Promise.all([
    ap("cadastros?id=eq."+CAD_ID+"&select=*"),
    ap("eventos?id=eq."+EV_ID+"&select=*"),
    ap("codigos?cadastro_id=eq."+CAD_ID+"&select=codigo&limit=1")
  ]).then(function(res){
    var cad=res[0]&&res[0][0];
    var ev=res[1]&&res[1][0];
    var cod=res[2]&&res[2][0]?res[2][0].codigo:null;
    if(!cad||!ev){
      document.getElementById("bilhete").innerHTML="<div class='erro'>Bilhete nao encontrado.</div>";
      return;
    }
    render(cad,ev,cod);
  }).catch(function(){
    document.getElementById("bilhete").innerHTML="<div class='erro'>Erro ao carregar bilhete.</div>";
  });
}
</script>

</body>
</html>
