<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Bilhete Digital</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: Arial, sans-serif;
background: #060a06;
color: #eee;
min-height: 100vh;
padding: 16px;
}

.wrap { max-width: 420px; margin: 0 auto; }

.topo {
display: flex;
justify-content: center;
align-items: center;
margin-bottom: 18px;
padding-top: 10px;
}

.logo {
display: flex;
align-items: center;
border: 1px solid #1a2a1a;
border-radius: 10px;
overflow: hidden;
}

.logo .a {
background: #0d150d;
padding: 8px 14px;
font-size: 16px;
font-weight: 900;
color: #fff;
letter-spacing: 1px;
}

.logo .a span { color: #2aab47; }

.logo .v {
background: #c9973c;
padding: 8px 12px;
font-size: 11px;
font-weight: 700;
color: #fff;
letter-spacing: 1px;
}

.bilhete {
background: #090e09;
border: 1px solid #1a2a1a;
border-radius: 16px;
overflow: hidden;
box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.ev-foto {
width: 100%;
height: 200px;
object-fit: cover;
display: block;
background: #030503;
}

.ev-foto-vazio {
width: 100%;
height: 200px;
background: linear-gradient(135deg, #0d150d, #1e7a35);
display: flex;
align-items: center;
justify-content: center;
font-size: 64px;
}

.topo-info {
padding: 18px 16px 14px;
text-align: center;
}

.ev-nome {
font-size: 20px;
font-weight: 800;
color: #fff;
margin-bottom: 8px;
line-height: 1.2;
}

.ev-detalhe {
font-size: 12px;
color: #2aab47;
margin-bottom: 4px;
font-weight: 600;
}

.ev-local {
font-size: 12px;
color: #888;
}

.ev-local a {
color: #0891b2;
text-decoration: none;
border-bottom: 1px dotted #0891b2;
}

.ev-atracao {
font-size: 13px;
color: #c9973c;
margin-top: 6px;
font-weight: 700;
}

.divisor {
border-top: 2px dashed #1a2a1a;
margin: 0 16px;
position: relative;
}
.divisor::before, .divisor::after {
content: ‘’;
position: absolute;
top: -10px;
width: 20px;
height: 20px;
background: #060a06;
border-radius: 50%;
}
.divisor::before { left: -26px; }
.divisor::after { right: -26px; }

.pessoa {
padding: 16px;
text-align: center;
border-bottom: 1px solid #1a2a1a;
}

.pessoa-foto {
width: 70px;
height: 70px;
border-radius: 50%;
object-fit: cover;
border: 2px solid #2aab47;
margin: 0 auto 8px;
display: block;
}

.pessoa-inicial {
width: 70px;
height: 70px;
border-radius: 50%;
background: #1e7a35;
color: #fff;
font-size: 28px;
font-weight: 700;
display: flex;
align-items: center;
justify-content: center;
margin: 0 auto 8px;
}

.pessoa-nome {
font-size: 17px;
font-weight: 700;
color: #fff;
margin-bottom: 4px;
}

.pessoa-empresa {
font-size: 11px;
color: #888;
text-transform: uppercase;
letter-spacing: 1px;
}

.qr-area {
padding: 22px 16px;
text-align: center;
background: #0d150d;
}

.qr-box {
background: #fff;
padding: 14px;
border-radius: 12px;
display: inline-block;
margin-bottom: 12px;
}

.qr-codigo {
font-family: ‘Courier New’, monospace;
font-size: 22px;
font-weight: 900;
color: #2aab47;
letter-spacing: 4px;
margin-bottom: 4px;
}

.qr-label {
font-size: 9px;
color: #555;
text-transform: uppercase;
letter-spacing: 1px;
}

.acoes {
padding: 16px;
}

.btn {
width: 100%;
background: #1e7a35;
color: #fff;
border: none;
border-radius: 10px;
padding: 14px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
}
.btn:hover { background: #2aab47; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.badge-conf {
background: rgba(42, 171, 71, 0.15);
border: 1px solid #2aab47;
color: #2aab47;
padding: 12px;
border-radius: 10px;
text-align: center;
font-size: 13px;
font-weight: 700;
}

.badge-conf .data {
font-size: 10px;
color: #888;
font-weight: 400;
margin-top: 4px;
letter-spacing: 0;
text-transform: none;
}

.footer {
text-align: center;
margin-top: 18px;
font-size: 10px;
color: #444;
letter-spacing: 1px;
text-transform: uppercase;
line-height: 1.6;
}

.erro-box {
background: rgba(192, 57, 43, 0.15);
border: 1px solid #c0392b;
color: #e74c3c;
padding: 30px 16px;
border-radius: 12px;
text-align: center;
margin-top: 20px;
}

.erro-box .icone { font-size: 36px; margin-bottom: 10px; }

.carregando {
text-align: center;
padding: 60px 16px;
color: #555;
font-size: 13px;
}
</style>

</head>
<body>

<div class="wrap">
  <div class="topo">
    <div class="logo">
      <div class="a">AGRO<span>PLAY</span></div>
      <div class="v">v32</div>
    </div>
  </div>

  <div id="conteudo">
    <div class="carregando">Carregando bilhete...</div>
  </div>

  <div class="footer">
    Bilhete intransferível<br>
    Agroplay Music · Londrina PR
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
const SB_URL = 'https://wexwcnezjadoutyzkbcj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
const sb = supabase.createClient(SB_URL, SB_KEY);

const params = new URLSearchParams(window.location.search);
const cadId = params.get('cad');
const evId = params.get('ev');

function escaparHtml(t) {
  if (!t) return '';
  return String(t).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

function formatarData(iso) {
  if (!iso) return '';
  const p = iso.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function formatarHora(t) {
  if (!t) return '';
  return t.substring(0, 5);
}

function mostrarErro(msg) {
  document.getElementById('conteudo').innerHTML =
    '<div class="erro-box"><div class="icone">⚠️</div>' + msg + '</div>';
}

async function carregarBilhete() {
  if (!cadId || !evId) {
    mostrarErro('Link inválido. Faltam parâmetros.');
    return;
  }

  try {
    // Carrega cadastro, evento e código em paralelo
    const [cadResp, evResp, codResp] = await Promise.all([
      sb.from('cadastros').select('*').eq('id', cadId).single(),
      sb.from('eventos').select('*').eq('id', evId).single(),
      sb.from('codigos').select('codigo').eq('cadastro_id', cadId).limit(1).maybeSingle()
    ]);

    if (cadResp.error || !cadResp.data) {
      mostrarErro('Cadastro não encontrado.');
      return;
    }
    if (evResp.error || !evResp.data) {
      mostrarErro('Evento não encontrado.');
      return;
    }

    const cad = cadResp.data;
    const ev = evResp.data;
    const codigo = codResp.data?.codigo || '';

    renderBilhete(cad, ev, codigo);
  } catch (err) {
    mostrarErro('Erro ao carregar: ' + err.message);
  }
}

function renderBilhete(cad, ev, codigo) {
  const dataFmt = formatarData(ev.data);
  const horaIni = formatarHora(ev.horario);
  const horaFim = formatarHora(ev.horario_fim);

  // Foto evento
  let fotoEv = '';
  if (ev.foto_url) fotoEv = '<img src="' + escaparHtml(ev.foto_url) + '" class="ev-foto" alt="">';
  else fotoEv = '<div class="ev-foto-vazio">🎵</div>';

  // Local com link maps
  let local = '';
  if (ev.local) {
    if (ev.maps_url) local = '<a href="' + escaparHtml(ev.maps_url) + '" target="_blank">📍 ' + escaparHtml(ev.local) + '</a>';
    else local = '📍 ' + escaparHtml(ev.local);
  }

  // Atrações
  let atracoes = '';
  if (ev.atracao1) atracoes = ev.atracao1 + (ev.atracao2 ? ' + ' + ev.atracao2 : '');

  // Foto da pessoa
  let pessoaFoto;
  if (cad.foto_url) {
    pessoaFoto = '<img src="' + escaparHtml(cad.foto_url) + '" class="pessoa-foto">';
  } else {
    pessoaFoto = '<div class="pessoa-inicial">' + (cad.nome || '?').charAt(0).toUpperCase() + '</div>';
  }

  // Empresa/cargo
  let empresaTxt = '';
  if (cad.empresa && cad.cargo) empresaTxt = cad.empresa + ' · ' + cad.cargo;
  else if (cad.empresa) empresaTxt = cad.empresa;
  else if (cad.cargo) empresaTxt = cad.cargo;
  else empresaTxt = cad.setor || '';

  // Confirmacao do recebimento
  let acoesHtml;
  if (cad.bilhete_confirmado_em) {
    const dataConf = new Date(cad.bilhete_confirmado_em);
    const dataConfStr = dataConf.toLocaleDateString('pt-BR') + ' às ' + dataConf.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    acoesHtml = '<div class="badge-conf">✓ Bilhete confirmado!<div class="data">Recebido em ' + dataConfStr + '</div></div>';
  } else {
    acoesHtml = '<button class="btn" id="btnConfirmar">Confirmar recebimento do bilhete</button>';
  }

  const html = '<div class="bilhete">' +
    fotoEv +
    '<div class="topo-info">' +
      '<div class="ev-nome">' + escaparHtml(ev.nome) + '</div>' +
      (dataFmt ? '<div class="ev-detalhe">📅 ' + dataFmt + (horaIni ? ' às ' + horaIni + (horaFim ? ' - ' + horaFim : '') : '') + '</div>' : '') +
      (local ? '<div class="ev-local">' + local + '</div>' : '') +
      (atracoes ? '<div class="ev-atracao">🎵 ' + escaparHtml(atracoes) + '</div>' : '') +
    '</div>' +
    '<div class="divisor"></div>' +
    '<div class="pessoa">' +
      pessoaFoto +
      '<div class="pessoa-nome">' + escaparHtml(cad.nome) + '</div>' +
      (empresaTxt ? '<div class="pessoa-empresa">' + escaparHtml(empresaTxt) + '</div>' : '') +
    '</div>' +
    '<div class="qr-area">' +
      (codigo ? '<div id="qrcode" class="qr-box"></div><div class="qr-codigo">' + codigo + '</div><div class="qr-label">Código de entrada</div>' : '<div style="color:#888;font-size:12px;padding:20px">Sem código vinculado</div>') +
    '</div>' +
    '<div class="acoes">' + acoesHtml + '</div>' +
  '</div>';

  document.getElementById('conteudo').innerHTML = html;

  // Gera QR Code
  if (codigo) {
    new QRCode(document.getElementById('qrcode'), {
      text: codigo,
      width: 160,
      height: 160,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  // Listener do botão
  if (!cad.bilhete_confirmado_em) {
    document.getElementById('btnConfirmar').addEventListener('click', () => confirmarRecebimento(cad.id));
  }
}

async function confirmarRecebimento(id) {
  const btn = document.getElementById('btnConfirmar');
  btn.textContent = 'Confirmando...';
  btn.disabled = true;

  const agora = new Date().toISOString();
  const { error } = await sb.from('cadastros').update({ bilhete_confirmado_em: agora }).eq('id', id);

  if (error) {
    btn.textContent = 'Erro - tente novamente';
    btn.disabled = false;
    return;
  }

  // Recarrega pra mostrar o badge confirmado
  carregarBilhete();
}

carregarBilhete();
</script>

</body>
</html>
