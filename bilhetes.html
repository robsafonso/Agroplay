<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay - Bilhetes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;padding:16px;max-width:480px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{font-size:16px;font-weight:900;color:#fff;letter-spacing:2px}
.logo span{color:#2aab47}
.ev-info{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:14px;margin-bottom:16px}
.ev-nome{font-size:16px;font-weight:900;color:#fff;margin-bottom:4px}
.ev-det{font-size:11px;color:#555}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#090e09;border:1px solid #1a2a1a;border-radius:10px;padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:900;display:block}
.stat-l{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:700;margin-top:16px}
.card{background:#090e09;border-radius:10px;padding:12px;margin-bottom:8px}
.card-nome{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.card-sub{font-size:11px;color:#555;margin-bottom:8px}
.btn-bil{width:100%;border:none;border-radius:8px;padding:10px;font-size:12px;cursor:pointer;font-weight:700}
.btn-reenviar{width:100%;margin-top:6px;background:transparent;border:1px solid #555;color:#555;border-radius:8px;padding:6px;font-size:10px;cursor:pointer}
.aviso{background:#1a0e00;border:1px solid rgba(201,151,60,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#c9973c;margin-bottom:16px}
.loading{text-align:center;padding:40px;font-size:14px;color:#555}
.back{background:transparent;border:1px solid #1a2a1a;border-radius:8px;padding:6px 12px;color:#eee;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div onclick="location.href='home.html'" style="cursor:pointer" class="logo">AGRO<span>PLAY</span></div>
  <button class="back" onclick="history.back()">&larr; Voltar</button>
</div>
<div id="conteudo"><div class="loading">Carregando...</div></div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";
var params=new URLSearchParams(window.location.search);
var EV_ID=params.get("ev");

function ap(path,o){
  o=o||{};
  var h={"apikey":KY,"Authorization":"Bearer "+KY,"Content-Type":"application/json"};
  if(o.pref)h["Prefer"]=o.pref;
  return fetch(SB+"/rest/v1/"+path,{method:o.m||"GET",headers:h,body:o.b}).then(function(r){return r.text();}).then(function(t){return t?JSON.parse(t):null;});
}

function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}

function copiarBilhete(btn,pessoaId){
  var msg=btn.getAttribute("data-msg");
  function doCopy(){
    btn.textContent="Enviado!";
    btn.style.background="#c9973c";
    btn.style.color="#fff";
    ap("cadastros?id=eq."+pessoaId,{m:"PATCH",pref:"return=minimal",b:JSON.stringify({bilhete_enviado:true,bilhete_enviado_em:new Date().toISOString()})});
  }
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(function(){doCopy();});
  } else {
    var t=document.createElement("textarea");t.value=msg;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
    doCopy();
  }
}

function reenviar(pessoaId){
  if(!confirm("Reenviar bilhete para esta pessoa?"))return;
  ap("cadastros?id=eq."+pessoaId,{m:"PATCH",pref:"return=minimal",b:JSON.stringify({bilhete_enviado:false,bilhete_enviado_em:null,bilhete_confirmado:false,bilhete_confirmado_em:null})}).then(function(){location.reload();});
}

function render(ev,pessoas){
  var hoje=new Date();
  var evData=ev.data?new Date(ev.data):null;
  var dias=evData?Math.ceil((evData-hoje)/(1000*60*60*24)):999;
  var bilheteOk=dias<=7;
  var dataFmt=fd(ev.data);

  var naoEnviados=pessoas.filter(function(p){return !p.bilhete_enviado&&!p.bilhete_confirmado;});
  var enviados=pessoas.filter(function(p){return p.bilhete_enviado&&!p.bilhete_confirmado;});
  var confirmados=pessoas.filter(function(p){return p.bilhete_confirmado;});

  var html="";
  html+="<div class='ev-info'><div class='ev-nome'>"+ev.nome+"</div><div class='ev-det'>"+dataFmt+(ev.horario?" as "+ev.horario:"")+(ev.local?" - "+ev.local:"")+"</div></div>";

  html+="<div class='stats'>";
  html+="<div class='stat'><span class='stat-n' style='color:#0891b2'>"+naoEnviados.length+"</span><div class='stat-l'>Nao enviado</div></div>";
  html+="<div class='stat'><span class='stat-n' style='color:#c9973c'>"+enviados.length+"</span><div class='stat-l'>Aguardando</div></div>";
  html+="<div class='stat'><span class='stat-n' style='color:#2aab47'>"+confirmados.length+"</span><div class='stat-l'>Confirmado</div></div>";
  html+="</div>";

  if(!bilheteOk){
    html+="<div class='aviso'>Bilhetes disponiveis somente faltando 7 dias. Faltam <b>"+dias+"</b> dias.</div>";
  }

  function cardP(p,status){
    var link="https://robsafonso.github.io/Agroplay/bilhete.html?cad="+p.id+"&ev="+EV_ID;
    var msg="AGROPLAY - Seu Bilhete\n\nOla "+p.nome+"!\n\nSeu bilhete para:\n"+ev.nome+(dataFmt?"\nData: "+dataFmt:"")+(ev.horario?"\nHorario: "+ev.horario:"")+(ev.local?"\nLocal: "+ev.local:"")+"\n\nAcesse seu bilhete e QR Code:\n"+link+"\n\nApresente na entrada.\nAgroplay Music - Londrina PR";
    var borderColor=status==="confirmado"?"rgba(42,171,71,.4)":status==="enviado"?"rgba(201,151,60,.4)":"rgba(8,145,178,.3)";
    var c="<div class='card' style='border:1px solid "+borderColor+"'>";
    c+="<div class='card-nome'>"+p.nome+"</div>";
    c+="<div class='card-sub'>"+(p.lote_nome?"Convidado por "+p.lote_nome:"Convite direto")+"</div>";
    if(status==="confirmado"){
      c+="<div style='font-size:11px;color:#2aab47;background:#0a1a0a;border:1px solid rgba(42,171,71,.2);border-radius:6px;padding:6px;text-align:center;margin-bottom:6px'>Bilhete confirmado</div>";
      c+="<button class='btn-reenviar' onclick='reenviar("+p.id+")'>Reenviar bilhete</button>";
    } else if(status==="enviado"){
      c+="<div style='font-size:11px;color:#c9973c;background:#1a0e00;border:1px solid rgba(201,151,60,.2);border-radius:6px;padding:6px;text-align:center;margin-bottom:6px'>Aguardando confirmacao</div>";
      c+="<button class='btn-bil' onclick='copiarBilhete(this,"+p.id+")' data-msg='"+msg.replace(/'/g,"&#39;")+"' style='background:#c9973c;color:#fff'>Reenviar bilhete</button>";
    } else {
      c+="<button class='btn-bil' onclick='copiarBilhete(this,"+p.id+")' data-msg='"+msg.replace(/'/g,"&#39;")+"' style='background:#0891b2;color:#fff'>"+(bilheteOk?"Copiar bilhete":"Bilhete indisponivel")+"</button>";
    }
    c+="</div>";
    return c;
  }

  if(naoEnviados.length){
    html+="<div class='section-label' style='color:#0891b2'>Nao enviados ("+naoEnviados.length+")</div>";
    naoEnviados.forEach(function(p){html+=cardP(p,"nao");});
  }
  if(enviados.length){
    html+="<div class='section-label' style='color:#c9973c'>Aguardando confirmacao ("+enviados.length+")</div>";
    enviados.forEach(function(p){html+=cardP(p,"enviado");});
  }
  if(confirmados.length){
    html+="<div class='section-label' style='color:#2aab47'>Confirmados ("+confirmados.length+")</div>";
    confirmados.forEach(function(p){html+=cardP(p,"confirmado");});
  }

  document.getElementById("conteudo").innerHTML=html;
}

if(!EV_ID){
  document.getElementById("conteudo").innerHTML="<div class='loading'>Link invalido.</div>";
} else {
  Promise.all([
    ap("eventos?id=eq."+EV_ID+"&select=*"),
    ap("cadastros?evento_id=eq."+EV_ID+"&select=*&order=nome.asc")
  ]).then(function(res){
    var ev=res[0]&&res[0][0];
    var pessoas=res[1]||[];
    if(!ev){document.getElementById("conteudo").innerHTML="<div class='loading'>Evento nao encontrado.</div>";return;}
    render(ev,pessoas);
  }).catch(function(){
    document.getElementById("conteudo").innerHTML="<div class='loading'>Erro ao carregar.</div>";
  });
}
</script>

</body>
</html>
