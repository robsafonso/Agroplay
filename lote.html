<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Painel de Convites</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: Arial, sans-serif; background: #060a06; color: #eee; min-height: 100vh; }

header { background: #060a06; border-bottom: 2px solid #1e7a35; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }

.logo { display: flex; align-items: center; border: 1px solid #1a2a1a; border-radius: 10px; overflow: hidden; }
.logo .a { background: #0d150d; padding: 7px 12px; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 1px; }
.logo .a span { color: #2aab47; }
.logo .v { background: #c9973c; padding: 7px 10px; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 1px; }

.btn-sair { background: transparent; border: 1px solid #c0392b; color: #c0392b; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }

main { max-width: 700px; margin: 0 auto; padding: 24px 16px 40px; }

.login-card { background: #090e09; border: 1px solid #1a2a1a; border-radius: 16px; padding: 36px 26px; max-width: 380px; margin: 60px auto; }
.login-card h1 { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 4px; color: #fff; }
.login-card .subtitle { text-align: center; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }

.fl { margin-bottom: 12px; }
.fl label { display: block; font-size: 10px; color: #2aab47; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }

input { width: 100%; padding: 11px 13px; background: #030503; border: 1px solid #1a2a1a; border-radius: 8px; color: #eee; font-size: 14px; outline: none; font-family: inherit; }
input:focus { border-color: #2aab47; }

.btn { background: #1e7a35; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn:hover { background: #2aab47; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.erro { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }

.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat { background: #090e09; border: 1px solid #1a2a1a; border-radius: 10px; padding: 10px 6px; text-align: center; flex: 1; }
.stat strong { font-size: 20px; display: block; }
.stat small { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

.saudacao { margin-bottom: 18px; }
.saudacao h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
.saudacao p { font-size: 12px; color: #888; }

.ev-info { background: #090e09; border: 1px solid #1a2a1a; border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.7; }
.ev-info-titulo { font-size: 14px; color: #2aab47; font-weight: 700; margin-bottom: 6px; }

/* 3 ESTADOS DOS CONVITES */
.convite-card {
background: #090e09;
border: 1px solid #1a2a1a;
border-radius: 10px;
padding: 12px;
margin-bottom: 10px;
transition: all 0.3s;
}

/* AMARELO: enviado (responsavel copiou) */
.convite-card.enviado {
background: rgba(201, 151, 60, 0.12);
border-color: #c9973c;
}
.convite-card.enviado .convite-codigo { color: #c9973c; }

/* VERDE: confirmado (pessoa fez cadastro) */
.convite-card.confirmado {
background: rgba(42, 171, 71, 0.18);
border-color: #2aab47;
}
.convite-card.confirmado .convite-codigo { color: #2aab47; }

.convite-numero { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.convite-codigo { font-family: monospace; font-size: 16px; font-weight: 900; color: #888; letter-spacing: 2px; margin-bottom: 4px; }
.convite-status { font-size: 11px; margin-bottom: 8px; font-weight: 700; }
.convite-status.disponivel { color: #888; }
.convite-status.enviado-cor { color: #c9973c; }
.convite-status.confirmado-cor { color: #2aab47; }

.label-pq { font-size: 10px; color: #2aab47; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }

.trocar-senha { background: rgba(201, 151, 60, 0.15); border: 1px solid #c9973c; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.trocar-senha h3 { color: #c9973c; font-size: 14px; margin-bottom: 4px; }
.trocar-senha p { font-size: 12px; color: #aaa; margin-bottom: 10px; }

.legenda { display: flex; gap: 12px; font-size: 10px; color: #888; margin-bottom: 12px; flex-wrap: wrap; }
.legenda-item { display: flex; align-items: center; gap: 5px; }
.leg-bola { width: 10px; height: 10px; border-radius: 50%; }

/* Abas */
.tabs-lote { display: flex; gap: 6px; margin-bottom: 14px; }
.tab-lote { background: transparent; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #555; cursor: pointer; font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
.tab-lote.on { border-color: #2aab47; color: #2aab47; background: rgba(42, 171, 71, 0.1); }
.tab-lote.bloqueado { border-color: #2a1a1a; color: #444; cursor: not-allowed; }
.tab-lote .badge-mini { display: inline-block; background: #c9973c; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 8px; margin-left: 4px; font-weight: 700; }
.gone { display: none !important; }

.aviso-bloqueado { background: rgba(8, 145, 178, 0.08); border: 1px solid #0891b2; padding: 18px; border-radius: 10px; text-align: center; margin-top: 8px; }
.aviso-bloqueado .titulo { font-weight: 700; margin-bottom: 8px; color: #0891b2; font-size: 14px; }
.aviso-bloqueado .desc { font-size: 12px; color: #aaa; line-height: 1.6; }

/* Cards bilhetes */
.bil-card { background: #090e09; border: 1px solid #1a2a1a; border-left: 4px solid #0891b2; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.bil-card.aguardando { border-left-color: #c9973c; background: rgba(201, 151, 60, 0.06); }
.bil-card.confirmado { border-left-color: #2aab47; background: rgba(42, 171, 71, 0.08); }
.bil-cabec { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.bil-info { flex: 1; min-width: 140px; }
.bil-nome { font-size: 14px; font-weight: 700; color: #fff; }
.bil-det { font-size: 10px; color: #666; margin-top: 2px; }
.bil-stat { font-size: 9px; margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.bil-stat.nenv { color: #0891b2; }
.bil-stat.aguard { color: #c9973c; }
.bil-stat.conf { color: #2aab47; }
</style>

</head>

<script>
const SB_URL = 'https://wexwcnezjadoutyzkbcj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
const sb = supabase.createClient(SB_URL, SB_KEY);
const URL_BASE = window.location.origin + window.location.pathname.replace('lote.html', '');

let loteAtual = null;
let codigosLote = [];
let eventoLote = null;
let cadastrosLote = [];

function escaparHtml(t) { if (!t) return ''; return String(t).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }
function formatarData(iso) { if (!iso) return ''; const p = iso.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }

function copiar(texto, botao, label, callback) {
  const original = label || (botao ? botao.textContent : '');
  navigator.clipboard.writeText(texto).then(() => {
    if (botao) { botao.textContent = '✓ Copiado!'; setTimeout(() => { botao.textContent = original; }, 1800); }
    if (callback) callback();
  });
}

async function entrar() {
  const nome = document.getElementById('inputNome').value.trim();
  const senha = document.getElementById('inputSenha').value.trim();
  const erro = document.getElementById('erroLogin');
  erro.textContent = '';

  if (!nome) { erro.textContent = 'Digite seu nome'; return; }
  if (!senha) { erro.textContent = 'Digite a senha'; return; }

  const btn = document.getElementById('btnEntrar');
  btn.disabled = true; btn.textContent = 'Entrando...';

  // Busca pelo NOME exato (case-sensitive) E senha
  const { data, error } = await sb.from('lotes')
    .select('*')
    .eq('responsavel', nome)
    .eq('senha', senha)
    .maybeSingle();

  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { erro.textContent = 'Erro ao conectar'; return; }
  if (!data) { erro.textContent = 'Nome ou senha inválidos'; return; }

  loteAtual = data;
  if (!data.senha_padrao) {
    sessionStorage.setItem('ag_lote', JSON.stringify({ id: data.id, senha: data.senha }));
  }
  abrirPainel();
}

async function abrirPainel() {
  document.getElementById('appLogin').style.display = 'none';
  document.getElementById('appPainel').style.display = 'block';

  if (loteAtual.senha_padrao) {
    document.getElementById('trocarSenhaWrap').style.display = 'block';
    document.getElementById('painelConteudo').style.display = 'none';
  } else {
    document.getElementById('trocarSenhaWrap').style.display = 'none';
    document.getElementById('painelConteudo').style.display = 'block';
    await carregarPainel();
  }
}

async function trocarSenha() {
  const nova = document.getElementById('novaSenha').value.trim();
  const erro = document.getElementById('erroTrocarSenha');
  erro.textContent = '';
  if (!nova || nova.length < 4) { erro.textContent = 'Senha precisa ter pelo menos 4 caracteres'; return; }
  if (nova === loteAtual.senha) { erro.textContent = 'Escolha uma senha diferente da atual'; return; }

  const btn = document.getElementById('btnTrocarSenha');
  btn.disabled = true; btn.textContent = 'Salvando...';

  // Atualiza senha E marca como nao-padrao
  const { error } = await sb.from('lotes')
    .update({ senha: nova, senha_padrao: false })
    .eq('id', loteAtual.id);

  btn.disabled = false; btn.textContent = 'Salvar nova senha';
  if (error) { erro.textContent = 'Erro ao salvar'; return; }

  loteAtual.senha = nova;
  loteAtual.senha_padrao = false;
  sessionStorage.setItem('ag_lote', JSON.stringify({ id: loteAtual.id, senha: nova }));

  document.getElementById('trocarSenhaWrap').style.display = 'none';
  document.getElementById('painelConteudo').style.display = 'block';
  document.getElementById('novaSenha').value = '';
  await carregarPainel();
}

async function carregarPainel() {
  document.getElementById('saudacao').textContent = 'Olá, ' + loteAtual.responsavel;

  const { data: codigos } = await sb.from('codigos').select('*').eq('lote_id', loteAtual.id).order('codigo', { ascending: true });
  codigosLote = codigos || [];

  if (loteAtual.evento_id) {
    const { data: ev } = await sb.from('eventos').select('*').eq('id', loteAtual.evento_id).maybeSingle();
    eventoLote = ev;
  }

  // Busca cadastros do lote: por lote_id OU pelo lote_nome (compatibilidade com cadastros antigos)
  const { data: cadsId } = await sb.from('cadastros').select('*').eq('lote_id', loteAtual.id).neq('tipo', 'staff');
  const { data: cadsNome } = await sb.from('cadastros').select('*').eq('lote_nome', loteAtual.responsavel).is('lote_id', null).neq('tipo', 'staff');

  // Junta os 2 sem duplicar
  const idsVistos = new Set();
  cadastrosLote = [];
  (cadsId || []).forEach(c => { if (!idsVistos.has(c.id)) { idsVistos.add(c.id); cadastrosLote.push(c); } });
  (cadsNome || []).forEach(c => { if (!idsVistos.has(c.id)) { idsVistos.add(c.id); cadastrosLote.push(c); } });

  renderStats();
  renderEventoInfo();
  configurarAbas();
  renderConvites();
  renderBilhetesLote();
}

// Calcula se faltam ≤7 dias pro evento
function podeAbrirBilhetes() {
  if (!eventoLote || !eventoLote.data) return false;
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  const dataEv = new Date(eventoLote.data + 'T00:00:00');
  const diffDias = Math.floor((dataEv - hoje) / (1000 * 60 * 60 * 24));
  return diffDias <= 7 && diffDias >= -1;
}

function diasParaEvento() {
  if (!eventoLote || !eventoLote.data) return null;
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  const dataEv = new Date(eventoLote.data + 'T00:00:00');
  return Math.floor((dataEv - hoje) / (1000 * 60 * 60 * 24));
}

function configurarAbas() {
  const tab = document.getElementById('tabBilhetes');
  const podeBil = podeAbrirBilhetes();

  // Conta bilhetes nao enviados ainda pra mostrar badge
  const naoEnv = cadastrosLote.filter(c => !c.bilhete_enviado_em).length;

  if (podeBil) {
    tab.classList.remove('bloqueado');
    if (naoEnv > 0) {
      tab.innerHTML = 'Bilhetes <span class="badge-mini">' + naoEnv + '</span>';
    } else {
      tab.innerHTML = 'Bilhetes';
    }
  } else {
    tab.classList.add('bloqueado');
    tab.innerHTML = 'Bilhetes 🔒';
  }
}

function trocarAbaLote(aba) {
  // Bloqueia bilhetes se ainda não pode
  if (aba === 'bilhetes' && !podeAbrirBilhetes()) {
    document.querySelectorAll('.tab-lote').forEach(t => t.classList.remove('on'));
    document.querySelector('[data-aba="bilhetes"]').classList.add('on');
    document.getElementById('abaConvites').classList.add('gone');
    document.getElementById('abaBilhetes').classList.remove('gone');
    renderBilhetesLote(); // mostra só o aviso
    return;
  }

  document.querySelectorAll('.tab-lote').forEach(t => t.classList.remove('on'));
  document.querySelector('[data-aba="' + aba + '"]').classList.add('on');

  if (aba === 'convites') {
    document.getElementById('abaConvites').classList.remove('gone');
    document.getElementById('abaBilhetes').classList.add('gone');
  } else {
    document.getElementById('abaConvites').classList.add('gone');
    document.getElementById('abaBilhetes').classList.remove('gone');
    renderBilhetesLote();
  }
}

function renderBilhetesLote() {
  const el = document.getElementById('bilhetesConteudoLote');

  // Se ainda nao pode abrir bilhetes
  if (!podeAbrirBilhetes()) {
    const dias = diasParaEvento();
    let msg = '';
    if (dias === null) msg = 'Este lote ainda não tem evento vinculado.';
    else if (dias > 7) msg = 'Faltam <b style="color:#fff">' + dias + ' dias</b> para o evento.<br>Os bilhetes ficam disponíveis 7 dias antes.';
    else msg = 'O evento já passou.';

    el.innerHTML = '<div class="aviso-bloqueado">' +
      '<div class="titulo">🔒 Bilhetes ainda não disponíveis</div>' +
      '<div class="desc">' + msg + '</div>' +
    '</div>';
    return;
  }

  if (!cadastrosLote.length) {
    el.innerHTML = '<div class="aviso-bloqueado"><div class="titulo">Nenhum cadastrado ainda</div><div class="desc">Aguarde seus convidados fazerem o cadastro pelo link enviado.</div></div>';
    return;
  }

  // Stats
  const totNenv = cadastrosLote.filter(c => !c.bilhete_enviado_em).length;
  const totAguard = cadastrosLote.filter(c => c.bilhete_enviado_em && !c.bilhete_confirmado_em).length;
  const totConf = cadastrosLote.filter(c => c.bilhete_confirmado_em).length;

  let h = '<div style="display:flex;gap:6px;margin-bottom:14px">';
  h += '<div style="flex:1;background:#0891b2;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#fff">' + totNenv + '</div><div style="font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:1px;opacity:0.9">N/Env</div></div>';
  h += '<div style="flex:1;background:#c9973c;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#fff">' + totAguard + '</div><div style="font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:1px;opacity:0.9">Aguard</div></div>';
  h += '<div style="flex:1;background:#1e7a35;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#fff">' + totConf + '</div><div style="font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:1px;opacity:0.9">Conf</div></div>';
  h += '</div>';

  h += '<div class="legenda" style="margin-bottom:14px">';
  h += '<div class="legenda-item"><span class="leg-bola" style="background:#0891b2"></span> Não enviado</div>';
  h += '<div class="legenda-item"><span class="leg-bola" style="background:#c9973c"></span> Aguardando</div>';
  h += '<div class="legenda-item"><span class="leg-bola" style="background:#2aab47"></span> Confirmado</div>';
  h += '</div>';

  // Ordena: nao enviados primeiro, depois aguardando, depois confirmados
  const ordenadas = [...cadastrosLote].sort((a, b) => {
    const ord = (p) => p.bilhete_confirmado_em ? 2 : (p.bilhete_enviado_em ? 1 : 0);
    return ord(a) - ord(b);
  });

  ordenadas.forEach(p => {
    let classe = '';
    let statTxt = '';
    let statClasse = '';
    let btnTxt = 'Enviar bilhete';

    if (p.bilhete_confirmado_em) {
      classe = 'confirmado';
      statTxt = '✓ Confirmado pelo convidado';
      statClasse = 'conf';
      btnTxt = 'Reenviar bilhete';
    } else if (p.bilhete_enviado_em) {
      classe = 'aguardando';
      const dt = new Date(p.bilhete_enviado_em);
      statTxt = '✉ Enviado em ' + dt.toLocaleDateString('pt-BR');
      statClasse = 'aguard';
      btnTxt = 'Reenviar bilhete';
    } else {
      statTxt = '○ Não enviado';
      statClasse = 'nenv';
    }

    h += '<div class="bil-card ' + classe + '" id="bil-' + p.id + '">' +
      '<div class="bil-cabec">' +
        '<div class="bil-info">' +
          '<div class="bil-nome">' + escaparHtml(p.nome) + '</div>' +
          '<div class="bil-det">' + escaparHtml(p.empresa || p.setor || '-') + '</div>' +
          '<div class="bil-stat ' + statClasse + '">' + statTxt + '</div>' +
        '</div>' +
      '</div>' +
      '<button class="btn" data-cad-id="' + p.id + '" onclick="copiarBilheteLote(this)" style="font-size:12px;padding:9px;width:100%">' + btnTxt + '</button>' +
    '</div>';
  });

  el.innerHTML = h;
}

async function copiarBilheteLote(btn) {
  const cadId = btn.dataset.cadId;
  const cad = cadastrosLote.find(c => c.id === cadId);
  if (!cad || !eventoLote) return;

  // Monta mensagem ANTES (clipboard exige no mesmo tick)
  const linkBilhete = URL_BASE + 'bilhete.html?cad=' + cad.id + '&ev=' + eventoLote.id;
  const dataFmt = formatarData(eventoLote.data);
  const horaIni = eventoLote.horario ? eventoLote.horario.substring(0, 5) : '';
  const horaFim = eventoLote.horario_fim ? eventoLote.horario_fim.substring(0, 5) : '';

  let detalhes = '';
  if (dataFmt) detalhes += '\n📅 ' + dataFmt + (horaIni ? ' às ' + horaIni + (horaFim ? ' - ' + horaFim : '') : '');
  if (eventoLote.local) detalhes += '\n📍 ' + eventoLote.local;
  if (eventoLote.atracao1) detalhes += '\n🎵 ' + eventoLote.atracao1 + (eventoLote.atracao2 ? ' + ' + eventoLote.atracao2 : '');

  const msg = 'AGROPLAY Music 🎵\n\nOlá ' + cad.nome + '!\n\nSeu bilhete para ' + eventoLote.nome + ' está disponível:' + detalhes + '\n\nAcesse seu bilhete digital com QR Code:\n' + linkBilhete + '\n\nApós receber, confirme o recebimento clicando no botão dentro do bilhete.\n\nAgroplay Music · Londrina PR';

  // Copia (com fallback)
  let copiouOk = false;
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(msg);
      copiouOk = true;
    } else {
      const ta = document.createElement('textarea');
      ta.value = msg;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      copiouOk = document.execCommand('copy');
      document.body.removeChild(ta);
    }
  } catch (e) { copiouOk = false; }

  // Marca como enviado no banco (se ainda não foi)
  if (!cad.bilhete_enviado_em) {
    const agora = new Date().toISOString();
    await sb.from('cadastros').update({ bilhete_enviado_em: agora }).eq('id', cadId);
    cad.bilhete_enviado_em = agora;
  }

  if (copiouOk) {
    btn.textContent = '✓ Mensagem copiada!';
    btn.disabled = true;
    setTimeout(() => { renderBilhetesLote(); configurarAbas(); }, 1500);
  } else {
    btn.textContent = '⚠️ Copia manual';
    btn.disabled = true;
    setTimeout(() => {
      prompt('Copie a mensagem abaixo:', msg);
      renderBilhetesLote();
      configurarAbas();
    }, 200);
  }
}

function renderStats() {
  const usados = codigosLote.filter(c => c.usado).length;
  const enviados = codigosLote.filter(c => c.enviado && !c.usado).length;
  const livres = codigosLote.length - usados - enviados;
  document.getElementById('statsLote').innerHTML =
    '<div class="stat"><strong style="color:#fff">' + codigosLote.length + '</strong><small>Total</small></div>' +
    '<div class="stat"><strong style="color:#888">' + livres + '</strong><small>Livres</small></div>' +
    '<div class="stat"><strong style="color:#c9973c">' + enviados + '</strong><small>Enviados</small></div>' +
    '<div class="stat"><strong style="color:#2aab47">' + usados + '</strong><small>Confirmados</small></div>';
}

function renderEventoInfo() {
  if (!eventoLote) { document.getElementById('eventoInfo').innerHTML = ''; return; }
  const data = formatarData(eventoLote.data);
  const horario = eventoLote.horario ? eventoLote.horario.substring(0, 5) : '';
  const horarioFim = eventoLote.horario_fim ? eventoLote.horario_fim.substring(0, 5) : '';

  let h = '<div class="ev-info"><div class="ev-info-titulo">🎵 ' + escaparHtml(eventoLote.nome) + '</div>';
  if (data) h += '📅 ' + data + (horario ? ' às ' + horario + (horarioFim ? ' - ' + horarioFim : '') : '') + '<br>';
  if (eventoLote.local) h += '📍 ' + escaparHtml(eventoLote.local) + '<br>';
  if (eventoLote.atracao1) h += '🎤 ' + escaparHtml(eventoLote.atracao1) + (eventoLote.atracao2 ? ' + ' + escaparHtml(eventoLote.atracao2) : '');
  h += '</div>';

  document.getElementById('eventoInfo').innerHTML = h;
}

function renderConvites() {
  const el = document.getElementById('listaConvites');
  if (!codigosLote.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;color:#555">Nenhum convite disponível</div>';
    return;
  }

  // Calcular resumo
  let naoEnv = 0, enviados = 0, cadastrados = 0, confirmados = 0;
  codigosLote.forEach(c => {
    if (c.cadastro_id) {
      const cad = cadastrosLote.find(x => x.id === c.cadastro_id);
      if (cad && (cad.status === 'aprovado' || cad.bilhete_confirmado_em)) confirmados++;
      else cadastrados++;
    } else if (c.enviado) {
      enviados++;
    } else {
      naoEnv++;
    }
  });

  // Resumo no topo
  let h = '<div class="label-pq" style="margin-bottom:10px">Seus convites</div>';
  h += '<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">';
  h += '<div style="flex:1;min-width:60px;text-align:center;background:#0d150d;border:1px solid #333;border-radius:8px;padding:8px"><div style="font-size:18px;font-weight:900;color:#888">' + naoEnv + '</div><div style="font-size:9px;color:#666;text-transform:uppercase">Não env</div></div>';
  h += '<div style="flex:1;min-width:60px;text-align:center;background:#0a1f24;border:1px solid #0891b2;border-radius:8px;padding:8px"><div style="font-size:18px;font-weight:900;color:#0891b2">' + enviados + '</div><div style="font-size:9px;color:#0891b2;text-transform:uppercase">Enviado</div></div>';
  h += '<div style="flex:1;min-width:60px;text-align:center;background:#2a1f0a;border:1px solid #c9973c;border-radius:8px;padding:8px"><div style="font-size:18px;font-weight:900;color:#c9973c">' + cadastrados + '</div><div style="font-size:9px;color:#c9973c;text-transform:uppercase">Cadast.</div></div>';
  h += '<div style="flex:1;min-width:60px;text-align:center;background:#0a2818;border:1px solid #2aab47;border-radius:8px;padding:8px"><div style="font-size:18px;font-weight:900;color:#2aab47">' + confirmados + '</div><div style="font-size:9px;color:#2aab47;text-transform:uppercase">Confirm.</div></div>';
  h += '</div>';

  codigosLote.forEach((cod, i) => {
    const link = URL_BASE + 'cadastro.html?cod=' + cod.codigo + '&resp=' + encodeURIComponent(loteAtual.responsavel) + (loteAtual.evento_id ? '&ev=' + loteAtual.evento_id : '');

    let evBlock = '';
    if (eventoLote) {
      const data = formatarData(eventoLote.data);
      const horario = eventoLote.horario ? eventoLote.horario.substring(0, 5) : '';
      const horarioFim = eventoLote.horario_fim ? eventoLote.horario_fim.substring(0, 5) : '';
      evBlock = '\n\n🎤 ' + eventoLote.nome;
      if (data) evBlock += '\n📅 ' + data + (horario ? ' às ' + horario + (horarioFim ? ' - ' + horarioFim : '') : '');
      if (eventoLote.local) evBlock += '\n📍 ' + eventoLote.local;
      if (eventoLote.atracao1) evBlock += '\n🎵 ' + eventoLote.atracao1 + (eventoLote.atracao2 ? ' + ' + eventoLote.atracao2 : '');
    }

    const msg = 'AGROPLAY Music 🎵\n\nOlá! Você foi convidado por ' + loteAtual.responsavel + ' para fazer parte do nosso sistema.' + evBlock + '\n\nAcesse o link abaixo e faça seu cadastro:\n' + link + '\n\nCódigo: ' + cod.codigo + '\nCódigo intransferível e de uso único.';

    // Determinar status visual
    let cor = '#333', bg = '#0d150d', label = 'Não enviado', txtCor = '#888';
    let nomePessoa = '';
    let labelBotao = 'Copiar mensagem';
    
    if (cod.cadastro_id) {
      const cad = cadastrosLote.find(x => x.id === cod.cadastro_id);
      if (cad) {
        nomePessoa = cad.nome;
        if (cad.status === 'aprovado' || cad.bilhete_confirmado_em) {
          cor = '#2aab47'; bg = '#0a2818'; label = '✓ Confirmado'; txtCor = '#2aab47';
        } else {
          cor = '#c9973c'; bg = '#2a1f0a'; label = '⚠ Cadastrado'; txtCor = '#c9973c';
        }
      }
    } else if (cod.enviado) {
      cor = '#0891b2'; bg = '#0a1f24'; label = '✉ Enviado'; txtCor = '#0891b2';
      labelBotao = 'Reenviar';
    }

    h += '<div class="convite-card" id="card-' + cod.id + '" style="background:' + bg + ';border:1px solid ' + cor + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
        '<div class="convite-numero">Convite ' + (i + 1) + '</div>' +
        '<div style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;background:' + cor + '22;color:' + txtCor + ';text-transform:uppercase;letter-spacing:1px">' + label + '</div>' +
      '</div>' +
      '<div class="convite-codigo" style="color:' + txtCor + '">' + cod.codigo + '</div>' +
      (nomePessoa ? '<div style="font-size:11px;color:#fff;margin:6px 0"><b>' + escaparHtml(nomePessoa) + '</b></div>' : '') +
      (cod.cadastro_id ? '' : '<button class="btn" data-codigo-id="' + cod.id + '" data-msg="' + escaparHtml(msg) + '" onclick="copiarConvite(this)" style="font-size:12px;padding:9px;margin-top:4px">' + labelBotao + '</button>') +
    '</div>';
  });

  el.innerHTML = h;
}

async function copiarConvite(btn) {
  const msg = btn.dataset.msg.replaceAll('&amp;', '&').replaceAll('&lt;', '<').replaceAll('&gt;', '>').replaceAll('&quot;', '"');
  const codigoId = btn.dataset.codigoId;

  // Copia primeiro
  navigator.clipboard.writeText(msg).then(async () => {
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.textContent = 'Copiar novamente'; }, 1800);

    // Marca como enviado no banco se ainda nao estava
    const cod = codigosLote.find(c => c.id === codigoId);
    if (cod && !cod.enviado && !cod.usado) {
      const { error } = await sb.from('codigos')
        .update({ enviado: true, enviado_em: new Date().toISOString() })
        .eq('id', codigoId);

      if (!error) {
        cod.enviado = true;
        cod.enviado_em = new Date().toISOString();
        // Atualiza visual sem recarregar tudo
        const card = document.getElementById('card-' + codigoId);
        if (card) {
          card.classList.add('enviado');
          const status = card.querySelector('.convite-status');
          if (status) {
            status.className = 'convite-status enviado-cor';
            status.textContent = '✉ Enviado';
          }
        }
        renderStats();
      }
    }
  });
}

function sair() {
  sessionStorage.removeItem('ag_lote');
  window.location.reload();
}

document.getElementById('btnEntrar').addEventListener('click', entrar);
document.getElementById('inputNome').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('inputSenha').focus(); });
document.getElementById('inputSenha').addEventListener('keydown', (e) => { if (e.key === 'Enter') entrar(); });
document.getElementById('btnTrocarSenha').addEventListener('click', trocarSenha);
document.getElementById('btnSair').addEventListener('click', sair);

// Auto-login (so funciona se senha ja foi trocada uma vez)
const sess = sessionStorage.getItem('ag_lote');
if (sess) {
  try {
    const dados = JSON.parse(sess);
    sb.from('lotes').select('*').eq('id', dados.id).eq('senha', dados.senha).maybeSingle()
      .then(({ data }) => {
        if (data && !data.senha_padrao) { loteAtual = data; abrirPainel(); }
        else { sessionStorage.removeItem('ag_lote'); }
      });
  } catch (e) {
    sessionStorage.removeItem('ag_lote');
  }
}
</script>
