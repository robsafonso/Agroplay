function tick(){

function tog(id){
var el=document.getElementById(id);
if(!el)return;
el.style.display=el.style.display===“none”?“block”:“none”;
}

function getStatus(ev){
var now=new Date();
var hoje=new Date(now.getFullYear(),now.getMonth(),now.getDate());
var evData=ev.data?new Date(ev.data+“T00:00:00”):null;
if(!evData)return “futuro”;
var dias=Math.ceil((evData-hoje)/(1000*60*60*24));
if(dias>0)return “futuro”;
if(dias<0)return “encerrado”;
if(ev.horario){
var p=ev.horario.split(”:”);
var ini=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+p[0],+p[1]);
if(now<ini)return “futuro”;
if(ev.horario_fim){
var p2=ev.horario_fim.split(”:”);
var fim=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+p2[0],+p2[1]);
if(fim<=ini)fim.setDate(fim.getDate()+1);
if(now>fim)return “alerta”;
}
return “ativo”;
}
return “ativo”;
}

function getExtra(ev){
if(!ev.horario_fim)return “”;
var now=new Date();
var p=ev.horario_fim.split(”:”);
var fim=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+p[0],+p[1]);
if(fim<=new Date(now.getFullYear(),now.getMonth(),now.getDate(),12,0))fim.setDate(fim.getDate()+1);
var diff=Math.floor((now-fim)/60000);
if(diff<=0)return “”;
if(Math.floor(diff/60)>0)return Math.floor(diff/60)+“h “+diff%60+“min extra”;
return diff+“min extra”;
}

h+=”</div>”;
});
h+=”</div></div>”;
return h;
}
