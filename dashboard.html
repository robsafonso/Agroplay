<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay - Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a06;color:#eee;font-family:Arial,sans-serif;padding:16px;max-width:480px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-size:16px;font-weight:900;color:#fff;letter-spacing:2px;cursor:pointer}
.logo span{color:#2aab47}
.back{background:transparent;border:1px solid #1a2a1a;border-radius:8px;padding:6px 12px;color:#eee;font-size:12px;text-decoration:none}
.total-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.tot{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:12px;text-align:center}
.tot-n{font-size:26px;font-weight:900;display:block}
.tot-l{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{background:transparent;border:1px solid #1a2a1a;border-radius:20px;padding:5px 12px;font-size:11px;color:#888;cursor:pointer}
.chip.on{background:#1e7a35;border-color:#1e7a35;color:#fff;font-weight:700}
.ev-card{background:#090e09;border:1px solid #1a2a1a;border-radius:12px;padding:14px;margin-bottom:12px}
.ev-nome{font-size:15px;font-weight:900;color:#fff;margin-bottom:2px}
.ev-det{font-size:11px;color:#555;margin-bottom:12px}
.lote-block{background:#060a06;border:1px solid #1a2a1a;border-radius:10px;padding:12px;margin-bottom:8px}
.lote-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer}
.lote-nome{font-size:13px;font-weight:700;color:#fff}
.lote-badges{display:flex;gap:4px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.lote-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.ls{border-radius:8px;padding:6px;text-align:center}
.ls-n{font-size:16px;font-weight:900;display:block}
.ls-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.btn-ver{width:100%;background:transparent;border:1px solid #2aab47;color:#2aab47;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;text-decoration:none;display:block;text-align:center}
.loading{text-align:center;padding:40px;font-size:14px;color:#555}
.progress-bar{height:4px;background:#1a2a1a;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:#2aab47;border-radius:2px;transition:width .3s}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo" onclick="location.href='home.html'">AGRO<span>PLAY</span> <span style="font-size:11px;background:#c9973c;color:#fff;padding:2px 6px;border-radius:6px;margin-left:4px;font-weight:700">Dashboard</span></div>
  <a href="home.html" class="back">&larr; Menu</a>
</div>

<div id="clock" style="font-size:11px;color:#555;text-align:center;margin-bottom:12px"></div>
<div id="conteudo"><div class="loading">Carregando...</div></div>

<script>
var SB="https://wexwcnezjadoutyzkbcj.supabase.co";
var KY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ";
function ap(path){return fetch(SB+"/rest/v1/"+path,{headers:{"apikey":KY,"Authorization":"Bearer "+KY}}).then(function(r){return r.json();});}
function fd(d){if(!d)return"";var x=d.split("-");return x[2]+"/"+x[1]+"/"+x[0];}
function tog(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==="none"?"block":"none";}
function tick(){var n=new Date();var days=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];var el=document.getElementById("clock");if(el)el.textContent=days[n.getDay()]+" "+fd(n.toISOString().split("T")[0])+" "+n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0")+":"+n.getSeconds().toString().padStart(2,"0");}
setInterval(tick,1000);tick();
function getSt(ev){var now=new Date();var hoje=new Date(now.getFullYear(),now.getMonth(),now.getDate());var ed=ev.data?new Date(ev.data+"T00:00:00"):null;if(!ed)return "futuro";var dias=Math.ceil((ed-hoje)/(1000*60*60*24));if(dias>0)return "futuro";if(dias<0)return "encerrado";if(ev.horario){var p=ev.horario.split(":");var ini=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+p[0],+p[1]);if(now<ini)return "futuro";if(ev.horario_fim){var p2=ev.horario_fim.split(":");var fim=new Date(now.getFullYear(),now.getMonth(),now.getDate(),+p2[0],+p2[1]);if(fim<=ini)fim.setDate(fim.getDate()+1);if(now>fim)return "alerta";}return "ativo";}return "ativo";}
function secHtml(lista,cor,label,sid){if(!lista.length)return "";var h="<div style='border-top:1px solid #0a0f0a'><div onclick='tog(\""+sid+"\")' style='padding:8px 14px;cursor:pointer;display:flex;justify-content:space-between'><span style='font-size:11px;font-weight:700;color:"+cor+"'>"+label+" ("+lista.length+")</span><span style='color:#555'>&#9660;</span></div><div id='"+sid+"' style='display:none;background:#020402;padding:0 14px 6px'>";lista.forEach(function(p){h+="<div style='font-size:12px;color:#bbb;padding:6px 0;border-bottom:1px solid #060a06;display:flex;justify-content:space-between'>"+p.nome+(p.entrada_em?"<span style='font-size:9px;background:rgba(42,171,71,.2);color:#2aab47;padding:2px 5px;border-radius:5px'>"+p.entrada_em.substring(11,16)+"</span>":"")+"</div>";});h+="</div></div>";return h;}
function render(evs,cads){var html="";var stC={futuro:"#0891b2",ativo:"#2aab47",alerta:"#e74c3c",encerrado:"#555"};var stL={futuro:"Futuro",ativo:"Em andamento",alerta:"Passou do fim",encerrado:"Encerrado"};var stB={futuro:"#1a2a1a",ativo:"rgba(42,171,71,.4)",alerta:"rgba(201,60,60,.5)",encerrado:"#111"};var ord=[];["alerta","ativo","futuro","encerrado"].forEach(function(st){evs.forEach(function(ev){if(getSt(ev)===st)ord.push(ev);});});ord.forEach(function(ev){var st=getSt(ev);var ec=cads.filter(function(c){return c.evento_id===ev.id;});var tot=ec.length;var ent=ec.filter(function(c){return c.entrada_em;}).length;var bN=ec.filter(function(c){return !c.bilhete_enviado&&!c.bilhete_confirmado;}).length;var bA=ec.filter(function(c){return c.bilhete_enviado&&!c.bilhete_confirmado;}).length;var evid="ev_"+ev.id;var resps={};ec.forEach(function(c){var k=c.lote_nome||"Convite Direto";if(!resps[k])resps[k]=[];resps[k].push(c);});html+="<div class='ev-card' style='border-color:"+stB[st]+";margin-bottom:10px'><div onclick='tog(\""+evid+"\")' style='cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start'><div style='flex:1'><div class='ev-nome'>"+ev.nome+"</div><div class='ev-det'>"+fd(ev.data)+(ev.horario?" as "+ev.horario+(ev.horario_fim?" - "+ev.horario_fim:""):"")+(ev.local?" | "+ev.local:"")+"</div><div style='display:flex;gap:8px;margin-top:6px'><span style='font-size:11px;color:#eee'><b>"+tot+"</b> total</span><span style='font-size:11px;color:#2aab47'><b>"+ent+"</b> entr</span><span style='font-size:11px;color:#0891b2'><b>"+bN+"</b> N/env</span><span style='font-size:11px;color:#c9973c'><b>"+bA+"</b> aguard</span></div></div><span style='font-size:10px;font-weight:700;color:"+stC[st]+";white-space:nowrap;margin-left:8px'>"+stL[st]+"</span></div><div id='"+evid+"' style='display:none;margin-top:10px;border-top:1px solid #1a2a1a;padding-top:10px'>";Object.keys(resps).forEach(function(resp,ri){var rp=resps[resp];var rN=rp.filter(function(p){return !p.bilhete_enviado&&!p.bilhete_confirmado;});var rA=rp.filter(function(p){return p.bilhete_enviado&&!p.bilhete_confirmado;});var rC=rp.filter(function(p){return p.bilhete_confirmado;});var rE=rp.filter(function(p){return p.entrada_em;});var rid="r_"+ev.id+"_"+ri;html+="<div style='background:#060a06;border:1px solid #1a2a1a;border-radius:8px;margin-bottom:6px'><div onclick='tog(\""+rid+"\")' style='padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center'><span style='font-size:13px;font-weight:700;color:#eee'>"+resp+"</span><div style='display:flex;gap:3px'>"+(rN.length?"<span style='font-size:10px;background:rgba(8,145,178,.2);color:#0891b2;padding:2px 5px;border-radius:5px'>"+rN.length+"N/E</span>":"")+(rA.length?"<span style='font-size:10px;background:rgba(201,151,60,.2);color:#c9973c;padding:2px 5px;border-radius:5px'>"+rA.length+"Ag</span>":"")+(rC.length?"<span style='font-size:10px;background:rgba(42,171,71,.2);color:#2aab47;padding:2px 5px;border-radius:5px'>"+rC.length+"Cf</span>":"")+(rE.length?"<span style='font-size:10px;background:rgba(42,171,71,.3);color:#2aab47;padding:2px 5px;border-radius:5px'>"+rE.length+"Ck</span>":"")+"</div></div><div id='"+rid+"' style='display:none'>"+secHtml(rN,"#0891b2","Nao enviado","s0_"+ev.id+"_"+ri)+secHtml(rA,"#c9973c","Aguardando confirmacao","s1_"+ev.id+"_"+ri)+secHtml(rC,"#2aab47","Bilhete confirmado","s2_"+ev.id+"_"+ri)+secHtml(rE,"#2aab47","Check-in realizado","s3_"+ev.id+"_"+ri)+"</div></div>";});html+="</div></div>";});document.getElementById("conteudo").innerHTML=html||"<div class='empty'>Nenhum evento.</div>";}
var _evs=[];var _cads=[];var _cadsOff=0;
function _loadCads(){
  ap("cadastros?select=id,nome,evento_id,lote_nome,bilhete_enviado,bilhete_confirmado,entrada_em&order=nome.asc&limit=1000&offset="+_cadsOff).then(function(d){
    if(d&&d.length){_cads=_cads.concat(d);if(d.length===1000){_cadsOff+=1000;_loadCads();}else{try{render(_evs,_cads);}catch(e){document.getElementById("conteudo").innerHTML="<div style='padding:20px;color:#e74c3c'>Erro: "+e.message+"</div>";}}}
    else{try{render(_evs,_cads);}catch(e){document.getElementById("conteudo").innerHTML="<div style='padding:20px;color:#e74c3c'>Erro: "+e.message+"</div>";}}
  }).catch(function(e){document.getElementById("conteudo").innerHTML="<div style='padding:20px;color:#e74c3c'>Erro: "+e.message+"</div>";});
}
ap("eventos?select=*&order=data.asc").then(function(d){_evs=d||[];_loadCads();}).catch(function(e){document.getElementById("conteudo").innerHTML="<div style='padding:20px;color:#e74c3c'>Erro eventos: "+e.message+"</div>";});
setInterval(function(){location.reload();},30000);

</script>

</body>
</html>
