<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroplay — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #060a06; color: #eee; min-height: 100vh; overflow-x: hidden; }

/* LOGIN */
.login-card { background: #090e09; border: 1px solid #1a2a1a; border-radius: 16px; padding: 36px 26px; max-width: 380px; margin: 60px auto; }
.login-card h1 { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 4px; color: #fff; }
.login-card .subtitle { text-align: center; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
.fl { margin-bottom: 12px; }
.fl label { display: block; font-size: 10px; color: #2aab47; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }
input, select { width: 100%; padding: 11px 13px; background: #030503; border: 1px solid #1a2a1a; border-radius: 8px; color: #eee; font-size: 14px; outline: none; font-family: inherit; }
input:focus, select:focus { border-color: #2aab47; }
.btn { background: #1e7a35; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn:hover { background: #2aab47; }
.erro { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }

.logo-cima { text-align: center; margin-bottom: 24px; }
.logo { display: inline-flex; align-items: center; border: 1px solid #1a2a1a; border-radius: 10px; overflow: hidden; }
.logo .a { background: #0d150d; padding: 7px 12px; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 1px; }
.logo .a span { color: #2aab47; }
.logo .v { background: #c9973c; padding: 7px 10px; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 1px; }

/* DASHBOARD */
.dash-wrap { padding: 30px 20px; min-height: 100vh; display: flex; flex-direction: column; }

.dash-topo {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 30px;
flex-wrap: wrap;
gap: 12px;
}

.dash-evento {
flex: 1;
min-width: 250px;
}

.dash-evento .nome {
font-size: clamp(28px, 5vw, 56px);
font-weight: 900;
color: #fff;
line-height: 1.1;
margin-bottom: 8px;
}

.dash-evento .det {
font-size: clamp(14px, 1.8vw, 20px);
color: #888;
line-height: 1.5;
}

.dash-evento .det b { color: #2aab47; }

.dash-live {
display: flex;
align-items: center;
gap: 8px;
background: rgba(42,171,71,0.15);
border: 1px solid #2aab47;
padding: 8px 14px;
border-radius: 30px;
}
.live-dot { width: 12px; height: 12px; background: #2aab47; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
.live-txt { font-size: 14px; color: #2aab47; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

/* NUMEROS GIGANTES */
.stats-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 30px;
}

.big-stat {
background: #090e09;
border: 2px solid #1a2a1a;
border-radius: 20px;
padding: clamp(24px, 4vw, 50px) 16px;
text-align: center;
transition: all 0.3s;
}

.big-stat .num {
font-size: clamp(60px, 12vw, 180px);
font-weight: 900;
line-height: 1;
margin-bottom: 8px;
}

.big-stat .label {
font-size: clamp(12px, 1.6vw, 22px);
color: #888;
text-transform: uppercase;
letter-spacing: 4px;
font-weight: 700;
}

.big-stat.total { border-color: rgba(255,255,255,0.2); }
.big-stat.total .num { color: #fff; }

.big-stat.entraram { border-color: #2aab47; background: rgba(42,171,71,0.05); }
.big-stat.entraram .num { color: #2aab47; }

.big-stat.faltam { border-color: #c9973c; background: rgba(201,151,60,0.05); }
.big-stat.faltam .num { color: #c9973c; }

/* PROGRESSO */
.barra-wrap {
margin-bottom: 30px;
}

.barra {
height: 24px;
background: #1a2a1a;
border-radius: 12px;
overflow: hidden;
position: relative;
}

.barra-fill {
height: 100%;
background: linear-gradient(90deg, #1e7a35, #2aab47);
transition: width 0.8s;
display: flex;
align-items: center;
justify-content: flex-end;
padding-right: 14px;
color: #fff;
font-size: 14px;
font-weight: 700;
}

.barra-pct {
text-align: center;
margin-top: 8px;
font-size: clamp(14px, 1.8vw, 20px);
color: #2aab47;
font-weight: 700;
}

/* ULTIMO ENTROU */
.ultimo {
background: #090e09;
border: 2px solid #2aab47;
border-radius: 16px;
padding: clamp(20px, 3vw, 30px);
margin-top: auto;
display: flex;
align-items: center;
gap: 20px;
flex-wrap: wrap;
}

.ultimo-foto {
width: clamp(70px, 8vw, 120px);
height: clamp(70px, 8vw, 120px);
border-radius: 50%;
object-fit: cover;
border: 3px solid #2aab47;
flex-shrink: 0;
}

.ultimo-foto-vazio {
width: clamp(70px, 8vw, 120px);
height: clamp(70px, 8vw, 120px);
border-radius: 50%;
background: #1e7a35;
color: #fff;
font-size: clamp(28px, 4vw, 48px);
font-weight: 700;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}

.ultimo-info { flex: 1; min-width: 200px; }
.ultimo-label { font-size: clamp(10px, 1.2vw, 14px); color: #2aab47; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 6px; }
.ultimo-nome { font-size: clamp(20px, 3vw, 36px); font-weight: 900; color: #fff; line-height: 1.2; }
.ultimo-empresa { font-size: clamp(12px, 1.4vw, 16px); color: #888; margin-top: 4px; }
.ultimo-hora { font-size: clamp(14px, 1.8vw, 22px); color: #c9973c; font-weight: 700; margin-top: 8px; }

.topo-acoes {
text-align: right;
margin-bottom: 20px;
}
.btn-sair { background: transparent; border: 1px solid #c0392b; color: #c0392b; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
.btn-trocar { background: transparent; border: 1px solid #2aab47; color: #2aab47; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-right: 6px; }

.gone { display: none !important; }

@media (max-width: 600px) {
.stats-grid { grid-template-columns: 1fr; gap: 12px; }
.dash-wrap { padding: 16px; }
}
</style>

</head>

<script>
const SB_URL = 'https://wexwcnezjadoutyzkbcj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHdjbmV6amFkb3V0eXprYmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTEwOTgsImV4cCI6MjA5MTkyNzA5OH0.i9fsKIoy6R1Pj8DOgyDQ4BjUvy9KUh_PPp83sQe9gHQ';
const sb = supabase.createClient(SB_URL, SB_KEY);

let eventos = [];
let eventoAtual = null;
let cadastros = [];
let canalRealtime = null;

function escaparHtml(t) { if (!t) return ''; return String(t).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }
function formatarData(iso) { if (!iso) return ''; const p = iso.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
function q(id) { return document.getElementById(id); }

async function entrar() {
  const user = q('inputUser').value.trim();
  const senha = q('inputSenha').value.trim();
  const erro = q('erroLogin');
  erro.textContent = '';
  if (!user || !senha) { erro.textContent = 'Preencha tudo'; return; }

  const { data } = await sb.from('admins').select('*').eq('nome', user).eq('senha', senha).maybeSingle();
  if (!data) { erro.textContent = 'Inválido'; return; }

  sessionStorage.setItem('ag_admin', JSON.stringify({ id: data.id, nome: data.nome }));
  await abrirSelect();
}

async function abrirSelect() {
  q('appLogin').style.display = 'none';
  q('appDash').classList.add('gone');
  q('appSelect').style.display = 'block';

  const { data } = await sb.from('eventos').select('*').order('data', { ascending: false });
  eventos = data || [];

  const sel = q('selectEvento');
  sel.innerHTML = '';
  if (!eventos.length) {
    sel.innerHTML = '<option>Nenhum evento</option>';
    return;
  }
  eventos.forEach(ev => {
    sel.innerHTML += '<option value="' + ev.id + '">' + escaparHtml(ev.nome) + ' · ' + formatarData(ev.data) + '</option>';
  });

  // Auto-seleciona o salvo
  const salvo = sessionStorage.getItem('ag_dash_ev');
  if (salvo && eventos.find(e => e.id === salvo)) sel.value = salvo;
}

async function abrirDash() {
  const evId = q('selectEvento').value;
  if (!evId) return;
  eventoAtual = eventos.find(e => e.id === evId);
  if (!eventoAtual) return;
  sessionStorage.setItem('ag_dash_ev', evId);

  q('appSelect').style.display = 'none';
  q('appDash').classList.remove('gone');

  await carregarCadastros();
  renderTudo();
  iniciarRealtime();

  // Tenta fullscreen (so funciona em alguns browsers)
  try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch (e) {}
}

async function carregarCadastros() {
  const { data } = await sb.from('cadastros').select('*').eq('evento_id', eventoAtual.id);
  cadastros = data || [];
}

function iniciarRealtime() {
  if (canalRealtime) sb.removeChannel(canalRealtime);
  canalRealtime = sb.channel('dash-' + eventoAtual.id)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'cadastros',
      filter: 'evento_id=eq.' + eventoAtual.id
    }, async () => {
      await carregarCadastros();
      renderTudo();
    })
    .subscribe();
}

function renderTudo() {
  const ev = eventoAtual;
  q('evNome').textContent = ev.nome;

  let det = '<b>📅 ' + formatarData(ev.data) + '</b>';
  if (ev.horario) det += ' às ' + ev.horario.substring(0, 5);
  if (ev.local) det += ' · 📍 ' + escaparHtml(ev.local);
  if (ev.atracao1) det += '<br>🎤 ' + escaparHtml(ev.atracao1) + (ev.atracao2 ? ' + ' + escaparHtml(ev.atracao2) : '');
  q('evDet').innerHTML = det;

  const total = cadastros.length;
  const entraram = cadastros.filter(c => c.entrada_em).length;
  const faltam = total - entraram;

  q('numTotal').textContent = total;
  q('numEntraram').textContent = entraram;
  q('numFaltam').textContent = faltam;

  const pct = total ? Math.round((entraram / total) * 100) : 0;
  q('barraFill').style.width = pct + '%';
  q('barraFill').textContent = pct > 5 ? pct + '%' : '';
  q('barraPct').textContent = pct + '% confirmados';

  // Ultimo a entrar
  const entradas = cadastros.filter(c => c.entrada_em).sort((a, b) => b.entrada_em.localeCompare(a.entrada_em));
  if (entradas.length) {
    const u = entradas[0];
    q('ultimoBox').style.display = 'flex';
    if (u.foto_url) {
      q('ultimoFoto').innerHTML = '<img src="' + escaparHtml(u.foto_url) + '" class="ultimo-foto">';
    } else {
      q('ultimoFoto').innerHTML = '<div class="ultimo-foto-vazio">' + (u.nome || '?').charAt(0).toUpperCase() + '</div>';
    }
    q('ultimoNome').textContent = u.nome;
    q('ultimoEmpresa').textContent = u.empresa || u.setor || '';
    const dt = new Date(u.entrada_em);
    q('ultimoHora').textContent = '🕐 ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } else {
    q('ultimoBox').style.display = 'none';
  }
}

function trocarEvento() {
  if (canalRealtime) { sb.removeChannel(canalRealtime); canalRealtime = null; }
  abrirSelect();
}

function sair() {
  if (canalRealtime) sb.removeChannel(canalRealtime);
  sessionStorage.removeItem('ag_admin');
  sessionStorage.removeItem('ag_dash_ev');
  window.location.href = 'index.html';
}

q('btnEntrar').addEventListener('click', entrar);
q('inputUser').addEventListener('keydown', (e) => { if (e.key === 'Enter') q('inputSenha').focus(); });
q('inputSenha').addEventListener('keydown', (e) => { if (e.key === 'Enter') entrar(); });
q('btnAbrir').addEventListener('click', abrirDash);
q('btnTrocar').addEventListener('click', trocarEvento);
q('btnSair').addEventListener('click', sair);
q('btnSairSel').addEventListener('click', sair);

// Auto-login
const sess = sessionStorage.getItem('ag_admin');
if (sess) {
  abrirSelect().then(() => {
    // Se ja tinha evento salvo, abre direto
    const evSalvo = sessionStorage.getItem('ag_dash_ev');
    if (evSalvo && eventos.find(e => e.id === evSalvo)) {
      q('selectEvento').value = evSalvo;
      abrirDash();
    }
  });
}
</script>
